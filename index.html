  <style>
    body { font-family: 'Pretendard', sans-serif; background-color: #09090b; color: #e4e4e7; -webkit-user-select: none; user-select: none; }

    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(191, 149, 63, 0.4); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(191, 149, 63, 0.8); }
    
    .gold-gradient-text {
      background: linear-gradient(to right, #bf953f, #fff2cd, #b38728);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .gold-bg-active {
      background: linear-gradient(135deg, rgba(191, 149, 63, 0.15) 0%, rgba(252, 246, 186, 0.05) 50%, rgba(179, 135, 40, 0.15) 100%);

    .gold-panel {
      background: linear-gradient(to bottom right, #18181b, #09090b);
      border: 1px solid rgba(191, 149, 63, 0.4);
      box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(191, 149, 63, 0.05);
    }
    .gold-button {
      background-color: #09090b;
      border: 1px solid rgba(191, 149, 63, 0.6);
      color: #fcf6ba;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      transition: all 0.2s ease-in-out;
    }
    .gold-button:hover {
      background-color: #18181b;
      border-color: #fcf6ba;
      color: #ffffff;
      box-shadow: 0 0 12px rgba(191, 149, 63, 0.35);
      transform: translateY(-1px);
    }
    .gold-button:active { transform: translateY(1px); }

    .keep-checkbox {
      appearance: none; background-color: #18181b; margin: 0; font: inherit; color: currentColor;
      width: 1.15em; height: 1.15em; border: 1px solid rgba(191, 149, 63, 0.5); border-radius: 0.25em; display: grid; place-content: center; cursor: pointer; transition: all 0.2s;
    }
    .keep-checkbox::before {
      content: ""; width: 0.65em; height: 0.65em; transform: scale(0); transition: 120ms transform ease-in-out;
      box-shadow: inset 1em 1em #fcf6ba; background-color: #fcf6ba; transform-origin: center;
      clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
    }
    .keep-checkbox:checked { border-color: #fcf6ba; background-color: rgba(191, 149, 63, 0.2); }
    .keep-checkbox:checked::before { transform: scale(1); }

    .stat-box { background: rgba(24, 24, 27, 0.8); padding: 25px; border-radius: 16px; border: 1px solid rgba(191, 149, 63, 0.3); text-align: center; position: relative; overflow: hidden; box-shadow: inset 0 0 20px rgba(191, 149, 63, 0.05); }

    /* 히트맵 가독성 최적화 */
    .heatmap-wrapper { max-height: 65vh; overflow: auto; border-radius: 12px; border: 1px solid rgba(191, 149, 63, 0.3); background: #09090b; position: relative; }
    .heatmap-table { border-collapse: separate; border-spacing: 0; width: 100%; text-align: center; font-size: 11px; min-width: 800px; }
    .heatmap-table th, .heatmap-table td { padding: 8px 6px; border-right: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); min-width: 50px; }
    .heatmap-table thead th { font-size: 11px; font-weight: 800; color: #fcf6ba; padding: 10px 6px; background: linear-gradient(180deg, #18181b, #09090b); border-bottom: 2px solid #bf953f; position: sticky; top: 0; z-index: 10; }
    .heatmap-table tbody th { font-size: 11px; font-weight: 800; color: #e4e4e7; padding: 8px 10px; background: linear-gradient(90deg, #18181b, #09090b); border-right: 2px solid #bf953f; position: sticky; left: 0; z-index: 10; text-align: left; }
    .heatmap-table thead th:first-child { background: #09090b; border-right: 2px solid #bf953f; position: sticky; left: 0; top: 0; z-index: 20; }
    .cell-count { font-size: 11px; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
    .cell-hidden { opacity: 0.1; }

    .basic-deck-item { border: 1px solid rgba(191, 149, 63, 0.2); border-radius: 12px; background: rgba(0,0,0,0.4); padding: 15px; margin-bottom: 15px; transition: 0.2s; }
    .basic-deck-item:hover { border-color: rgba(191, 149, 63, 0.6); box-shadow: 0 0 15px rgba(191, 149, 63, 0.1); background: rgba(0,0,0,0.6); }
    .basic-def { font-size: 14px; font-weight: 800; color: #fcf6ba; margin-bottom: 12px; background: rgba(191, 149, 63, 0.1); padding: 8px 12px; border-radius: 8px; border-left: 4px solid #bf953f; line-height: 1.4; display: flex; justify-content: space-between; align-items: center;}
    .basic-atk-list { list-style: none; padding: 0; margin: 0; font-size: 12px; color: #e4e4e7; font-weight: 600; line-height: 2; }
    .basic-atk-list li { position: relative; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.05); border-radius: 6px; }
    .basic-atk-list li:last-child { border-bottom: none; }
    .basic-atk-list li::before { content: '└'; position: absolute; left: 5px; color: #666; pointer-events: none; }

    .login-input { width: 100%; padding: 16px; margin: 10px 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(191, 149, 63, 0.3); color: #fff; border-radius: 12px; text-align: center; font-size: 16px; transition: 0.3s; box-sizing: border-box; outline: none;}

    function IconInfo() { return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>; }

    // 유틸리티 함수
    function getChosung(str) {
      if (!str) return "";
      const chosung = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
      let result = "";
      for (let i = 0; i < str.length; i++) {
        const code = str.charCodeAt(i) - 44032;
        if (code > -1 && code < 11172) result += chosung[Math.floor(code / 588)];
        else result += str.charAt(i);
      }
      return result;
    }

    function getSafeArray(arr) {
      if (Array.isArray(arr)) return arr;
      if (typeof arr === 'string') return arr.split(',').map(s => s.trim());
      return [];
    }

    function renderHeroTags(teamArr) {
      const heroes = getSafeArray(teamArr).filter(h => h && typeof h === 'string' && h.trim() !== '');
      if (heroes.length === 0) return <span className="text-zinc-600 font-medium">-</span>;
      return (
        <div className="flex flex-wrap gap-1 justify-start">
          {heroes.map((hero, idx) => (
            <span key={idx} className="px-2 py-1 bg-zinc-800 border border-zinc-700 rounded-md text-zinc-200 text-xs md:text-[13px] font-bold shadow-sm whitespace-nowrap">{hero}</span>
          ))}
        </div>
      );
    }

    function CustomModal({ isOpen, onClose, title, content, onConfirm, confirmText = "확인", hideCancel = false }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[400] flex items-center justify-center bg-black/80 p-4 animate-in fade-in duration-200">
          <div className="gold-panel p-6 md:p-8 rounded-2xl shadow-2xl max-w-sm w-full">
            <h3 className="text-lg font-black gold-gradient-text mb-3">{title}</h3>
            <div className="text-sm text-zinc-300 font-medium mb-6 whitespace-pre-line">{content}</div>
            <div className="flex gap-3">
              {!hideCancel && <button onClick={onClose} className="flex-1 py-3 rounded-xl bg-zinc-800 border border-zinc-700 text-zinc-300 font-bold text-sm hover:bg-zinc-700 transition-colors">취소</button>}
              <button onClick={onConfirm} className="flex-1 py-3 rounded-xl gold-button font-bold text-sm">{confirmText}</button>
            </div>
          </div>
        </div>
      );
    }

    function SearchableSelect({ value, onChange, placeholder, groups, className = "", zIndex = 60 }) {
      const [isOpen, setIsOpen] = useState(false);
      const [searchTerm, setSearchTerm] = useState(value || '');
      const wrapperRef = useRef(null);

      useEffect(() => { setSearchTerm(value || ''); }, [value]);
      useEffect(() => {
        const handleClickOutside = (e) => { if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setIsOpen(false); };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const filteredGroups = groups.map(g => ({
        ...g, heroes: g.heroes.filter(h => h && typeof h === 'string' && (h.toUpperCase().includes((searchTerm||'').toUpperCase()) || getChosung(h).includes(getChosung(searchTerm||''))))
      })).filter(g => g.heroes.length > 0);

      return (
        <div ref={wrapperRef} className={`relative w-full ${className}`}>
          <input type="text" value={searchTerm}
            onChange={(e) => { 
              setSearchTerm(e.target.value); 
              onChange(e.target.value); 
              setIsOpen(true); 
            }}
            onFocus={() => setIsOpen(true)} 
            onBlur={() => setTimeout(() => setIsOpen(false), 200)}
            placeholder={placeholder}
            className="w-full h-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-xl text-zinc-100 font-bold focus:ring-2 focus:ring-yellow-600 outline-none transition-all placeholder-zinc-600 text-xs md:text-sm shadow-sm"
          />
          {isOpen && (
            <div className={`absolute top-full left-0 right-0 mt-1 max-h-56 overflow-y-auto bg-zinc-800 border border-zinc-700 rounded-xl shadow-xl custom-scrollbar py-1`} style={{zIndex}}>
              {filteredGroups.length === 0 ? <div className="p-3 text-xs text-zinc-500 font-bold text-center">결과 없음</div> : 
                filteredGroups.map(g => (
                  <div key={g.group}>
                    <div className="px-3 py-1.5 text-[10px] font-black text-yellow-600 bg-zinc-900 sticky top-0 z-10 border-y border-zinc-800">{g.group}</div>
                    {g.heroes.map(h => (
                      <div key={h} onClick={() => { onChange(h); setSearchTerm(h); setIsOpen(false); }}
                        className="px-4 py-2 text-xs font-bold text-zinc-200 hover:bg-yellow-700 hover:text-white cursor-pointer transition-colors"
                      >{h}</div>
                    ))}
                  </div>
                ))
              }
            </div>
          )}
        </div>
      );
    }

    const COLLECTION_NAME = 'guild_war_records';

    const PREDEFINED_HERO_GROUPS = [
      { group: "세븐나이츠", heroes: ["루디", "아일린", "레이첼", "델론즈", "제이브", "스파이크", "크리스", "바네사"] },

      const statsData = useMemo(() => {
        if (mainTab !== 'records') return { deckStats: [], memberStats: [] };

        const deckCounts = {};
        const memberData = {};

        currentRecords.forEach(record => {
          const name = record.nickname || '익명';
          if (!memberData[name]) memberData[name] = { name, recordsCount: 0, totalMatches: 0, wins: 0 };
          memberData[name].recordsCount += 1;

          if (subTab === 'attack') {
            record.matches?.forEach(match => {
              memberData[name].totalMatches += 1;
              if (match.result === '승리') memberData[name].wins += 1;

              const myArr = getSafeArray(match.myTeam);
              const validHeroes = myArr.map(h => h && typeof h === 'string' ? h.trim() : '').filter(Boolean).sort();
              if (validHeroes.length === 3) {
                const deckKey = validHeroes.join(', ');
                if (!deckCounts[deckKey]) deckCounts[deckKey] = { deck: deckKey, count: 0, wins: 0 };
                deckCounts[deckKey].count += 1;
                if (match.result === '승리') deckCounts[deckKey].wins += 1;
              }
            });
          } else if (subTab === 'defense') {
            const defTeamArr = getSafeArray(record.myTeam);
            const validDefHeroes = defTeamArr.map(h => h && typeof h === 'string' ? h.trim() : '').filter(Boolean).sort();
            const defDeckKey = validDefHeroes.length === 3 ? validDefHeroes.join(', ') : null;

            record.defenseMatches?.forEach(match => {
              memberData[name].totalMatches += 1; 
              if (match.result === '방어 성공') memberData[name].wins += 1;

              if (defDeckKey) {
                if (!deckCounts[defDeckKey]) deckCounts[defDeckKey] = { deck: defDeckKey, count: 0, wins: 0 };
                deckCounts[defDeckKey].count += 1; 
                if (match.result === '방어 성공') deckCounts[defDeckKey].wins += 1;
              }
            });
          }
        });

        const deckStats = Object.values(deckCounts)
          .map(s => ({ ...s, winRate: s.count > 0 ? ((s.wins / s.count) * 100).toFixed(1) : 0 }))
          .sort((a, b) => b.count - a.count).slice(0, 5);

        const memberStats = Object.values(memberData)
          .map(s => ({ ...s, winRate: s.totalMatches > 0 ? ((s.wins / s.totalMatches) * 100).toFixed(1) : 0 }))
          .sort((a, b) => b.recordsCount - a.recordsCount);

        return { deckStats, memberStats };

            r.matches?.forEach(m => {
              const atk = getSafeArray(m.myTeam).filter(Boolean).sort().join(', ');
              const def = getSafeArray(m.enemyTeam).filter(Boolean).sort().join(', ');
              if (atk.split(',').length === 3) atkCounts[atk] = (atkCounts[atk] || 0) + 1;
              if (def.split(',').length === 3) defCounts[def] = (defCounts[def] || 0) + 1;
            });
          } else {
            const myDef = getSafeArray(r.myTeam).filter(Boolean).sort().join(', ');
            if (myDef.split(',').length === 3) defCounts[myDef] = (defCounts[myDef] || 0) + 1;
          }
        });
        
        const topAtk = Object.entries(atkCounts).sort((a,b)=>b[1]-a[1]).slice(0,10).map(e=>e[0]);

          if (!ticking) {
            window.requestAnimationFrame(() => {
              const currentScrollY = window.scrollY;
              if (currentScrollY < 10) setShowFloatingBtn(true);
              else if (currentScrollY > lastScrollY + 10) setShowFloatingBtn(false);
              else if (currentScrollY < lastScrollY - 10) setShowFloatingBtn(true);
              lastScrollY = currentScrollY; ticking = false;
            }); ticking = true;
          }
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(() => {

          if (e.ctrlKey && e.altKey && (e.code === 'KeyU' || e.key === 'u' || e.key === 'U' || e.key === 'ㅕ')) {
            e.preventDefault();
            if (!isAdminMode) { 
              setUnlockModalOpen(true); setUnlockPwd(''); setUnlockError(false); 
              setTimeout(() => { if (unlockInputRef.current) unlockInputRef.current.focus(); }, 100);
            }
          }
        };
        document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
      }, [isAdminMode]);

      const handleTitleClick = () => {

            if (!isAdminMode) { 
              setUnlockModalOpen(true); setUnlockPwd(''); setUnlockError(false); 
              setTimeout(() => { if (unlockInputRef.current) unlockInputRef.current.focus(); }, 100);
            }
            return 0;
          }
          return newCount;
        });

      };

          } catch (error) { console.error("Auth Fail:", error); }
        };
        initAuth();

        return () => unsubscribe();

            setRecords(fetchedRecords);

              matches.push({ a: myTeam.join(' '), d: enemyTeam.join(' '), w: m.result === '승리' ? 1 : 0, l: m.result === '패배' ? 1 : 0, date: r.date });
            }
          });
        });
        return matches.sort((a, b) => new Date(a.date) - new Date(b.date));

        if (mainTab !== 'strategy' || subTab !== 'basic') return [];
        const recentMatches = rawMatchesForStats.slice(-1000);
        const defStats = {};
        recentMatches.forEach(m => {
          if (!defStats[m.d]) defStats[m.d] = { count: 0, atk: {}, normDef: m.d };
          defStats[m.d].count++;
          if (!defStats[m.d].atk[m.a]) defStats[m.d].atk[m.a] = { w: 0, l: 0, normAtk: m.a };
          defStats[m.d].atk[m.a].w += m.w;
          defStats[m.d].atk[m.a].l += m.l;

          }).filter(a => a.total >= 5) 
          .sort((a, b) => b.total - a.total || b.w - a.w).slice(0, 3);
          return { ...def, counters: topAtks };
        });
      }, [rawMatchesForStats, mainTab, subTab]);

      const dashboardStats = useMemo(() => {
        if (mainTab !== 'strategy' || subTab !== 'dashboard') return { totalWin: 0, totalLose: 0, topDefs: [] };
        let totalWin = 0, totalLose = 0;
        const deckMap = new Map();
        rawMatchesForStats.forEach(m => {
          totalWin += m.w; totalLose += m.l;
          if (!deckMap.has(m.d)) deckMap.set(m.d, 0);
          deckMap.set(m.d, deckMap.get(m.d) + 1);
        });
        const topDefs = Array.from(deckMap.entries()).sort((a, b) => b[1] - a[1]).slice(0, 5);
        return { totalWin, totalLose, topDefs };
      }, [rawMatchesForStats, mainTab, subTab]);

      useEffect(() => {
        if (mainTab === 'strategy' && subTab === 'dashboard' && dashboardStats.topDefs.length > 0) {
          if (winRateChartRef.current) {
            if (chartInstance1.current) chartInstance1.current.destroy();
            chartInstance1.current = new Chart(winRateChartRef.current, {
              type: 'doughnut',
              data: { labels: ['승리', '패배'], datasets: [{ data: [dashboardStats.totalWin, dashboardStats.totalLose], backgroundColor: ['#2ed573', '#ff4757'], borderWidth: 0 }] },
              options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#fcf6ba' } } } }
            });

          if (defMetaChartRef.current) {
            if (chartInstance2.current) chartInstance2.current.destroy();
            chartInstance2.current = new Chart(defMetaChartRef.current, {
              type: 'bar',
              data: { 
                labels: dashboardStats.topDefs.map(d => d[0].split(' ').join(', ').substring(0,15)), 
                datasets: [{ label: '만난 횟수', data: dashboardStats.topDefs.map(d => d[1]), backgroundColor: '#bf953f', borderRadius: 4 }] 
              },
              options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
            });
          }
        }
        return () => {
          if (chartInstance1.current) chartInstance1.current.destroy();
          if (chartInstance2.current) chartInstance2.current.destroy();
        };
      }, [mainTab, subTab, dashboardStats]);

      const counterAnalysisData = useMemo(() => {
        const activeEnemies = counterEnemyFilter.filter(h => h.trim() !== '');
        if (activeEnemies.length === 0) return null;

        const resultsMap = new Map();

        STATIC_GUIDE_DB.forEach(guide => {
          const isMatch = activeEnemies.every(filterHero => guide.defense.includes(filterHero));
          if (isMatch) {
            const defKey = [...guide.defense].sort().join(',');
            guide.counters?.forEach(counter => {
              const atkKey = [...counter.attacker].sort().join(',');
              const key = `${defKey}|${atkKey}`;
              resultsMap.set(key, {
                defenseTeam: guide.defense, attackerTeam: counter.attacker,
                skill: counter.skill, turn: counter.turn, formation: counter.formation,
                equips: [counter.equip1, counter.equip2, counter.equip3].filter(Boolean),
                tip: counter.tip, dynamicCount: 0, dynamicWins: 0, hasGuide: true, isCustom: false
              });
            });
          }
        });

        customGuides.filter(g => g.status === 'approved' && (g.guideType === 'counter' || !g.guideType)).forEach(guide => {
          const isMatch = activeEnemies.every(filterHero => getSafeArray(guide.defenseTeam).includes(filterHero));
          if (isMatch) {
            const defKey = getSafeArray(guide.defenseTeam).sort().join(',');
            const atkKey = getSafeArray(guide.attackerTeam).sort().join(',');
            const key = `${defKey}|${atkKey}`;
            resultsMap.set(key, {
              defenseTeam: guide.defenseTeam, attackerTeam: guide.attackerTeam,
              skill: guide.skill, turn: guide.turn, formation: guide.formation,
              equips: [guide.equip1, guide.equip2, guide.equip3].filter(Boolean),
              tip: guide.tip, dynamicCount: 0, dynamicWins: 0, hasGuide: true, isCustom: true
            });
          }
        });

        records.filter(r => (r.recordType || 'attack') === 'attack').forEach(record => {
          record.matches?.forEach(match => {
            const enemyTeam = getSafeArray(match.enemyTeam).map(h => h.trim()).filter(Boolean);
            const myTeam = getSafeArray(match.myTeam).map(h => h.trim()).filter(Boolean);

            if (enemyTeam.length > 0 && myTeam.length > 0) {
              const isMatch = activeEnemies.every(filterHero => enemyTeam.includes(filterHero));
              if (isMatch) {
                const defKey = [...enemyTeam].sort().join(',');
                const atkKey = [...myTeam].sort().join(',');
                const key = `${defKey}|${atkKey}`;

                if (!resultsMap.has(key)) {
                  resultsMap.set(key, {
                    defenseTeam: enemyTeam, attackerTeam: myTeam,
                    skill: null, turn: null, formation: null, equips: [], tip: null,
                    dynamicCount: 0, dynamicWins: 0, hasGuide: false, isCustom: false
                  });
                }

                const entry = resultsMap.get(key);
                entry.dynamicCount++;
                if (match.result === '승리') entry.dynamicWins++;
              }
            }
          });
        });

        const results = Array.from(resultsMap.values())
          .filter(d => d.dynamicCount >= 5) 
          .map(d => ({ ...d, winRate: d.dynamicCount > 0 ? ((d.dynamicWins / d.dynamicCount) * 100).toFixed(1) : 0 }))
          .sort((a, b) => {
            if (b.winRate !== a.winRate) return parseFloat(b.winRate) - parseFloat(a.winRate);
            if (b.dynamicCount !== a.dynamicCount) return b.dynamicCount - a.dynamicCount;
            return (b.hasGuide === a.hasGuide) ? 0 : b.hasGuide ? 1 : -1;
          });

        return { results };
      }, [records, customGuides, counterEnemyFilter]);

      const recommendDefenseData = useMemo(() => {
        const defCounts = {};
        records.filter(r => r.recordType === 'defense').forEach(record => {
          const defTeamArr = getSafeArray(record.myTeam);
          const validDefHeroes = defTeamArr.map(h => h && typeof h === 'string' ? h.trim() : '').filter(Boolean).sort();
          if (validDefHeroes.length === 3) {
            const defDeckKey = validDefHeroes.join(', ');
            if (!defCounts[defDeckKey]) defCounts[defDeckKey] = { deck: defDeckKey, count: 0, wins: 0, heroes: validDefHeroes };
            record.defenseMatches?.forEach(match => {
              defCounts[defDeckKey].count++;
              if (match.result === '방어 성공') defCounts[defDeckKey].wins++;
            });
          }
        });

        const defResults = Object.values(defCounts)
          .map(d => ({ ...d, winRate: d.count > 0 ? ((d.wins / d.count) * 100).toFixed(1) : 0 }))
          .filter(d => d.count >= 3)
          .sort((a, b) => {
            if (b.winRate !== a.winRate) return parseFloat(b.winRate) - parseFloat(a.winRate);
            return b.count - a.count;
          }).slice(0, 10);
          
        return defResults.map(def => {
           const matchGuides = customGuides.filter(g => g.status === 'approved' && g.guideType === 'defense' && g.defenseTeam.slice().sort().join(',') === def.heroes.join(','));
           return { ...def, guides: matchGuides };
        });
      }, [records, customGuides]);

      const handleGuideSubmit = async () => {
        if (!user) return showAlert("인증 오류", "인증 정보가 없습니다.");

          return showAlert("입력 오류", "스킬운영, 턴, 진형은 필수 입력 항목입니다.");
        }
        try {
          await addDoc(collection(fb.db, 'artifacts', APP_ID, 'public', 'data', GUIDE_COLLECTION), {
            guideType: guideModal.type,
            defenseTeam: guideModal.defTeam,
            attackerTeam: guideModal.atkTeam || [],
            skill: guideModal.skill || '',
            turn: guideModal.turn || '',
            formation: guideModal.formation || '',
            equip1: guideModal.equip1 || '',
            equip2: guideModal.equip2 || '',
            equip3: guideModal.equip3 || '',
            tip: guideModal.tip || '',
            status: 'pending',
            createdAt: Date.now(),
            authorId: user.uid
          });
          setGuideModal({ isOpen: false, type: 'counter', defTeam: [], atkTeam: ['', '', ''], skill: '', turn: '', formation: '', equip1: '', equip2: '', equip3: '', tip: '' });
          showAlert("제출 완료", "공략 제안이 성공적으로 전송되었습니다.\n관리자의 검토 후 반영됩니다.");
        } catch (error) {
