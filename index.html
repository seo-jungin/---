<html lang="ko">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리더 길드 길드전 기록부</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 최신 유행 폰트: Pretendard -->

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #09090b; /* zinc-950 */
      color: #f4f4f5; /* zinc-50 */
      
      /* 드래그 방지 (입력창 제외) */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    input, select, textarea {
      -webkit-user-select: auto;
      -moz-user-select: auto;
      -ms-user-select: auto;
      user-select: auto;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #52525b; /* zinc-600 */
      border-radius: 20px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: #71717a; /* zinc-500 */
    }
  </style>
</head>
<body class="text-zinc-100 selection:bg-red-500/30 selection:text-red-200" oncontextmenu="return false;">
  <div id="root"></div>

  <!-- React Logic -->
  <script type="text/babel" data-type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const { useState, useEffect, useMemo, useRef } = React;

    const IconTrash = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>;
    const IconEdit = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
    const IconSave = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
    const IconSearch = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconBarChart = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>;
    const IconUsers = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
    const IconChevronDown = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
    const IconChevronUp = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>;
    const IconX = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconZoomIn = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>;
    const IconLock = () => <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
    const IconDownload = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
    const IconCalendar = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;

    // 외부 배포용 Firebase 설정
    const fallbackFirebaseConfig = {
      apiKey: "AIzaSyAqSgVY3zJAmKpLSnxrM5YVMVnqTw8JfTI",
      authDomain: "warr-384d8.firebaseapp.com",
      projectId: "warr-384d8",
      storageBucket: "warr-384d8.firebasestorage.app",
      messagingSenderId: "619085647485",
      appId: "1:619085647485:web:03cf09b1a9f0d7e6062b14"
    };
    
    let myFirebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackFirebaseConfig;
    
    let app = null, auth = null, db = null, hasFirebaseConfig = false;
    try {
      if (myFirebaseConfig && myFirebaseConfig.apiKey) {
        app = initializeApp(myFirebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        hasFirebaseConfig = true;
      }
    } catch (error) {
      console.error("Firebase 초기화 오류:", error);
    }

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'sevens-guild-war-app';
    const COLLECTION_NAME = 'guild_war_records';

    // 원작 영웅 일괄 보강 (카론, 리나, 기타 지원형 등 재검토 반영)
    const PREDEFINED_HERO_GROUPS = [
      { group: "세븐나이츠", heroes: ["루디", "아일린", "레이첼", "델론즈", "제이브", "스파이크", "크리스", "바네사"] },
      { group: "다크나이츠", heroes: ["멜키르", "브란즈&브란셀", "플라튼", "콜트", "팔라누스", "실베스타"] },
      { group: "사황/구사황", heroes: ["에이스", "여포", "손오공", "린", "태오", "카르마", "카일", "연희"] },
      { group: "구세븐나이츠", heroes: ["겔리두스", "밀리아", "파이", "로지", "쥬리", "알프", "라디우스"] },
      { group: "나이트크로우", heroes: ["칼 헤론", "오를리", "타카", "아킬라"] },
      { group: "루미너스 혁명단", heroes: ["엘리시아", "키리엘", "라이언"] },
      { group: "숨은 강자들", heroes: ["미호", "로로", "아멜리아", "잉그리드", "클레미스", "카구라", "바토리", "아비갈", "앤티", "뮬란", "미스트"] },
      { group: "천상의 수호자", heroes: ["트루드", "프레이야", "라드그리드", "스쿨드", "펜리르", "레긴레이프", "기르티"] },
      { group: "심연의 사도/하이드 리퍼", heroes: ["쥬다스", "디아나", "안티고네", "잭", "앙그라", "데스론"] },
      { group: "마법학회/텔루스", heroes: ["타라", "노아", "세자르", "오목", "바엘", "리나"] },
      { group: "펜타곤/성십자단", heroes: ["아리스", "스피나", "클레오", "길라한", "엘리니아", "세인", "니아", "지크", "루리", "에스파다"] },
      { group: "주요 모험가 (아스거 등)", heroes: ["에반", "카린", "스니퍼", "쥬피", "유리", "아리엘", "실비아", "벨리카", "챈슬러", "룩", "녹스", "아라곤", "앨리스", "클로에", "헤브니아", "헬레니아", "로아", "하영", "카론", "루시", "유이"] },
      { group: "주요 모험가 (아이사 등)", heroes: ["리", "빅토리아", "진", "데이지", "백룡", "링링", "밍밍", "소이", "풍연", "비담", "유신", "백각", "이정", "권호", "기파랑", "나타", "아수라", "칭타오", "무송", "관우", "제갈량", "초선", "조운"] },
      { group: "후속작 오리지널", heroes: ["렌", "코제트", "챙첸", "밍", "이안", "앙리", "케이드", "루키", "멜리사", "스캇", "피네", "엘카", "샬롯", "티티", "레일라", "스텔라", "세일럼", "렘", "루아"] }
    ];

    const CustomModal = ({ isOpen, onClose, title, content, onConfirm, confirmText = "확인", hideCancel = false }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/70 backdrop-blur-md p-4 animate-in fade-in duration-200">
          <div className="bg-zinc-900 border border-zinc-700 p-8 rounded-3xl shadow-2xl max-w-sm w-full animate-in zoom-in-95 duration-200">
            <h3 className="text-xl font-black text-zinc-100 mb-4">{title}</h3>
            <div className="text-zinc-300 font-medium mb-8 whitespace-pre-line leading-relaxed">{content}</div>
            <div className="flex gap-3">
              {!hideCancel && (
                <button onClick={onClose} className="flex-1 py-3 rounded-xl bg-zinc-800 text-zinc-300 font-bold hover:bg-zinc-700 transition-colors">취소</button>
              )}
              <button onClick={onConfirm} className="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700 transition-colors">{confirmText}</button>
            </div>
          </div>
        </div>
      );
    };

    const SearchableSelect = ({ value, onChange, placeholder, groups }) => {
      const [isOpen, setIsOpen] = useState(false);
      const [searchTerm, setSearchTerm] = useState(value || '');
      const wrapperRef = useRef(null);

      useEffect(() => {
        setSearchTerm(value || '');
      }, [value]);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (wrapperRef.current && !wrapperRef.current.contains(e.target)) {
            setIsOpen(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const filteredGroups = groups.map(g => ({
        ...g,
        heroes: g.heroes.filter(h => h.toLowerCase().includes(searchTerm.toLowerCase()))
      })).filter(g => g.heroes.length > 0);

      return (
        <div ref={wrapperRef} className="relative w-full h-12">
          <input
            type="text"
            value={searchTerm}
            onChange={(e) => {
              setSearchTerm(e.target.value);
              onChange(e.target.value);
              setIsOpen(true);
            }}
            onFocus={() => setIsOpen(true)}
            placeholder={placeholder}
            className="w-full h-full px-3 py-3 border border-zinc-700 rounded-xl bg-zinc-800 text-zinc-100 font-bold focus:ring-2 focus:ring-red-600 outline-none transition-all placeholder-zinc-500"
          />
          {isOpen && (
            <div className="absolute z-50 top-full left-0 right-0 mt-1 max-h-56 overflow-y-auto bg-zinc-800 border border-zinc-600 rounded-xl shadow-2xl custom-scrollbar">
              {filteredGroups.length === 0 ? (
                <div className="p-4 text-sm text-zinc-400 font-medium text-center">검색 결과가 없습니다.</div>
              ) : (
                filteredGroups.map(g => (
                  <div key={g.group}>
                    <div className="px-3 py-1.5 text-xs font-black text-red-400 bg-zinc-900/80 sticky top-0 backdrop-blur-sm z-10">{g.group}</div>
                    {g.heroes.map(h => (
                      <div
                        key={h}
                        onClick={() => {
                          onChange(h);
                          setSearchTerm(h);
                          setIsOpen(false);
                        }}
                        className="px-4 py-2.5 text-sm font-bold text-zinc-200 hover:bg-red-600 hover:text-white cursor-pointer transition-colors"
                      >
                        {h}
                      </div>
                    ))}
                  </div>
                ))
              )}
            </div>
          )}
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [records, setRecords] = useState([]);
      const [filterChar, setFilterChar] = useState('');
      const [showStats, setShowStats] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [customHeroes, setCustomHeroes] = useState([]); 
      
      const [expandedRecords, setExpandedRecords] = useState({});
      const [activeTab, setActiveTab] = useState('records');
      const [isAdminMode, setIsAdminMode] = useState(false);
      
      const [alertModal, setAlertModal] = useState({ isOpen: false, title: '', content: '' });
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', content: '', action: null, confirmText: '확인' });
      const [unlockModalOpen, setUnlockModalOpen] = useState(false);
      const [unlockPwd, setUnlockPwd] = useState('');
      const [unlockError, setUnlockError] = useState(false);
      const unlockInputRef = useRef(null);

      const [nickname, setNickname] = useState('');
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [opponent, setOpponent] = useState('');
      const [matches, setMatches] = useState(
        Array.from({ length: 5 }, () => ({
          type: '공격', myTeam: ['', '', ''], result: '승리', enemyTeam: ['', '', '']
        }))
      );

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
          if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C', 'i', 'j', 'c'].includes(e.key)) { e.preventDefault(); return false; }
          if (e.ctrlKey && (e.key === 'U' || e.key === 'u') && !e.altKey) { e.preventDefault(); return false; }
          if (e.ctrlKey && ['c', 'v', 'x', 'C', 'V', 'X'].includes(e.key)) {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT') {
              e.preventDefault(); return false;
            }
          }
          
          if (e.ctrlKey && e.altKey && (e.key === 'u' || e.key === 'U')) {
            e.preventDefault();
            if (!isAdminMode) {
              setUnlockModalOpen(true);
              setUnlockPwd('');
              setUnlockError(false);
              setTimeout(() => { if (unlockInputRef.current) unlockInputRef.current.focus(); }, 100);
            }
          }
        };

        const handleContextMenu = (e) => { e.preventDefault(); return false; };

        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('contextmenu', handleContextMenu);

        return () => {
          document.removeEventListener('keydown', handleKeyDown);
          document.removeEventListener('contextmenu', handleContextMenu);
        };
      }, [isAdminMode]);

      const handleAdminUnlock = (e) => {
        e.preventDefault();
        if (unlockPwd === "4979457") {
          setIsAdminMode(true);
          setUnlockModalOpen(false);
          setActiveTab('management');
        } else {
          setUnlockError(true);
          setUnlockPwd('');
          if (unlockInputRef.current) unlockInputRef.current.focus();
        }
      };

      const showAlert = (title, content) => setAlertModal({ isOpen: true, title, content });
      const showConfirm = (title, content, action, confirmText = "확인") => setConfirmModal({ isOpen: true, title, content, action, confirmText });

      const HERO_GROUPS = useMemo(() => {
        if (customHeroes.length === 0) return PREDEFINED_HERO_GROUPS;
        return [...PREDEFINED_HERO_GROUPS, { group: "기타 (자동추가)", heroes: customHeroes }];
      }, [customHeroes]);

      useEffect(() => {
        if (!hasFirebaseConfig || !auth) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("인증 실패:", error);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!hasFirebaseConfig || !user || !db) return;
        const dbRef = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);
        const unsubscribe = onSnapshot(dbRef, 
          (snapshot) => {
            const fetchedRecords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            fetchedRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(fetchedRecords);
          },
          (error) => console.error("데이터 불러오기 실패:", error)
        );
        return () => unsubscribe();
      }, [user]);

      // 일자별/요일별 제출 현황 통계
      const dailySubmissionStats = useMemo(() => {
        const grouped = {};
        records.forEach(r => {
          const d = r.date;
          if (!grouped[d]) grouped[d] = new Set();
          grouped[d].add(r.nickname || '익명');
        });
        
        return Object.entries(grouped)
          .map(([dateStr, namesSet]) => {
            const names = Array.from(namesSet).sort();
            const dateObj = new Date(dateStr);
            const dayOfWeek = isNaN(dateObj) ? '' : ['일', '월', '화', '수', '목', '금', '토'][dateObj.getDay()];
            return {
              date: dateStr,
              dayOfWeek,
              count: names.length,
              names
            };
          })
          .sort((a, b) => b.date.localeCompare(a.date))
          .slice(0, 7); // 최근 7일만 추출
      }, [records]);

      const fullDeckStats = useMemo(() => {
        const counts = {};
        records.forEach(record => {
          record.matches.forEach(match => {
            let myArr = Array.isArray(match.myTeam) ? match.myTeam : (match.myTeam ? match.myTeam.split(',') : []);
            if (myArr.filter(Boolean).length > 0) {
              const deckArr = myArr.map(h => h.trim()).filter(Boolean).sort();
              if (deckArr.length === 3) {
                const deckKey = deckArr.join(', ');
                if (!counts[deckKey]) counts[deckKey] = { deck: deckKey, count: 0, wins: 0 };
                counts[deckKey].count += 1;
                if (match.result === '승리') counts[deckKey].wins += 1;
              }
            }
          });
        });
        return Object.values(counts)
          .map(s => ({ ...s, winRate: ((s.wins / s.count) * 100).toFixed(1) }))
          .sort((a, b) => b.count - a.count);
      }, [records]);

      const deckStats = useMemo(() => fullDeckStats.slice(0, 5), [fullDeckStats]);

      const memberStats = useMemo(() => {
        const stats = {};
        records.forEach(record => {
          const name = record.nickname || '익명';
          if (!stats[name]) stats[name] = { name, recordsCount: 0, totalMatches: 0, wins: 0 };
          stats[name].recordsCount += 1;
          record.matches.forEach(match => {
            stats[name].totalMatches += 1;
            if (match.result === '승리') stats[name].wins += 1;
          });
        });
        return Object.values(stats)
          .map(s => ({
            ...s,
            winRate: s.totalMatches > 0 ? ((s.wins / s.totalMatches) * 100).toFixed(1) : 0
          }))
          .sort((a, b) => b.recordsCount - a.recordsCount);
      }, [records]);

      const handleTeamChange = (index, teamType, heroIndex, value) => {
        const newMatches = [...matches];
        newMatches[index][teamType][heroIndex] = value;
        setMatches(newMatches);
      };

      const handleMatchChange = (index, field, value) => {
        const newMatches = [...matches];
        newMatches[index][field] = value;
        setMatches(newMatches);
      };

      const handleQuickPaste = (index) => {
        const text = window.prompt("전투 기록을 붙여넣으세요.\n예: 프레이야, 바네사, 키리엘 (승리) / 프레이야, 초선, 키리엘");
        if (!text) return;

        let result = '승리';
        if (text.includes('(패배)') || text.includes('패배')) result = '패배';

        let cleanText = text.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '');
        let sides = cleanText.split('/');
        
        let myTeamStr = sides[0] ? sides[0].trim() : '';
        let enemyTeamStr = sides[1] ? sides[1].trim() : '';

        const parseTeam = (str) => {
          if (!str) return ['', '', ''];
          let arr = str.includes(',') ? str.split(',') : str.split(/\s+/);
          arr = arr.map(s => s.trim()).filter(Boolean);
          return [arr[0] || '', arr[1] || '', arr[2] || ''];
        };

        const parsedMyTeam = parseTeam(myTeamStr);
        const parsedEnemyTeam = parseTeam(enemyTeamStr);

        const newMatches = [...matches];
        newMatches[index] = {
          type: '공격',
          myTeam: parsedMyTeam,
          result,
          enemyTeam: parsedEnemyTeam
        };
        setMatches(newMatches);
      };

      const resetForm = () => {
        setOpponent('');
        setMatches(Array.from({ length: 5 }, () => ({
          type: '공격', myTeam: ['', '', ''], result: '승리', enemyTeam: ['', '', '']
        })));
        setEditingId(null);
      };

      const handleSave = () => {
        if (!hasFirebaseConfig) { showAlert("설정 오류", "Firebase 설정이 누락되어 저장할 수 없습니다."); return; }
        if (!user) { showAlert("인증 오류", "인증 정보(User)가 없습니다."); return; }
        if (!nickname || !date || !opponent) { showAlert("입력 오류", "닉네임, 날짜, 상대 길드명을 모두 입력해주세요."); return; }

        const hasValidMatch = matches.some(m => m.myTeam.some(h => h.trim() !== '') || m.enemyTeam.some(h => h.trim() !== ''));
        if (!hasValidMatch) { showAlert("입력 오류", "최소 1개 이상의 전투 기록(영웅 선택)을 입력해주세요."); return; }

        const formattedMatches = matches.filter(m => m.myTeam.some(h => h.trim() !== '') || m.enemyTeam.some(h => h.trim() !== ''));

        const allValidHeroes = PREDEFINED_HERO_GROUPS.flatMap(g => g.heroes);
        const usedHeroes = new Set();
        
        formattedMatches.forEach(m => {
          m.myTeam.forEach(h => { if(h.trim()) usedHeroes.add(h.trim()); });
          m.enemyTeam.forEach(h => { if(h.trim()) usedHeroes.add(h.trim()); });
        });

        const unknownHeroes = [...usedHeroes].filter(h => !allValidHeroes.includes(h));

        if (unknownHeroes.length > 0) {
          showConfirm(
            "오타 확인 필요",
            `지정된 영웅 명단에 없는 이름이 포함되어 있습니다.\n\n[발견된 의심 이름]\n${unknownHeroes.join(', ')}\n\n오타가 확실하다면 '취소'를 눌러 수정하시고,\n정상적인 신규 영웅이라면 '강제 저장'을 눌러주세요.`,
            () => { executeSave(formattedMatches, unknownHeroes); setConfirmModal({ isOpen: false }); },
            "강제 저장"
          );
        } else {
          executeSave(formattedMatches, []);
        }
      };

      const executeSave = async (formattedMatches, newHeroes) => {
        try {
          if (editingId) {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, editingId), { 
              nickname, date, opponent, matches: formattedMatches, updatedAt: Date.now() 
            });
          } else {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME), { 
              nickname, date, opponent, matches: formattedMatches, createdAt: Date.now(), authorId: user.uid 
            });
          }
          
          if (newHeroes.length > 0) {
            const addedHeroes = newHeroes.filter(h => !customHeroes.includes(h));
            if (addedHeroes.length > 0) setCustomHeroes(prev => [...prev, ...addedHeroes]);
          }

          resetForm();
          showAlert("저장 완료", "성공적으로 저장되었습니다.");
        } catch (error) {
          console.error("저장 실패:", error);
          showAlert("시스템 오류", "데이터 저장 중 오류가 발생했습니다.");
        }
      };

      const handleEditClick = (record) => {
        setEditingId(record.id);
        setNickname(record.nickname || '');
        setDate(record.date || new Date().toISOString().split('T')[0]);
        setOpponent(record.opponent || '');

        const loadedMatches = record.matches.map(m => {
          let myTeamArr = Array.isArray(m.myTeam) ? m.myTeam : (m.myTeam ? m.myTeam.split(',').map(s => s.trim()) : ['', '', '']);
          let enemyTeamArr = Array.isArray(m.enemyTeam) ? m.enemyTeam : (m.enemyTeam ? m.enemyTeam.split(',').map(s => s.trim()) : ['', '', '']);
          
          const allPredefined = PREDEFINED_HERO_GROUPS.flatMap(g => g.heroes);
          const newDetectedHeroes = [...myTeamArr, ...enemyTeamArr].filter(
            h => h !== '' && !allPredefined.includes(h) && !customHeroes.includes(h)
          );
          if (newDetectedHeroes.length > 0) {
            setCustomHeroes(prev => [...prev, ...newDetectedHeroes]);
          }

          return {
            type: '공격',
            myTeam: [...myTeamArr, '', '', ''].slice(0, 3),
            result: m.result || '승리',
            enemyTeam: [...enemyTeamArr, '', '', ''].slice(0, 3)
          };
        });

        while (loadedMatches.length < 5) {
          loadedMatches.push({ type: '공격', myTeam: ['', '', ''], result: '승리', enemyTeam: ['', '', ''] });
        }
        setMatches(loadedMatches);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleDelete = (id) => {
        if (!hasFirebaseConfig) return;
        if (!user && !isAdminMode) { showAlert("권한 오류", "삭제 권한을 확인할 수 없습니다."); return; }
        showConfirm("기록 삭제", "이 기록을 삭제하시겠습니까?\n삭제 후 복구할 수 없습니다.", async () => {
          try {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, id));
            if (editingId === id) resetForm();
            setConfirmModal({ isOpen: false });
          } catch (error) { 
            console.error("삭제 실패:", error); 
            showAlert("오류", "삭제 권한이 부족합니다. Firestore 보안 규칙을 확인하세요.");
          }
        }, "삭제 진행");
      };

      const handleDeleteAll = () => {
        if (!isAdminMode) return;
        if (records.length === 0) { showAlert("알림", "삭제할 데이터가 없습니다."); return; }
        showConfirm("전적 전체 삭제", `총 ${records.length}개의 전적 데이터를 모두 삭제합니다.\n정말로 진행하시겠습니까?`, async () => {
          try {
            let successCount = 0; let failCount = 0;
            setConfirmModal({ isOpen: false });
            for (const record of records) {
              try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, record.id)); successCount++; } 
              catch (e) { failCount++; }
            }
            let msg = `작업 완료.\n성공: ${successCount}건`;
            if (failCount > 0) msg += `\n실패(권한 부족 등): ${failCount}건\n※ Firebase 보안 규칙이 수정되지 않아 삭제되지 않았을 수 있습니다.`;
            showAlert("작업 결과", msg);
          } catch (error) { console.error(error); showAlert("에러", "전체 삭제 중 에러 발생"); }
        }, "전체 삭제 진행");
      };

      const handleExportRawCSV = () => {
        if (records.length === 0) { showAlert("알림", "내보낼 데이터가 없습니다."); return; }
        let csvContent = "\uFEFF";
        csvContent += "날짜,작성자(닉네임),상대길드,매치번호,내덱1,내덱2,내덱3,결과,적덱1,적덱2,적덱3\n";
        records.forEach(record => {
          record.matches.forEach((match, index) => {
            const date = record.date || ""; const nickname = record.nickname || "익명"; const opponent = record.opponent || ""; const matchNum = index + 1;
            let myTeamArr = Array.isArray(match.myTeam) ? match.myTeam : (match.myTeam ? match.myTeam.split(',') : ['', '', '']);
            let enemyTeamArr = Array.isArray(match.enemyTeam) ? match.enemyTeam : (match.enemyTeam ? match.enemyTeam.split(',') : ['', '', '']);
            const my1 = (myTeamArr[0] || "").trim(); const my2 = (myTeamArr[1] || "").trim(); const my3 = (myTeamArr[2] || "").trim();
            const result = match.result || "";
            const en1 = (enemyTeamArr[0] || "").trim(); const en2 = (enemyTeamArr[1] || "").trim(); const en3 = (enemyTeamArr[2] || "").trim();
            csvContent += `${date},${nickname},${opponent},${matchNum},${my1},${my2},${my3},${result},${en1},${en2},${en3}\n`;
          });
        });
        triggerDownload(csvContent, `길드전_원본기록_${new Date().toISOString().split('T')[0]}.csv`);
      };

      const handleExportStatsCSV = () => {
        if (records.length === 0) { showAlert("알림", "내보낼 데이터가 없습니다."); return; }
        let csvContent = "\uFEFF";
        csvContent += "--- 길드원 참여 및 승률 통계 ---\n순위,길드원 닉네임,기록제출 횟수,총 진행 전투(덱) 수,승리 횟수,승률(%)\n";
        memberStats.forEach((m, index) => { csvContent += `${index + 1},${m.name},${m.recordsCount},${m.totalMatches},${m.wins},${m.winRate}%\n`; });
        csvContent += "\n\n--- 많이 사용된 3인 덱 조합 통계 ---\n순위,사용된 덱 조합 (가나다순 정렬),사용 횟수,승리 횟수,승률(%)\n";
        fullDeckStats.forEach((d, index) => { csvContent += `${index + 1},"${d.deck}",${d.count},${d.wins},${d.winRate}%\n`; });
        triggerDownload(csvContent, `길드전_통계요약_${new Date().toISOString().split('T')[0]}.csv`);
      };

      const triggerDownload = (content, filename) => {
        const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url); link.setAttribute("download", filename); link.style.visibility = 'hidden';
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      const filteredRecords = records.map(record => {
        if (!filterChar.trim()) return record;
        const term = filterChar.toLowerCase().trim();
        if (record.nickname?.toLowerCase().includes(term)) return record;
        const filteredMatches = record.matches.filter(m => {
          let myTeamStr = Array.isArray(m.myTeam) ? m.myTeam.join(',') : (m.myTeam || '');
          let enemyTeamStr = Array.isArray(m.enemyTeam) ? m.enemyTeam.join(',') : (m.enemyTeam || '');
          return myTeamStr.toLowerCase().includes(term) || enemyTeamStr.toLowerCase().includes(term);
        });
        return { ...record, matches: filteredMatches };
      }).filter(record => record.matches && record.matches.length > 0);

      const groupedRecords = useMemo(() => {
        const groups = {};
        filteredRecords.forEach(record => {
          const groupKey = `${record.date} / vs ${record.opponent}`;
          if (!groups[groupKey]) groups[groupKey] = [];
          groups[groupKey].push(record);
        });
        return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
      }, [filteredRecords]);

      const toggleRecord = (id) => setExpandedRecords(prev => ({ ...prev, [id]: !prev[id] }));

      return (
        <div className="min-h-screen p-4 md:p-8 text-[15px] pb-32">
          
          <CustomModal 
            isOpen={alertModal.isOpen} onClose={() => setAlertModal({...alertModal, isOpen: false})} 
            title={alertModal.title} content={alertModal.content} 
            onConfirm={() => setAlertModal({...alertModal, isOpen: false})} hideCancel={true} 
          />
          <CustomModal 
            isOpen={confirmModal.isOpen} onClose={() => setConfirmModal({...confirmModal, isOpen: false})} 
            title={confirmModal.title} content={confirmModal.content} 
            onConfirm={confirmModal.action} confirmText={confirmModal.confirmText} 
          />

          {unlockModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-md p-4 animate-in fade-in duration-200">
              <div className="bg-zinc-900 border border-zinc-800 p-8 md:p-12 rounded-3xl shadow-2xl max-w-sm w-full relative">
                <button onClick={() => setUnlockModalOpen(false)} className="absolute top-4 right-4 p-2 text-zinc-500 hover:text-zinc-300 transition-colors"><IconX /></button>
                <div className="w-16 h-16 bg-red-900/30 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm border border-red-900/50"><IconLock /></div>
                <h2 className="text-2xl font-black text-zinc-50 mb-2 text-center">숨겨진 기능 해제</h2>
                <p className="text-zinc-400 mb-8 text-sm text-center">승인된 관리자 암호를 입력하세요.</p>
                <form onSubmit={handleAdminUnlock} className="space-y-4">
                  <input 
                    ref={unlockInputRef} type="password" value={unlockPwd} onChange={(e) => setUnlockPwd(e.target.value)} placeholder="비밀번호" 
                    className={`w-full px-5 py-4 border ${unlockError ? 'border-red-500 bg-red-950/20' : 'border-zinc-700 bg-zinc-950'} rounded-2xl focus:bg-zinc-900 focus:ring-2 focus:ring-red-600 outline-none text-center text-zinc-100 tracking-[0.5em] text-xl font-black shadow-inner transition-colors`}
                  />
                  {unlockError && <p className="text-red-500 text-xs text-center font-bold">비밀번호가 일치하지 않습니다.</p>}
                  <button type="submit" className="w-full bg-red-700 hover:bg-red-600 text-white text-lg font-black py-4 rounded-2xl shadow-lg transition-all mt-4">해제하기</button>
                </form>
              </div>
            </div>
          )}

          <div className="max-w-6xl mx-auto space-y-8">
            {!hasFirebaseConfig && (
              <div className="bg-red-900/50 text-red-200 p-5 rounded-2xl border border-red-800 font-bold shadow-sm text-center text-lg">
                ⚠️ 데이터베이스 미연결: Firebase 설정이 누락되었습니다.
              </div>
            )}

            <div className="bg-zinc-900 rounded-3xl shadow-xl border border-zinc-800 overflow-hidden">
              <div className="p-6 md:p-10 bg-gradient-to-b from-zinc-900 to-zinc-950">
                <h1 className="text-3xl md:text-4xl font-black text-zinc-50 tracking-tight">리더 길드 길드전 기록부</h1>
                <p className="text-zinc-400 mt-3 font-medium">실시간 데이터 동기화 및 전적 분석 시스템</p>
              </div>
              
              <div className="flex border-t border-zinc-800">
                <button onClick={() => setActiveTab('records')} className={`flex-1 py-5 text-center font-bold text-base transition-colors ${activeTab === 'records' ? 'bg-red-700 text-white' : 'text-zinc-400 hover:bg-zinc-800 hover:text-zinc-200'}`}>
                  길드전 기록추가
                </button>
                {isAdminMode && (
                  <button onClick={() => setActiveTab('management')} className={`flex-1 py-5 text-center font-bold text-base transition-colors ${activeTab === 'management' ? 'bg-red-700 text-white' : 'text-zinc-400 hover:bg-zinc-800 hover:text-zinc-200'}`}>
                    데이터 관리 (🔓)
                  </button>
                )}
              </div>
            </div>

            {activeTab === 'records' && (
              <div className="space-y-8 animate-in fade-in duration-300">
                <section className={`bg-zinc-900 p-6 md:p-8 rounded-3xl shadow-lg border transition-colors ${editingId ? 'border-red-800 bg-zinc-900/90' : 'border-zinc-800'}`}>
                  <div className="flex justify-between items-center mb-8">
                    <h2 className="text-2xl font-black text-zinc-100 flex items-center gap-3">
                      {editingId ? <><span className="text-red-500"><IconEdit /></span> 기존 기록 수정 중</> : '새 기록 추가'}
                    </h2>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div>
                      <label className="block text-base font-bold text-zinc-300 mb-2">길드원 닉네임</label>
                      <input type="text" placeholder="내 닉네임 입력" value={nickname} onChange={(e) => setNickname(e.target.value)} className="w-full px-5 py-4 border border-zinc-700 rounded-xl bg-zinc-800 text-zinc-100 text-lg font-bold focus:bg-zinc-950 focus:ring-2 focus:ring-red-600 outline-none transition-all placeholder-zinc-500 shadow-inner"/>
                    </div>
                    <div>
                      <label className="block text-base font-bold text-zinc-300 mb-2">날짜</label>
                      <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full px-5 py-4 border border-zinc-700 rounded-xl bg-zinc-800 text-zinc-100 text-lg font-bold focus:bg-zinc-950 focus:ring-2 focus:ring-red-600 outline-none transition-all shadow-inner"/>
                    </div>
                    <div>
                      <label className="block text-base font-bold text-zinc-300 mb-2">상대 길드</label>
                      <input type="text" placeholder="예: 일루나" value={opponent} onChange={(e) => setOpponent(e.target.value)} className="w-full px-5 py-4 border border-zinc-700 rounded-xl bg-zinc-800 text-zinc-100 text-lg font-bold focus:bg-zinc-950 focus:ring-2 focus:ring-red-600 outline-none transition-all placeholder-zinc-500 shadow-inner"/>
                    </div>
                  </div>

                  <div className="space-y-5 pb-4">
                    <label className="block text-base font-bold text-zinc-300 mb-3">전투 결과 입력 (돋보기를 눌러 텍스트 빠른 입력 가능 / 타이핑 시 자동 완성)</label>
                    {matches.map((match, index) => (
                      <div key={index} className="flex flex-col xl:flex-row gap-5 items-start xl:items-center bg-zinc-950/60 p-5 rounded-2xl border border-zinc-800 hover:border-zinc-600 transition-colors w-full shadow-sm">
                        <div className="flex items-center justify-between w-full xl:w-auto shrink-0 border-b xl:border-none border-zinc-800 pb-4 xl:pb-0">
                          <div className="flex items-center gap-3">
                            <span className="font-black text-zinc-400 text-2xl w-10 text-center">{index + 1}.</span>
                            <button onClick={() => handleQuickPaste(index)} className="text-red-400 hover:text-zinc-50 hover:bg-red-600 p-2.5 bg-zinc-800 rounded-xl transition-colors shadow-sm" title="텍스트 붙여넣기로 자동 완성">
                              <IconZoomIn />
                            </button>
                          </div>
                          <div className="xl:hidden">
                            <select value={match.result} onChange={(e) => handleMatchChange(index, 'result', e.target.value)} className={`px-4 py-3 border border-zinc-700 rounded-xl bg-zinc-800 font-black text-lg text-center shadow-sm focus:ring-2 focus:ring-red-600 outline-none ${match.result === '승리' ? 'text-blue-300' : 'text-red-400'}`}>
                              <option value="승리">승리</option><option value="패배">패배</option>
                            </select>
                          </div>
                        </div>

                        <div className="flex flex-col sm:flex-row gap-3 w-full xl:flex-1">
                          <div className="px-4 py-3 bg-blue-900/30 text-blue-300 border border-blue-900/50 rounded-xl font-bold text-sm shrink-0 flex items-center justify-center shadow-sm h-12">⚔️ 공격</div>
                          <div className="grid grid-cols-3 gap-3 w-full">
                            {[0, 1, 2].map(heroIdx => (
                              <SearchableSelect 
                                key={`my-${heroIdx}`}
                                value={match.myTeam[heroIdx]} 
                                onChange={(val) => handleTeamChange(index, 'myTeam', heroIdx, val)}
                                placeholder={`영웅 ${heroIdx + 1}`}
                                groups={HERO_GROUPS}
                              />
                            ))}
                          </div>
                        </div>

                        <div className="hidden xl:flex items-center shrink-0">
                          <select value={match.result} onChange={(e) => handleMatchChange(index, 'result', e.target.value)} className={`px-3 py-3 border border-zinc-700 rounded-xl bg-zinc-800 font-black text-lg w-28 text-center shadow-sm focus:ring-2 focus:ring-red-600 outline-none ${match.result === '승리' ? 'text-blue-300' : 'text-red-400'} h-12`}>
                            <option value="승리">승리</option><option value="패배">패배</option>
                          </select>
                        </div>
                        
                        <span className="hidden xl:block text-zinc-600 font-black text-2xl shrink-0">/</span>

                        <div className="flex flex-col sm:flex-row gap-3 w-full xl:flex-1">
                          <div className="px-4 py-3 bg-red-900/30 text-red-300 border border-red-900/50 rounded-xl font-bold text-sm shrink-0 flex items-center justify-center shadow-sm h-12">🛡️ 방어</div>
                          <div className="grid grid-cols-3 gap-3 w-full">
                            {[0, 1, 2].map(heroIdx => (
                              <SearchableSelect 
                                key={`enemy-${heroIdx}`}
                                value={match.enemyTeam[heroIdx]} 
                                onChange={(val) => handleTeamChange(index, 'enemyTeam', heroIdx, val)}
                                placeholder={`영웅 ${heroIdx + 1}`}
                                groups={HERO_GROUPS}
                              />
                            ))}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="flex gap-4 mt-8 relative z-0">
                    <button onClick={handleSave} className="flex-1 bg-gradient-to-r from-red-700 to-red-800 hover:from-red-600 hover:to-red-700 text-white text-lg font-black py-5 px-6 rounded-2xl shadow-lg transform hover:-translate-y-1 transition-all flex items-center justify-center gap-3 border border-red-950">
                      <IconSave /> {editingId ? '수정된 내용 저장' : '새 기록 저장하기'}
                    </button>
                    {editingId && (
                      <button onClick={resetForm} className="bg-zinc-800 text-zinc-300 font-bold text-lg py-5 px-8 rounded-2xl hover:bg-zinc-700 hover:text-white transition-all flex items-center justify-center gap-2 border border-zinc-700">
                        <IconX /> 취소
                      </button>
                    )}
                  </div>
                </section>

                <section className="flex flex-col md:flex-row gap-5">
                  <div className="relative flex-1">
                    <div className="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-zinc-400"><IconSearch /></div>
                    <input type="text" placeholder="영웅 이름 또는 닉네임 검색 (예: 프레이야)" value={filterChar} onChange={(e) => setFilterChar(e.target.value)} className="w-full pl-14 pr-5 py-4 border border-zinc-800 rounded-3xl bg-zinc-900 text-zinc-100 font-bold shadow-md focus:ring-2 focus:ring-red-600 outline-none text-lg transition-all placeholder-zinc-500" />
                  </div>
                  <button onClick={() => setShowStats(!showStats)} className="flex items-center justify-center gap-3 px-8 py-4 bg-zinc-900 text-red-400 border border-zinc-800 rounded-3xl font-black text-lg shadow-md hover:bg-zinc-800 hover:text-red-300 transition-all shrink-0">
                    <IconBarChart /> {showStats ? '통계 닫기' : '통계 열기'} {showStats ? <IconChevronUp /> : <IconChevronDown />}
                  </button>
                </section>

                {showStats && (
                  <section className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in slide-in-from-top-4 duration-300">
                    {/* 일자별 제출 현황 (신규 대시보드) */}
                    <div className="bg-zinc-900 p-6 md:p-8 rounded-3xl shadow-lg border border-zinc-800 md:col-span-2">
                      <h3 className="text-xl font-black text-zinc-100 mb-6 flex items-center gap-3">
                        <span className="p-2.5 bg-blue-900/30 text-blue-400 rounded-xl"><IconCalendar /></span> 
                        일자/요일별 기록 제출 현황 (최근 7일)
                      </h3>
                      {dailySubmissionStats.length === 0 ? (
                        <p className="text-zinc-400 text-base text-center py-6 font-medium">제출된 데이터가 없습니다.</p>
                      ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                          {dailySubmissionStats.map(stat => (
                            <div key={stat.date} className="bg-zinc-800/60 p-4 rounded-2xl border border-zinc-700/50 flex flex-col gap-3">
                              <div className="flex justify-between items-center border-b border-zinc-700 pb-2">
                                <span className="font-bold text-zinc-100">{stat.date} <span className="text-zinc-400 text-sm">({stat.dayOfWeek})</span></span>
                                <span className="text-sm px-2.5 py-1 bg-blue-900/40 text-blue-300 font-bold rounded-lg">{stat.count}명</span>
                              </div>
                              <div className="flex flex-wrap gap-1.5 max-h-24 overflow-y-auto custom-scrollbar pr-1">
                                {stat.names.map(name => (
                                  <span key={name} className="text-xs font-bold bg-zinc-700/80 text-zinc-300 px-2 py-1 rounded-md">{name}</span>
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>

                    <div className="bg-zinc-900 p-6 md:p-8 rounded-3xl shadow-lg border border-zinc-800">
                      <h3 className="text-xl font-black text-zinc-100 mb-6 flex items-center gap-3"><span className="p-2.5 bg-red-900/30 text-red-400 rounded-xl"><IconBarChart /></span> 많이 사용된 3인 덱 조합 (Top 5)</h3>
                      {deckStats.length === 0 ? <p className="text-zinc-400 text-base text-center py-10 font-medium">데이터가 부족합니다.</p> : (
                        <ul className="space-y-4">
                          {deckStats.map((stat, idx) => (
                            <li key={idx} className="flex flex-col gap-3 p-5 bg-zinc-800/60 rounded-2xl border border-zinc-700/50">
                              <div className="flex justify-between items-center">
                                <span className="font-bold text-zinc-100 text-base tracking-tight">{stat.deck}</span>
                                <span className="text-xs px-3 py-1.5 bg-zinc-700 text-zinc-200 font-bold rounded-lg shadow-sm border border-zinc-600">{stat.count}회 픽</span>
                              </div>
                              <div className="flex justify-between items-center text-sm">
                                <span className="text-zinc-400 font-bold">승률</span>
                                <span className={`text-lg font-black ${parseFloat(stat.winRate) >= 50 ? 'text-blue-300' : 'text-red-400'}`}>{stat.winRate}% <span className="text-sm font-bold text-zinc-400 ml-1">({stat.wins}승)</span></span>
                              </div>
                            </li>
                          ))}
                        </ul>
                      )}
                    </div>
                    <div className="bg-zinc-900 p-6 md:p-8 rounded-3xl shadow-lg border border-zinc-800">
                      <h3 className="text-xl font-black text-zinc-100 mb-6 flex items-center gap-3"><span className="p-2.5 bg-emerald-900/30 text-emerald-400 rounded-xl"><IconUsers /></span> 길드원 누적 승률 통계</h3>
                      <div className="overflow-y-auto max-h-[380px] pr-3 custom-scrollbar">
                        {memberStats.length === 0 ? <p className="text-zinc-400 text-base text-center py-10 font-medium">데이터가 부족합니다.</p> : (
                          <ul className="space-y-4">
                            {memberStats.map((member, idx) => (
                              <li key={idx} className="flex justify-between items-center p-5 bg-zinc-800/60 rounded-2xl border border-zinc-700/50">
                                <div>
                                  <p className="font-black text-zinc-100 text-lg">{member.name}</p>
                                  <p className="text-sm text-zinc-400 mt-1.5 font-bold">제출 {member.recordsCount}회 / 총 <span className="text-zinc-300">{member.totalMatches}전 {member.wins}승</span></p>
                                </div>
                                <div className="text-right">
                                  <p className="text-xs text-zinc-500 mb-1 font-bold">승률</p>
                                  <p className={`text-2xl font-black ${parseFloat(member.winRate) >= 50 ? 'text-blue-300' : 'text-red-400'}`}>{member.winRate}%</p>
                                </div>
                              </li>
                            ))}
                          </ul>
                        )}
                      </div>
                    </div>
                  </section>
                )}

                <section className="space-y-12">
                  {groupedRecords.length === 0 ? (
                    <div className="bg-zinc-900 p-16 text-center rounded-3xl shadow-lg border border-zinc-800 text-zinc-400 font-bold text-lg">
                      {filterChar ? '검색된 기록이 없습니다.' : '저장된 길드전 기록이 없습니다.'}
                    </div>
                  ) : (
                    groupedRecords.map(([groupKey, groupRecords]) => (
                      <div key={groupKey} className="animate-in fade-in duration-300">
                        <div className="flex items-center gap-4 mb-6 px-2">
                          <div className="p-3 bg-red-900/30 text-red-400 rounded-xl shadow-sm border border-red-900/50"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></div>
                          <h2 className="text-2xl font-black text-zinc-50 tracking-tight">{groupKey}</h2>
                        </div>
                        
                        <div className="space-y-6">
                          {groupRecords.map((record) => {
                            const isExpanded = expandedRecords[record.id] || filterChar.trim() !== '';
                            return (
                              <div key={record.id} className="bg-zinc-900 p-6 md:p-8 rounded-3xl shadow-xl border border-zinc-800 relative group">
                                {/* 관리자이거나 작성자 본인일 경우 수정/삭제 허용 */}
                                {(record.authorId === user?.uid || isAdminMode) && (
                                  <div className="absolute top-5 right-5 flex gap-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity bg-zinc-800/90 backdrop-blur-sm p-1.5 rounded-xl shadow-md border border-zinc-700 z-10">
                                    <button onClick={(e) => { e.stopPropagation(); handleEditClick(record); }} className="text-zinc-300 hover:text-blue-400 p-2 bg-zinc-900 hover:bg-zinc-800 rounded-lg transition-colors" title="기록 수정"><IconEdit /></button>
                                    <button onClick={(e) => { e.stopPropagation(); handleDelete(record.id); }} className="text-zinc-300 hover:text-red-500 p-2 bg-zinc-900 hover:bg-zinc-800 rounded-lg transition-colors" title="기록 삭제"><IconTrash /></button>
                                  </div>
                                )}
                                
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 cursor-pointer select-none" onClick={() => toggleRecord(record.id)}>
                                  <h3 className="text-lg font-bold text-zinc-100 flex items-center gap-3">
                                    <span className="bg-gradient-to-r from-red-800 to-red-950 border border-red-800 text-zinc-100 px-4 py-2 rounded-xl text-base font-black shadow-sm">{record.nickname || '익명'}</span>
                                    <span className="text-zinc-400 font-bold">님의 기록</span>
                                  </h3>
                                  <div className={`flex items-center ${(record.authorId === user?.uid || isAdminMode) ? 'pr-16 md:pr-0' : ''}`}>
                                    <div className="text-zinc-400 hover:text-zinc-200 transition-colors flex items-center gap-2 font-bold text-sm bg-zinc-800 px-4 py-2 rounded-xl">
                                      {isExpanded ? '닫기' : '열기'} {isExpanded ? <IconChevronUp /> : <IconChevronDown />}
                                    </div>
                                  </div>
                                </div>
                                
                                {isExpanded && (
                                  <div className="mt-6 pt-6 border-t border-zinc-800 animate-in slide-in-from-top-2 duration-300">
                                    <ul className="space-y-4 w-full">
                                      {record.matches.map((match, idx) => {
                                        let myArr = Array.isArray(match.myTeam) ? match.myTeam : (match.myTeam ? match.myTeam.split(',') : []);
                                        let enArr = Array.isArray(match.enemyTeam) ? match.enemyTeam : (match.enemyTeam ? match.enemyTeam.split(',') : []);
                                        let myStr = myArr.join(', ').trim();
                                        let enStr = enArr.join(', ').trim();
                                        
                                        return (
                                          <li key={idx} className="flex flex-col xl:flex-row gap-5 bg-zinc-950/80 p-5 rounded-2xl border border-zinc-800/60 hover:bg-zinc-800 transition-colors w-full">
                                            <div className="flex items-center justify-between w-full xl:w-auto">
                                              <div className="flex items-center gap-3 w-10 shrink-0"><span className="font-black text-zinc-500 text-xl">{idx + 1}.</span></div>
                                              <div className={`xl:hidden font-black text-xl ${match.result === '승리' ? 'text-blue-400' : 'text-red-500'}`}>{match.result}</div>
                                            </div>
                                            <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full xl:flex-1">
                                              <div className="px-4 py-2 bg-blue-900/30 text-blue-300 rounded-lg text-sm font-bold shrink-0 shadow-sm border border-blue-900/50 text-center">⚔️ 공격</div>
                                              <div className="flex-1 flex items-center justify-center gap-2 bg-zinc-900 px-5 py-4 rounded-xl border border-zinc-700 shadow-sm text-center">
                                                <span className="font-bold text-zinc-100 text-base tracking-wide select-all">{myStr || '-'}</span>
                                              </div>
                                            </div>
                                            <div className={`hidden xl:block font-black text-xl w-16 text-center shrink-0 ${match.result === '승리' ? 'text-blue-400' : 'text-red-500'}`}>{match.result}</div>
                                            <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full xl:flex-1">
                                              <div className="px-4 py-2 bg-red-900/30 text-red-300 rounded-lg text-sm font-bold shrink-0 shadow-sm border border-red-900/50 text-center">🛡️ 방어</div>
                                              <div className="flex-1 flex items-center justify-center gap-2 bg-zinc-900 px-5 py-4 rounded-xl border border-zinc-700 shadow-sm text-center">
                                                <span className="font-bold text-zinc-100 text-base tracking-wide select-all">{enStr || '-'}</span>
                                              </div>
                                            </div>
                                          </li>
                                        )
                                      })}
                                    </ul>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))
                  )}
                </section>
              </div>
            )}

            {activeTab === 'management' && isAdminMode && (
              <div className="animate-in fade-in duration-300">
                <div className="bg-zinc-900 p-8 md:p-12 rounded-3xl shadow-2xl border border-zinc-800">
                  <div className="mb-10 border-b border-zinc-800 pb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div>
                      <h2 className="text-3xl font-black text-zinc-50">데이터 관리 대시보드</h2>
                      <p className="text-zinc-400 mt-3 font-bold text-base">관리자 권한이 확인되었습니다.</p>
                    </div>
                    
                    <div className="flex flex-col gap-3 w-full md:w-auto">
                      <button onClick={handleExportStatsCSV} className="flex items-center justify-center gap-3 px-6 py-4 bg-emerald-900/40 text-emerald-400 hover:bg-emerald-800/60 border border-emerald-800/50 font-bold text-base rounded-2xl shadow-sm transition-all">
                        <IconBarChart /> 통계 결과 내보내기 (CSV)
                      </button>
                      <button onClick={handleExportRawCSV} className="flex items-center justify-center gap-3 px-6 py-4 bg-zinc-800 text-zinc-200 hover:bg-zinc-700 hover:text-white border border-zinc-700 font-bold text-base rounded-2xl shadow-sm transition-all">
                        <IconDownload /> 원본 데이터 내보내기 (CSV)
                      </button>
                    </div>
                  </div>

                  <div className="bg-red-950/30 p-8 md:p-10 rounded-3xl border border-red-900/50 flex flex-col md:flex-row items-center justify-between gap-8 shadow-sm">
                    <div>
                      <h3 className="text-xl font-black text-red-500 mb-3 flex items-center gap-3"><IconTrash /> 전적 전체 삭제</h3>
                      <p className="text-red-400/80 text-base font-bold">
                        현재 저장된 <strong className="text-red-400 font-black text-lg">{records.length}개</strong>의 모든 기록을 삭제합니다.<br/>
                        ※ Firebase 규칙에 따라 권한이 없는 글은 삭제되지 않을 수 있습니다.
                      </p>
                    </div>
                    <button onClick={handleDeleteAll} className="w-full md:w-auto px-10 py-5 bg-red-700 hover:bg-red-600 text-white text-lg font-black rounded-2xl shadow-lg transition-all shrink-0">
                      모든 데이터 삭제
                    </button>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
