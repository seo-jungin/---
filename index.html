<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리더 길드 길드전 기록부</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 최신 유행 폰트: Pretendard -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  
  <!-- React, ReactDOM, Babel (CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #f8fafc; /* slate-50 */
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      border-radius: 20px;
    }
  </style>
</head>
<body class="text-slate-800">
  <div id="root"></div>

  <!-- React Logic -->
  <script type="text/babel" data-type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const { useState, useEffect, useMemo } = React;

    // 아이콘 SVG 컴포넌트
    const IconTrash = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>;
    const IconEdit = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
    const IconSave = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
    const IconSearch = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconBarChart = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>;
    const IconUsers = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
    const IconChevronDown = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
    const IconChevronUp = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>;
    const IconX = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconZoomIn = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>;
    const IconLock = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;

    // [중요] 외부 배포용 Firebase 설정 (실제 키 유지됨)
    const fallbackFirebaseConfig = {
      apiKey: "AIzaSyAqSgVY3zJAmKpLSnxrM5YVMVnqTw8JfTI",
      authDomain: "warr-384d8.firebaseapp.com",
      projectId: "warr-384d8",
      storageBucket: "warr-384d8.firebasestorage.app",
      messagingSenderId: "619085647485",
      appId: "1:619085647485:web:03cf09b1a9f0d7e6062b14"
    };
    
    let myFirebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackFirebaseConfig;
    
    let app = null, auth = null, db = null, hasFirebaseConfig = false;
    try {
      if (myFirebaseConfig && myFirebaseConfig.apiKey) {
        app = initializeApp(myFirebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        hasFirebaseConfig = true;
      }
    } catch (error) {
      console.error("Firebase 초기화 오류:", error);
    }

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'sevens-guild-war-app';
    const COLLECTION_NAME = 'guild_war_records';

    // 원작 영웅 일괄 보강
    const PREDEFINED_HERO_GROUPS = [
      { group: "세븐나이츠", heroes: ["루디", "아일린", "레이첼", "델론즈", "제이브", "스파이크", "크리스", "바네사"] },
      { group: "구세븐나이츠", heroes: ["파이", "겔리두스", "밀리아", "로지", "쥬리", "알프", "라디우스"] },
      { group: "다크나이츠", heroes: ["멜키르", "브브", "플라튼", "콜트", "팔라누스", "실베스타"] },
      { group: "사황/구사황", heroes: ["에이스", "여포", "손오공", "린", "태오", "카르마", "카일", "연희"] },
      { group: "숨은 강자들", heroes: ["클레미스", "아멜리아", "잉그리드", "카구라", "미스트", "프레이야", "아비갈", "앤티", "뮬란"] },
      { group: "천상의 수호자", heroes: ["트루드", "프레이야", "라드그리드", "스쿨드", "펜리르", "레긴레이프"] },
      { group: "혁명단/나이트크로우", heroes: ["엘리시아", "키리엘", "라이언", "칼 헤론", "오를리", "타카", "아킬라"] },
      { group: "펜타곤/칠대성", heroes: ["아리스", "스피나", "클레오", "길라한", "엘리니아", "관우", "제갈량", "초선", "조운"] },
      { group: "일반/모험가/기타", heroes: ["에반", "카린", "스니퍼", "쥬피", "유리", "아리엘", "실비아", "벨리카", "풍연", "비담", "유신", "앨리스", "아라곤"] }
    ];

    const App = () => {
      const [user, setUser] = useState(null);
      const [records, setRecords] = useState([]);
      const [filterChar, setFilterChar] = useState('');
      const [showStats, setShowStats] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [customHeroes, setCustomHeroes] = useState([]); 
      
      // 카테고리 및 데이터 관리 상태
      const [activeTab, setActiveTab] = useState('records');
      const [isUnlocked, setIsUnlocked] = useState(false);
      const [pwInput, setPwInput] = useState('');
      
      const [nickname, setNickname] = useState('');
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [opponent, setOpponent] = useState('');
      const [matches, setMatches] = useState(
        Array.from({ length: 5 }, () => ({
          type: '공격', myTeam: ['', '', ''], result: '승리', enemyTeam: ['', '', '']
        }))
      );

      const HERO_GROUPS = useMemo(() => {
        if (customHeroes.length === 0) return PREDEFINED_HERO_GROUPS;
        return [...PREDEFINED_HERO_GROUPS, { group: "기타 (자동추가)", heroes: customHeroes }];
      }, [customHeroes]);

      useEffect(() => {
        if (!hasFirebaseConfig || !auth) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("인증 실패:", error);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!hasFirebaseConfig || !user || !db) return;
        const dbRef = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);
        const unsubscribe = onSnapshot(dbRef, 
          (snapshot) => {
            const fetchedRecords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            fetchedRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(fetchedRecords);
          },
          (error) => console.error("데이터 불러오기 실패:", error)
        );
        return () => unsubscribe();
      }, [user]);

      const deckStats = useMemo(() => {
        const counts = {};
        records.forEach(record => {
          record.matches.forEach(match => {
            if (match.myTeam && match.myTeam.includes(',')) {
              const deckArr = match.myTeam.split(',').map(h => h.trim()).filter(Boolean).sort();
              if (deckArr.length === 3) {
                const deckKey = deckArr.join(', ');
                if (!counts[deckKey]) counts[deckKey] = { deck: deckKey, count: 0, wins: 0 };
                counts[deckKey].count += 1;
                if (match.result === '승리') counts[deckKey].wins += 1;
              }
            }
          });
        });
        return Object.values(counts)
          .map(s => ({ ...s, winRate: ((s.wins / s.count) * 100).toFixed(1) }))
          .sort((a, b) => b.count - a.count)
          .slice(0, 5);
      }, [records]);

      const memberStats = useMemo(() => {
        const stats = {};
        records.forEach(record => {
          const name = record.nickname || '익명';
          if (!stats[name]) stats[name] = { name, recordsCount: 0, totalMatches: 0, wins: 0 };
          stats[name].recordsCount += 1;
          record.matches.forEach(match => {
            stats[name].totalMatches += 1;
            if (match.result === '승리') stats[name].wins += 1;
          });
        });
        return Object.values(stats)
          .map(s => ({
            ...s,
            winRate: s.totalMatches > 0 ? ((s.wins / s.totalMatches) * 100).toFixed(1) : 0
          }))
          .sort((a, b) => b.recordsCount - a.recordsCount);
      }, [records]);

      const handleTeamChange = (index, teamType, heroIndex, value) => {
        const newMatches = [...matches];
        newMatches[index][teamType][heroIndex] = value;
        setMatches(newMatches);
      };

      const handleMatchChange = (index, field, value) => {
        const newMatches = [...matches];
        newMatches[index][field] = value;
        setMatches(newMatches);
      };

      const handleQuickPaste = (index) => {
        const text = window.prompt("전투 기록을 붙여넣으세요.\n예: 프레이야, 바네사, 키리엘 (승리) / 프레이야, 초선, 키리엘");
        if (!text) return;

        let result = '승리';
        if (text.includes('(패배)') || text.includes('패배')) result = '패배';

        // 대괄호와 소괄호 텍스트 모두 제거 (불필요한 정보 필터링)
        let cleanText = text.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '');
        let sides = cleanText.split('/');
        
        let myTeamStr = sides[0] ? sides[0].trim() : '';
        let enemyTeamStr = sides[1] ? sides[1].trim() : '';

        const parseTeam = (str) => {
          if (!str) return ['', '', ''];
          let arr = str.includes(',') ? str.split(',') : str.split(/\s+/);
          arr = arr.map(s => s.trim()).filter(Boolean);
          return [arr[0] || '', arr[1] || '', arr[2] || ''];
        };

        const parsedMyTeam = parseTeam(myTeamStr);
        const parsedEnemyTeam = parseTeam(enemyTeamStr);

        const allPredefined = PREDEFINED_HERO_GROUPS.flatMap(g => g.heroes);
        const newDetectedHeroes = [...parsedMyTeam, ...parsedEnemyTeam].filter(
          h => h !== '' && !allPredefined.includes(h) && !customHeroes.includes(h)
        );
        
        if (newDetectedHeroes.length > 0) {
          setCustomHeroes(prev => [...prev, ...newDetectedHeroes]);
        }

        const newMatches = [...matches];
        newMatches[index] = {
          type: '공격', // type은 공격으로 고정 (데이터 하위호환 유지용)
          myTeam: parsedMyTeam,
          result,
          enemyTeam: parsedEnemyTeam
        };
        setMatches(newMatches);
      };

      const resetForm = () => {
        setOpponent('');
        setMatches(Array.from({ length: 5 }, () => ({
          type: '공격', myTeam: ['', '', ''], result: '승리', enemyTeam: ['', '', '']
        })));
        setEditingId(null);
      };

      const handleSave = async () => {
        if (!hasFirebaseConfig) {
          alert("Firebase 설정이 연결되지 않아 저장할 수 없습니다.");
          return;
        }
        if (!user) {
          alert("인증 정보(User)가 없습니다. Firebase 콘솔에서 [Authentication] -> [Sign-in method] -> [익명 로그인]이 활성화되어 있는지 확인해 주세요.");
          return;
        }
        if (!nickname || !date || !opponent) {
          alert("닉네임, 날짜, 상대 길드명을 모두 입력해주세요.");
          return;
        }

        const formattedMatches = matches.map(m => ({
          ...m,
          myTeam: m.myTeam.filter(Boolean).join(', '),
          enemyTeam: m.enemyTeam.filter(Boolean).join(', ')
        })).filter(m => m.myTeam.trim() !== '' || m.enemyTeam.trim() !== '');
        
        if (formattedMatches.length === 0) {
          alert("최소 1개 이상의 전투 기록을 입력해주세요.");
          return;
        }

        try {
          if (editingId) {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, editingId);
            await updateDoc(docRef, { nickname, date, opponent, matches: formattedMatches, updatedAt: Date.now() });
          } else {
            const dbRef = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);
            await addDoc(dbRef, { nickname, date, opponent, matches: formattedMatches, createdAt: Date.now(), authorId: user.uid });
          }
          resetForm();
          alert("성공적으로 저장되었습니다.");
        } catch (error) {
          console.error("저장 실패:", error);
          alert("데이터 저장 중 오류가 발생했습니다.");
        }
      };

      const handleEditClick = (record) => {
        setEditingId(record.id);
        setNickname(record.nickname || '');
        setDate(record.date || new Date().toISOString().split('T')[0]);
        setOpponent(record.opponent || '');

        const loadedMatches = record.matches.map(m => {
          const myTeamArr = m.myTeam ? m.myTeam.split(',').map(s => s.trim()) : [];
          const enemyTeamArr = m.enemyTeam ? m.enemyTeam.split(',').map(s => s.trim()) : [];
          
          const allPredefined = PREDEFINED_HERO_GROUPS.flatMap(g => g.heroes);
          const newDetectedHeroes = [...myTeamArr, ...enemyTeamArr].filter(
            h => h !== '' && !allPredefined.includes(h) && !customHeroes.includes(h)
          );
          if (newDetectedHeroes.length > 0) {
            setCustomHeroes(prev => [...prev, ...newDetectedHeroes]);
          }

          return {
            type: '공격',
            myTeam: [...myTeamArr, '', '', ''].slice(0, 3),
            result: m.result || '승리',
            enemyTeam: [...enemyTeamArr, '', '', ''].slice(0, 3)
          };
        });

        while (loadedMatches.length < 5) {
          loadedMatches.push({ type: '공격', myTeam: ['', '', ''], result: '승리', enemyTeam: ['', '', ''] });
        }
        setMatches(loadedMatches);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleDelete = async (id) => {
        if (!hasFirebaseConfig) return;
        if (!user) {
          alert("인증 정보가 없어 삭제 권한을 확인할 수 없습니다.");
          return;
        }
        if (confirm("이 기록을 삭제하시겠습니까? (삭제 후 복구할 수 없습니다)")) {
          try {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, id));
            if (editingId === id) resetForm();
          } catch (error) {
            console.error("삭제 실패:", error);
          }
        }
      };

      const handleDeleteAll = async () => {
        if (!isUnlocked) return;
        if (records.length === 0) {
          alert("삭제할 데이터가 없습니다.");
          return;
        }
        
        const answer = prompt(`총 ${records.length}개의 전적 데이터를 모두 삭제합니다.\n이 작업은 절대 복구할 수 없습니다.\n정말로 진행하시려면 아래에 "전체삭제" 라고 입력해주세요.`);
        if (answer === "전체삭제") {
          try {
            let successCount = 0;
            let failCount = 0;

            for (const record of records) {
              try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, record.id));
                successCount++;
              } catch (e) {
                failCount++;
              }
            }

            let msg = `작업이 완료되었습니다.\n성공적으로 삭제됨: ${successCount}건`;
            if (failCount > 0) {
              msg += `\n실패함(권한 부족 등): ${failCount}건\n※ Firestore 보안 규칙에 의해 타인의 글은 삭제되지 않았을 수 있습니다.`;
            }
            alert(msg);

          } catch (error) {
            console.error(error);
            alert("전체 삭제 진행 중 알 수 없는 에러가 발생했습니다.");
          }
        } else if (answer !== null) {
          alert("입력이 일치하지 않아 취소되었습니다.");
        }
      };

      const handlePwSubmit = (e) => {
        e.preventDefault();
        // 비밀번호 3188로 변경 완료
        if (pwInput === "3188") {
          setIsUnlocked(true);
          setPwInput('');
        } else {
          alert("비밀번호가 일치하지 않습니다.");
          setPwInput('');
        }
      };

      const filteredRecords = records.map(record => {
        if (!filterChar.trim()) return record;
        const term = filterChar.toLowerCase().trim();
        if (record.nickname?.toLowerCase().includes(term)) return record;
        const filteredMatches = record.matches.filter(m => m.myTeam.toLowerCase().includes(term) || m.enemyTeam.toLowerCase().includes(term));
        return { ...record, matches: filteredMatches };
      }).filter(record => record.matches && record.matches.length > 0);

      // 데이터를 날짜와 상대 길드를 기준으로 그룹화
      const groupedRecords = useMemo(() => {
        const groups = {};
        filteredRecords.forEach(record => {
          const groupKey = `${record.date} / vs ${record.opponent}`;
          if (!groups[groupKey]) {
            groups[groupKey] = [];
          }
          groups[groupKey].push(record);
        });
        
        // 날짜를 기준으로 내림차순 정렬 (최신 날짜가 위로 오도록)
        return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
      }, [filteredRecords]);

      return (
        <div className="min-h-screen p-4 md:p-8">
          <div className="max-w-6xl mx-auto space-y-6">
            
            {!hasFirebaseConfig && (
              <div className="bg-red-50 text-red-700 p-4 rounded-2xl border border-red-200 font-bold shadow-sm">
                ⚠️ 데이터베이스 미연결: Firebase 설정 누락
              </div>
            )}

            {/* 메인 헤더 & 카테고리 탭 */}
            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
              <div className="p-6 md:p-8 bg-gradient-to-br from-indigo-50 to-white">
                <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">리더 길드 길드전 기록부</h1>
                <p className="text-slate-500 mt-2 text-sm">실시간 데이터 동기화 및 전적 분석 시스템</p>
              </div>
              
              <div className="flex border-t border-slate-100">
                <button 
                  onClick={() => setActiveTab('records')}
                  className={`flex-1 py-4 text-center font-bold text-sm transition-colors ${activeTab === 'records' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}
                >
                  길드전 기록추가
                </button>
                <button 
                  onClick={() => setActiveTab('management')}
                  className={`flex-1 py-4 text-center font-bold text-sm transition-colors ${activeTab === 'management' ? 'bg-indigo-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}
                >
                  데이터 관리
                </button>
              </div>
            </div>

            {/* 탭: 길드전 기록추가 */}
            {activeTab === 'records' && (
              <div className="space-y-6 animate-in fade-in duration-300">
                {/* 폼 입력 섹션 */}
                <section className={`bg-white p-6 md:p-8 rounded-3xl shadow-sm border transition-colors ${editingId ? 'border-indigo-300 bg-indigo-50/30' : 'border-slate-100'}`}>
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                      {editingId ? <><span className="text-indigo-600"><IconEdit /></span> 기존 기록 수정 중</> : '새 기록 추가'}
                    </h2>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-2">길드원 닉네임</label>
                      <input 
                        type="text" placeholder="내 닉네임 입력" value={nickname} onChange={(e) => setNickname(e.target.value)}
                        className="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-2">날짜</label>
                      <input 
                        type="date" value={date} onChange={(e) => setDate(e.target.value)}
                        className="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-2">상대 길드</label>
                      <input 
                        type="text" placeholder="예: 일루나" value={opponent} onChange={(e) => setOpponent(e.target.value)}
                        className="w-full px-4 py-3 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
                      />
                    </div>
                  </div>

                  <div className="space-y-4 overflow-x-auto pb-4 custom-scrollbar">
                    <label className="block text-sm font-semibold text-slate-700 min-w-[900px] mb-2">전투 결과 입력 (돋보기를 눌러 텍스트 빠른 입력 가능)</label>
                    {matches.map((match, index) => (
                      <div key={index} className="flex flex-nowrap gap-3 items-center bg-slate-50/50 p-3 rounded-2xl border border-slate-100 min-w-[900px] hover:border-indigo-100 hover:bg-indigo-50/10 transition-colors">
                        <div className="flex items-center gap-2 w-16 shrink-0 justify-center">
                          <span className="font-bold text-slate-400 text-lg">{index + 1}</span>
                          <button 
                            onClick={() => handleQuickPaste(index)} 
                            className="text-indigo-500 hover:text-white hover:bg-indigo-500 p-1.5 bg-indigo-50 rounded-lg transition-colors" 
                            title="텍스트 붙여넣기로 자동 완성"
                          >
                            <IconZoomIn />
                          </button>
                        </div>

                        {/* 내 덱 (공격 고정) */}
                        <div className="px-3 py-2 bg-indigo-50 text-indigo-700 rounded-xl font-bold text-sm shrink-0 flex items-center shadow-sm">
                          ⚔️ 공격
                        </div>
                        <div className="flex flex-1 gap-2 min-w-[250px]">
                          {[0, 1, 2].map(heroIdx => (
                            <select key={`my-${heroIdx}`} value={match.myTeam[heroIdx]} onChange={(e) => handleTeamChange(index, 'myTeam', heroIdx, e.target.value)} className="flex-1 px-3 py-2 border border-slate-200 rounded-xl bg-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                              <option value="" className="text-slate-400">영웅 {heroIdx + 1}</option>
                              {HERO_GROUPS.map(g => <optgroup key={`my-grp-${g.group}`} label={g.group}>{g.heroes.map(h => <option key={`my-${h}`} value={h}>{h}</option>)}</optgroup>)}
                            </select>
                          ))}
                        </div>

                        {/* 승패 선택 (가운데 고정) */}
                        <select value={match.result} onChange={(e) => handleMatchChange(index, 'result', e.target.value)} className={`px-2 py-2 border border-slate-200 rounded-xl bg-white font-extrabold w-20 text-center shrink-0 shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none ${match.result === '승리' ? 'text-blue-600' : 'text-red-500'}`}>
                          <option value="승리">승리</option>
                          <option value="패배">패배</option>
                        </select>
                        
                        <span className="text-slate-300 font-black text-xl shrink-0">/</span>

                        {/* 상대 덱 (방어 고정) */}
                        <div className="px-3 py-2 bg-rose-50 text-rose-700 rounded-xl font-bold text-sm shrink-0 flex items-center shadow-sm">
                          🛡️ 방어
                        </div>
                        <div className="flex flex-1 gap-2 min-w-[250px]">
                          {[0, 1, 2].map(heroIdx => (
                            <select key={`enemy-${heroIdx}`} value={match.enemyTeam[heroIdx]} onChange={(e) => handleTeamChange(index, 'enemyTeam', heroIdx, e.target.value)} className="flex-1 px-3 py-2 border border-slate-200 rounded-xl bg-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                              <option value="" className="text-slate-400">영웅 {heroIdx + 1}</option>
                              {HERO_GROUPS.map(g => <optgroup key={`enemy-grp-${g.group}`} label={g.group}>{g.heroes.map(h => <option key={`enemy-${h}`} value={h}>{h}</option>)}</optgroup>)}
                            </select>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="flex gap-4 mt-6">
                    <button onClick={handleSave} className="flex-1 bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 text-white font-bold py-4 px-6 rounded-2xl shadow-md transform hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                      <IconSave /> {editingId ? '수정된 내용 저장' : '새 기록 저장하기'}
                    </button>
                    {editingId && (
                      <button onClick={resetForm} className="bg-slate-200 text-slate-700 font-bold py-4 px-6 rounded-2xl hover:bg-slate-300 transition-all flex items-center justify-center gap-2">
                        <IconX /> 취소
                      </button>
                    )}
                  </div>
                </section>

                {/* 통계 토글 및 검색 섹션 */}
                <section className="flex flex-col md:flex-row gap-4">
                  <div className="relative flex-1">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                      <IconSearch />
                    </div>
                    <input
                      type="text" placeholder="영웅 이름 또는 닉네임 검색 (예: 프레이야)" value={filterChar} onChange={(e) => setFilterChar(e.target.value)}
                      className="w-full pl-12 pr-4 py-4 border border-slate-200 rounded-3xl bg-white shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none text-base transition-all"
                    />
                  </div>
                  <button 
                    onClick={() => setShowStats(!showStats)}
                    className="flex items-center justify-center gap-2 px-6 py-4 bg-white text-indigo-600 border border-slate-200 rounded-3xl font-bold shadow-sm hover:bg-indigo-50 transition-all shrink-0"
                  >
                    <IconBarChart />
                    {showStats ? '통계 닫기' : '통계 열기'}
                    {showStats ? <IconChevronUp /> : <IconChevronDown />}
                  </button>
                </section>

                {/* 통계 대시보드 */}
                {showStats && (
                  <section className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in slide-in-from-top-4 duration-300">
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100">
                      <h3 className="text-lg font-extrabold text-slate-800 mb-5 flex items-center gap-2">
                        <span className="p-2 bg-indigo-100 text-indigo-600 rounded-xl"><IconBarChart /></span>
                        많이 사용된 3인 덱 조합 (Top 5)
                      </h3>
                      {deckStats.length === 0 ? (
                        <p className="text-slate-500 text-sm text-center py-8">데이터가 부족합니다.</p>
                      ) : (
                        <ul className="space-y-4">
                          {deckStats.map((stat, idx) => (
                            <li key={idx} className="flex flex-col gap-2 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                              <div className="flex justify-between items-center">
                                <span className="font-bold text-slate-800 tracking-tight">{stat.deck}</span>
                                <span className="text-xs px-2.5 py-1 bg-indigo-100 text-indigo-700 font-bold rounded-lg shadow-sm">
                                  {stat.count}회 픽
                                </span>
                              </div>
                              <div className="flex justify-between items-center text-sm">
                                <span className="text-slate-500 font-medium">승률</span>
                                <span className={`font-bold ${parseFloat(stat.winRate) >= 50 ? 'text-blue-600' : 'text-red-500'}`}>
                                  {stat.winRate}% ({stat.wins}승)
                                </span>
                              </div>
                            </li>
                          ))}
                        </ul>
                      )}
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100">
                      <h3 className="text-lg font-extrabold text-slate-800 mb-5 flex items-center gap-2">
                        <span className="p-2 bg-emerald-100 text-emerald-600 rounded-xl"><IconUsers /></span>
                        길드원 참여 및 승률 통계
                      </h3>
                      <div className="overflow-y-auto max-h-[350px] pr-2 custom-scrollbar">
                        {memberStats.length === 0 ? (
                          <p className="text-slate-500 text-sm text-center py-8">데이터가 부족합니다.</p>
                        ) : (
                          <ul className="space-y-3">
                            {memberStats.map((member, idx) => (
                              <li key={idx} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <div>
                                  <p className="font-bold text-slate-800">{member.name}</p>
                                  <p className="text-xs text-slate-500 mt-1 font-medium">
                                    제출 {member.recordsCount}회 / 총 {member.totalMatches}전 {member.wins}승
                                  </p>
                                </div>
                                <div className="text-right">
                                  <p className="text-xs text-slate-400 mb-1 font-medium">승률</p>
                                  <p className={`text-lg font-extrabold ${parseFloat(member.winRate) >= 50 ? 'text-blue-600' : 'text-red-500'}`}>
                                    {member.winRate}%
                                  </p>
                                </div>
                              </li>
                            ))}
                          </ul>
                        )}
                      </div>
                    </div>
                  </section>
                )}

                {/* 기록 목록 섹션 (일자별 그룹화 적용) */}
                <section className="space-y-10">
                  {groupedRecords.length === 0 ? (
                    <div className="bg-white p-12 text-center rounded-3xl shadow-sm border border-slate-100 text-slate-500 font-medium">
                      {filterChar ? '검색된 기록이 없습니다.' : '저장된 길드전 기록이 없습니다.'}
                    </div>
                  ) : (
                    groupedRecords.map(([groupKey, groupRecords]) => (
                      <div key={groupKey} className="animate-in fade-in duration-300">
                        {/* 그룹(날짜/상대) 헤더 */}
                        <div className="flex items-center gap-3 mb-5 px-2">
                          <div className="p-2 bg-indigo-100 text-indigo-700 rounded-xl shadow-sm">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                          </div>
                          <h2 className="text-2xl font-extrabold text-slate-800 tracking-tight">{groupKey}</h2>
                        </div>
                        
                        <div className="space-y-4">
                          {groupRecords.map((record) => (
                            <div key={record.id} className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 relative group overflow-x-auto custom-scrollbar">
                              {/* 글 수정/삭제 버튼 */}
                              {record.authorId === user?.uid && (
                                <div className="absolute top-6 right-6 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity bg-white/80 backdrop-blur-sm p-1 rounded-xl">
                                  <button onClick={() => handleEditClick(record)} className="text-slate-400 hover:text-indigo-600 p-2 bg-slate-50 hover:bg-indigo-50 rounded-lg transition-colors" title="기록 수정"><IconEdit /></button>
                                  <button onClick={() => handleDelete(record.id)} className="text-slate-400 hover:text-red-500 p-2 bg-slate-50 hover:bg-red-50 rounded-lg transition-colors" title="기록 삭제"><IconTrash /></button>
                                </div>
                              )}
                              
                              <h3 className="text-lg font-bold text-slate-800 mb-6 pb-4 border-b border-slate-100 flex items-center gap-3">
                                <span className="bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-3.5 py-1.5 rounded-xl text-sm font-bold shadow-sm">{record.nickname || '익명'}</span>
                                <span className="text-slate-500 text-sm font-medium">님의 길드전 기록</span>
                              </h3>
                              
                              <ul className="space-y-3 min-w-[700px]">
                                {record.matches.map((match, idx) => (
                                  <li key={idx} className="flex items-center gap-4 bg-slate-50/50 p-4 rounded-2xl border border-slate-100 hover:bg-slate-50 transition-colors">
                                    <div className="flex items-center gap-3 w-12 shrink-0">
                                      <span className="font-extrabold text-slate-400">{idx + 1}.</span>
                                    </div>
                                    <div className="px-3 py-1.5 bg-indigo-50 text-indigo-700 rounded-lg text-xs font-bold shrink-0 shadow-sm border border-indigo-100">⚔️ 공격</div>
                                    <div className="flex-1 flex items-center justify-center gap-2 bg-white px-4 py-3 rounded-xl border border-slate-200 shadow-sm">
                                      <span className="font-bold text-slate-800 tracking-tight">{match.myTeam || '-'}</span>
                                    </div>
                                    <div className={`font-extrabold text-lg w-16 text-center shrink-0 ${match.result === '승리' ? 'text-blue-600' : 'text-red-500'}`}>
                                      {match.result}
                                    </div>
                                    <div className="px-3 py-1.5 bg-rose-50 text-rose-700 rounded-lg text-xs font-bold shrink-0 shadow-sm border border-rose-100">🛡️ 방어</div>
                                    <div className="flex-1 flex items-center justify-center gap-2 bg-white px-4 py-3 rounded-xl border border-slate-200 shadow-sm">
                                      <span className="font-bold text-slate-800 tracking-tight">{match.enemyTeam || '-'}</span>
                                    </div>
                                  </li>
                                ))}
                              </ul>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))
                  )}
                </section>
              </div>
            )}

            {/* 탭: 데이터 관리 (비밀번호 보호) */}
            {activeTab === 'management' && (
              <div className="animate-in fade-in duration-300">
                {!isUnlocked ? (
                  /* 암호 입력 화면 */
                  <div className="bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-slate-100 max-w-md mx-auto text-center mt-10">
                    <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
                      <IconLock />
                    </div>
                    <h2 className="text-2xl font-extrabold text-slate-800 mb-2">데이터 관리 접근</h2>
                    <p className="text-slate-500 mb-8 text-sm">이 영역은 관리자 승인 인원만 출입할 수 있습니다.</p>
                    <form onSubmit={handlePwSubmit} className="space-y-4">
                      <input 
                        type="password" 
                        value={pwInput} 
                        onChange={(e) => setPwInput(e.target.value)}
                        placeholder="비밀번호를 입력하세요" 
                        className="w-full px-4 py-4 border border-slate-200 rounded-2xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-center tracking-widest text-lg transition-all font-bold shadow-inner"
                        autoFocus
                      />
                      <button type="submit" className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-md transition-all">
                        인증하기
                      </button>
                    </form>
                  </div>
                ) : (
                  /* 데이터 관리 화면 */
                  <div className="bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-slate-100">
                    <div className="mb-8 border-b border-slate-100 pb-6">
                      <h2 className="text-2xl font-extrabold text-slate-800">데이터 관리 대시보드</h2>
                      <p className="text-slate-500 mt-2">관리자 모드가 활성화되었습니다. 신중하게 작업해주세요.</p>
                    </div>

                    <div className="bg-red-50 p-6 md:p-8 rounded-3xl border border-red-100 flex flex-col md:flex-row items-center justify-between gap-6 shadow-sm">
                      <div>
                        <h3 className="text-lg font-bold text-red-800 mb-2 flex items-center gap-2">
                          <IconTrash /> 전적 전체 삭제
                        </h3>
                        <p className="text-red-600/80 text-sm font-medium">
                          현재 저장된 <strong className="text-red-700">{records.length}개</strong>의 모든 기록을 삭제합니다.<br/>
                          ※ Firestore 규칙에 의해 본인 작성 글만 삭제될 수 있습니다.
                        </p>
                      </div>
                      <button 
                        onClick={handleDeleteAll}
                        className="w-full md:w-auto px-8 py-4 bg-red-600 hover:bg-red-700 text-white font-bold rounded-2xl shadow-md transition-all shrink-0"
                      >
                        모든 데이터 삭제
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
