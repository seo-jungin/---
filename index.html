            let cleanLine = line.replace(/성공|실패|승리|패배|방어|공격|방성|방실|\(승\)|\(패\)|\[.*?\]|:/g, ' ').replace(/[^\w\s가-힣ㄱ-ㅎㅏ-ㅣ]/g, ' ').trim();
            let tokens = cleanLine.split(/[\s]+/).filter(Boolean);

          let isMatch = false;
          if (search === '') isMatch = true;
          else if (r.nickname?.toLowerCase().includes(search) || getChosung(r.nickname||'').includes(choSearch)) isMatch = true;
          else {
            if (activeTab === 'attack') {
              r.matches?.forEach(m => {
                const str = getSafeArray(m.myTeam).join(',') + getSafeArray(m.enemyTeam).join(',');
                if (str.toLowerCase().includes(search) || getChosung(str).includes(choSearch)) isMatch = true;
              });
            } else {
              const myStr = getSafeArray(r.myTeam).join(',');
              if (myStr.toLowerCase().includes(search) || getChosung(myStr).includes(choSearch)) isMatch = true;
              r.defenseMatches?.forEach(m => {
                const enStr = getSafeArray(m.enemyTeam).join(',');
                if (enStr.toLowerCase().includes(search) || getChosung(enStr).includes(choSearch)) isMatch = true;
              });
            }
          }
          if (!isMatch) return;

          const groupKey = `${r.date} / vs ${r.opponent || '알 수 없음'}`;
          if (!groups[groupKey]) groups[groupKey] = []; groups[groupKey].push(r);
        });
        return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
      }, [currentRecords, filterChar, activeTab]);

      const toggleRecord = (id) => setExpandedRecords(prev => ({ ...prev, [id]: !prev[id] }));
      const toggleGroup = (key) => setExpandedGroups(prev => ({ ...prev, [key]: !prev[key] }));

      return (
        <div className="min-h-screen p-4 md:p-8 text-[15px] pb-32 relative">
          <CustomModal isOpen={alertModal.isOpen} onClose={() => setAlertModal({...alertModal, isOpen: false})} title={alertModal.title} content={alertModal.content} onConfirm={() => setAlertModal({...alertModal, isOpen: false})} hideCancel={true} />
          <CustomModal isOpen={confirmModal.isOpen} onClose={() => setConfirmModal({...confirmModal, isOpen: false})} title={confirmModal.title} content={confirmModal.content} onConfirm={confirmModal.action} confirmText={confirmModal.confirmText} />

          {unlockModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 p-4 animate-in fade-in duration-200">
              <div className="gold-panel p-8 md:p-12 rounded-3xl shadow-2xl max-w-sm w-full relative">
                <button onClick={() => setUnlockModalOpen(false)} className="absolute top-4 right-4 p-2 text-zinc-500 hover:text-zinc-300 transition-colors"><IconX /></button>
                <div className="w-14 h-14 bg-yellow-900/30 text-yellow-500 rounded-full flex items-center justify-center mx-auto mb-5 shadow-sm border border-yellow-700/50"><IconLock /></div>
                <h2 className="text-xl font-bold gold-gradient-text mb-2 text-center">숨겨진 기능 해제</h2>
                <p className="text-zinc-400 mb-8 text-sm text-center">관리자 암호를 입력하세요.</p>
                <form onSubmit={handleAdminUnlock} className="space-y-4">
                  <input ref={unlockInputRef} type="password" value={unlockPwd} onChange={(e) => setUnlockPwd(e.target.value)} placeholder="비밀번호" className={`w-full px-5 py-4 border ${unlockError ? 'border-red-500 bg-red-950/20' : 'border-yellow-700/50 bg-zinc-900'} rounded-2xl focus:ring-2 focus:ring-yellow-600 outline-none text-center text-zinc-100 tracking-[0.5em] text-lg font-bold transition-colors shadow-inner`} />
                  {unlockError && <p className="text-red-400 text-xs text-center font-medium">비밀번호가 일치하지 않습니다.</p>}
                  <button type="submit" className="w-full gold-button font-black py-4 rounded-2xl shadow-md transition-all mt-2">해제하기</button>
                </form>
              </div>
            </div>
          )}

          <button onClick={() => setIsMobileView(!isMobileView)} className={`fixed top-4 right-4 z-50 flex items-center gap-2 px-4 py-2.5 gold-button rounded-full font-bold text-xs md:text-sm transform ${showFloatingBtn?'translate-y-0 opacity-100':'-translate-y-20 opacity-0'} transition-all duration-300`}>
            {isMobileView ? '🖥️ PC 모드' : '📱 모바일 모드'}
          </button>

          <div className="max-w-6xl mx-auto space-y-6 md:space-y-8 mt-10 md:mt-0">
            <div className="bg-zinc-900 border border-zinc-700 rounded-2xl shadow-2xl overflow-hidden">
              <div className="p-6 md:p-8 flex flex-col md:flex-row items-center justify-between bg-gradient-to-b from-zinc-800 to-zinc-900">
                <div>
                  <h1 
                    className="text-3xl md:text-4xl font-black gold-gradient-text cursor-pointer select-none drop-shadow-md" 
                    onClick={handleTitleClick}
                    title="타이틀 5번 연속 클릭 시 관리자 모드 열림"
                  >
                    리더 길드전 기록부
                  </h1>
                </div>
              </div>
              
              <div className="flex border-t border-zinc-700 overflow-x-auto custom-scrollbar bg-zinc-900">
                <button onClick={() => {setActiveTab('attack'); resetForm();}} className={`flex-1 min-w-[120px] py-5 font-black text-sm md:text-base transition-all flex items-center justify-center gap-2 ${activeTab === 'attack' ? 'gold-bg-active' : 'text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-200'}`}>
                  <span>⚔️</span>
                  <span className={activeTab === 'attack' ? 'gold-gradient-text drop-shadow-sm' : ''}>승리 기록지</span>
                </button>
                <button onClick={() => {setActiveTab('defense'); resetForm();}} className={`flex-1 min-w-[120px] py-5 font-black text-sm md:text-base transition-all flex items-center justify-center gap-2 ${activeTab === 'defense' ? 'gold-bg-active' : 'text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-200'}`}>
                  <span>🛡️</span>
                  <span className={activeTab === 'defense' ? 'gold-gradient-text drop-shadow-sm' : ''}>방어 기록지</span>
                </button>
                {isAdminMode && (
                  <button onClick={() => setActiveTab('management')} className={`flex-1 min-w-[120px] py-5 font-black text-sm md:text-base transition-all flex items-center justify-center gap-2 ${activeTab === 'management' ? 'gold-bg-active' : 'text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-200'}`}>
                    <span>⚙️</span>
                    <span className={activeTab === 'management' ? 'gold-gradient-text drop-shadow-sm' : ''}>데이터 관리</span>
                  </button>
                )}
              </div>
            </div>

            {(activeTab === 'attack' || activeTab === 'defense') && (
              <div className="space-y-6 animate-in fade-in duration-300">
                <section className={`bg-zinc-900 border border-zinc-700 p-5 md:p-8 rounded-2xl shadow-lg ${editingId ? 'border-yellow-600 bg-yellow-950/10' : ''}`}>
                  <h2 className="text-lg md:text-xl font-black text-zinc-100 mb-6 flex items-center gap-2">
                    {editingId ? <><span className="gold-gradient-text"><IconEdit /></span> 기록 수정 중 ({activeTab==='attack'?'공격':'방어'})</> : (activeTab==='attack'?'⚔️ 길드전 공격(승리) 기록 추가':'🛡️ 길드전 방어 기록 추가')}
                  </h2>
                  
                  {/* 변경된 공통 입력 폼: 체크박스 추가 */}
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div>
                      <div className="flex justify-between items-center mb-1.5">
                        <label className="block text-sm font-bold text-zinc-400">길드원 닉네임</label>
                        <label className="flex items-center gap-1.5 text-xs text-yellow-600/80 cursor-pointer hover:text-yellow-500 font-bold">
                          <input type="checkbox" checked={keepNickname} onChange={(e) => setKeepNickname(e.target.checked)} className="keep-checkbox" />
                          입력 유지
                        </label>
                      </div>
                      <input type="text" value={nickname} onChange={(e) => setNickname(e.target.value)} className="w-full px-4 py-3 bg-zinc-800 border border-zinc-600 rounded-xl text-zinc-100 font-bold outline-none focus:ring-2 focus:ring-yellow-600"/>
                    </div>
                    <div>
                      <div className="flex justify-between items-center mb-1.5">
                        <label className="block text-sm font-bold text-zinc-400">날짜</label>
                        <label className="flex items-center gap-1.5 text-xs text-yellow-600/80 cursor-pointer hover:text-yellow-500 font-bold">
                          <input type="checkbox" checked={keepDate} onChange={(e) => setKeepDate(e.target.checked)} className="keep-checkbox" />
                          입력 유지
                        </label>
                      </div>
                      <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full px-4 py-3 bg-zinc-800 border border-zinc-600 rounded-xl text-zinc-100 font-bold outline-none focus:ring-2 focus:ring-yellow-600"/>
                    </div>
                    <div>
                      <div className="flex justify-between items-center mb-1.5">
                        <label className="block text-sm font-bold text-zinc-400">상대 길드</label>
                        <label className="flex items-center gap-1.5 text-xs text-yellow-600/80 cursor-pointer hover:text-yellow-500 font-bold">
                          <input type="checkbox" checked={keepOpponent} onChange={(e) => setKeepOpponent(e.target.checked)} className="keep-checkbox" />
                          입력 유지
                        </label>
                      </div>
                      <input type="text" value={opponent} onChange={(e) => setOpponent(e.target.value)} className="w-full px-4 py-3 bg-zinc-800 border border-zinc-600 rounded-xl text-zinc-100 font-bold outline-none focus:ring-2 focus:ring-yellow-600"/>
                    </div>
                  </div>

                  {activeTab === 'attack' ? (
                    <div className="space-y-4">
                      {attackMatches.map((match, index) => (
                        <div key={index} className="flex flex-col gap-3 bg-zinc-800 p-4 rounded-xl border border-zinc-600">
                          
                          <div className="flex items-center gap-2 w-full border-b border-zinc-700 pb-3">
                            <span className="font-black text-zinc-500 w-6 text-center">{index+1}.</span>
                            <div className="relative flex-1 flex items-center">
                              <div className="absolute left-3 text-zinc-500"><IconClipboard /></div>
                              <input id={`atk-paste-${index}`} type="text" placeholder="한 줄 빠른 붙여넣기 (예: 루디 크리스 델론즈 승리 밀리아 카일 로지)" 
                                className="w-full pl-10 pr-3 py-2.5 bg-zinc-900 border border-zinc-600 rounded-lg text-sm text-zinc-200 outline-none focus:ring-2 focus:ring-yellow-600"
                                onKeyDown={(e)=>{if(e.key==='Enter'){e.preventDefault();handleAttackQuickPaste(index, e.target.value);e.target.value='';}}}
                              />
                            </div>
                            <button onClick={()=>{const el=document.getElementById(`atk-paste-${index}`); if(el&&el.value){handleAttackQuickPaste(index, el.value);el.value='';}}} className="px-4 py-2.5 gold-button font-bold rounded-lg text-sm">확인</button>
                          </div>

                          <div className={`flex w-full ${isMobileView ? 'flex-col gap-3' : 'flex-row items-center gap-4'}`}>
                            <div className={`flex flex-1 gap-2 p-2 bg-blue-950/40 border border-blue-800 rounded-lg ${isMobileView?'flex-col':'flex-row'}`}>
                              <div className="px-2 py-1.5 bg-blue-900 text-blue-200 text-xs font-black rounded flex items-center justify-center shrink-0">아군 공격</div>
                              <div className="grid grid-cols-3 gap-1 flex-1">
                                {[0,1,2].map(i => <SearchableSelect key={i} value={match.myTeam[i]} onChange={(v)=>handleAttackTeamChange(index, 'myTeam', i, v)} placeholder="영웅" groups={HERO_GROUPS} className="h-10" />)}
                              </div>
                            </div>
                            <select value={match.result} onChange={(e) => handleAttackResultChange(index, e.target.value)} className={`h-10 px-2 bg-zinc-900 border border-zinc-600 rounded-lg font-black text-sm shrink-0 ${match.result==='승리'?'text-blue-400':'text-red-400'}`}>
                              <option value="승리">승리</option><option value="패배">패배</option>
                            </select>
                            <div className={`flex flex-1 gap-2 p-2 bg-red-950/40 border border-red-800 rounded-lg ${isMobileView?'flex-col':'flex-row'}`}>
                              <div className="px-2 py-1.5 bg-red-900 text-red-200 text-xs font-black rounded flex items-center justify-center shrink-0">적군 방어</div>
                              <div className="grid grid-cols-3 gap-1 flex-1">
                                {[0,1,2].map(i => <SearchableSelect key={i} value={match.enemyTeam[i]} onChange={(v)=>handleAttackTeamChange(index, 'enemyTeam', i, v)} placeholder="영웅" groups={HERO_GROUPS} className="h-10" />)}
                              </div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="space-y-6">
                      <div className="bg-zinc-800 p-4 rounded-xl border border-zinc-600 mb-2">
                        <label className="block text-sm font-bold text-zinc-400 mb-2 flex items-center gap-2"><IconClipboard/> 텍스트로 한 번에 입력 (다중 파싱 지원)</label>
                        <div className="flex flex-col sm:flex-row gap-2">
                          <textarea id="def-global-paste" rows="3" placeholder="예시: [내 방어덱] 루디 크리스 델론즈 / [1타] 밀리아 카일 로지 (방어 성공) / [2타] 프레이야 트루드 연희 (방어 실패) 등 여러 줄을 붙여넣으세요." 
                            className="flex-1 p-3 bg-zinc-900 border border-zinc-600 rounded-lg text-sm text-zinc-200 outline-none focus:ring-2 focus:ring-yellow-600 custom-scrollbar"></textarea>
                          <button onClick={()=>{const el=document.getElementById('def-global-paste'); if(el&&el.value){handleDefenseGlobalPaste(el.value);el.value='';}}} className="px-4 py-3 gold-button font-black rounded-lg shrink-0">자동 완성</button>
                        </div>
                      </div>

                      <div className="bg-blue-950/30 p-4 border border-blue-800 rounded-xl">
                        <label className="block text-sm font-black text-blue-300 mb-3 flex items-center gap-2"><IconShield/> [고정] 아군 방어 영웅</label>
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                          {[0,1,2].map(i => <SearchableSelect key={i} value={defenseMyTeam[i]} onChange={(v)=>handleDefenseMyTeamChange(i, v)} placeholder="아군 방어 영웅" groups={HERO_GROUPS} className="h-12" />)}
                        </div>
                      </div>
                      <div className="space-y-3">
                        <label className="block text-sm font-black text-rose-300 mb-1 flex justify-between items-center">
                          <span>적군 공격 기록 (최대 15회 추가 가능)</span>
                          <span className="text-xs text-zinc-500 bg-zinc-800 px-2 py-1 rounded">현재 {defenseMatches.length} / 15</span>
                        </label>
                        <div className="max-h-[300px] md:max-h-[500px] overflow-y-auto custom-scrollbar space-y-3 pr-2">
                          {defenseMatches.map((match, index) => (
                            <div key={index} className="flex flex-col sm:flex-row items-center gap-3 bg-rose-950/20 p-3 rounded-xl border border-rose-900/50">
                              <span className="font-bold text-rose-500 w-6 text-center shrink-0">{index + 1}.</span>
                              <div className="grid grid-cols-3 gap-2 flex-1 w-full">
                                {[0,1,2].map(i => <SearchableSelect key={i} value={match.enemyTeam[i]} onChange={(v)=>handleDefenseEnemyChange(index, i, v)} placeholder="적군 공격 영웅" groups={HERO_GROUPS} className="h-10" />)}
                              </div>
                              <div className="flex w-full sm:w-auto gap-2">
                                <select value={match.result} onChange={(e) => handleDefenseResultChange(index, e.target.value)} className={`h-10 px-3 bg-zinc-900 border border-zinc-600 rounded-lg font-black text-sm flex-1 sm:w-28 ${match.result==='방어 성공'?'text-blue-400':'text-red-400'}`}>
                                  <option value="방어 성공">방어 성공</option><option value="방어 실패">방어 실패</option>
                                </select>
                                {index === defenseMatches.length - 1 && index < 14 && (
                                  <button onClick={addDefenseMatch} className="h-10 px-4 gold-button rounded-lg font-bold flex items-center gap-1 shrink-0"><IconPlus/> 추가</button>
                                )}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}

                  <div className="flex gap-3 mt-6">
                    <button onClick={handleSave} className="flex-1 gold-button font-black py-4 rounded-xl transition-all flex items-center justify-center gap-2"><IconSave /> 저장하기</button>
                    {editingId && <button onClick={resetForm} className="bg-zinc-800 text-zinc-400 font-bold py-4 px-6 rounded-xl hover:bg-zinc-700 hover:text-zinc-200 border border-zinc-700 transition-colors"><IconX /> 취소</button>}
                  </div>
                </section>

                <section className="flex flex-col sm:flex-row gap-3">
                  <input type="text" placeholder="영웅/닉네임 초성 검색" value={filterChar} onChange={(e) => setFilterChar(e.target.value)} className="flex-1 px-4 py-4 bg-zinc-900 border border-zinc-700 rounded-xl text-zinc-100 font-bold outline-none focus:ring-2 focus:ring-yellow-600" />
                  <button onClick={() => setShowStats(!showStats)} className="px-6 py-4 gold-button rounded-xl font-black flex items-center justify-center gap-2 shrink-0"><IconBarChart /> {showStats?'통계 닫기':'통계 열기'}</button>
                </section>

                {showStats && (
                  <section className="grid grid-cols-1 md:grid-cols-2 gap-4 animate-in slide-in-from-top-4">
                    <div className="bg-zinc-900 border border-zinc-700 p-5 rounded-2xl shadow-sm">
                      <h3 className="text-base font-black gold-gradient-text mb-4 flex items-center gap-2"><IconBarChart/> {activeTab==='attack'?'많이 사용된 공격 덱':'가장 방어율이 높은 방어 덱'} (Top 5)</h3>
                      <ul className="space-y-3">
                        {statsData.deckStats.length === 0 ? <li className="text-zinc-500 text-sm text-center py-4">데이터 없음</li> : statsData.deckStats.map((stat, idx) => (
                          <li key={idx} className="flex justify-between items-center p-3 bg-zinc-800 rounded-xl border border-zinc-600">
                            <span className="font-bold text-zinc-200 text-sm">{stat.deck}</span>
                            <div className="text-right">
                              <p className="text-xs text-zinc-400 mb-1">{stat.count}{activeTab==='attack'?'회 기록':'회 피격'}</p>
                              <p className={`font-black text-sm ${parseFloat(stat.winRate)>=50?'text-blue-400':'text-red-400'}`}>{stat.winRate}% <span className="text-[10px] text-zinc-500 ml-1">({stat.wins}{activeTab==='attack'?'승':'회 성공'})</span></p>
                            </div>
                          </li>
                        ))}
                      </ul>
                    </div>
                    <div className="bg-zinc-900 border border-zinc-700 p-5 rounded-2xl shadow-sm">
                      <h3 className="text-base font-black gold-gradient-text mb-4 flex items-center gap-2"><IconUsers/> 길드원 {activeTab==='attack'?'공격 승률':'방어 성공률'}</h3>
                      <div className="max-h-[300px] overflow-y-auto pr-2 custom-scrollbar space-y-3">
                        {statsData.memberStats.length === 0 ? <div className="text-zinc-500 text-sm text-center py-4">데이터 없음</div> : statsData.memberStats.map((member, idx) => (
                          <li key={idx} className="flex justify-between items-center p-3 bg-zinc-800 rounded-xl border border-zinc-600">
                            <div>
                              <p className="font-bold text-zinc-200">{member.name}</p>
                              <p className="text-xs text-zinc-400">제출 {member.recordsCount}회 / {activeTab==='attack'?`총 ${member.totalMatches}전 ${member.wins}승`:`총 피격 ${member.totalMatches}회 / ${member.wins}회 성공`}</p>
                            </div>
                            <p className={`font-black text-lg ${parseFloat(member.winRate)>=50?'text-blue-400':'text-red-400'}`}>{member.winRate}%</p>
                          </li>
                        ))}
                      </div>
                    </div>
                  </section>
                )}

                <section className="space-y-5">
                  {groupedRecords.length === 0 ? <div className="bg-zinc-900 border border-zinc-700 p-10 text-center rounded-2xl text-zinc-500 font-bold">기록이 없습니다.</div> : 
                    groupedRecords.map(([groupKey, groupRecords]) => {
                      const isGroupExpanded = expandedGroups[groupKey] || filterChar.trim() !== '';
                      return (
                        <div key={groupKey} className="bg-zinc-900 border border-zinc-700 rounded-2xl overflow-hidden shadow-sm">
                          <div className="flex justify-between items-center p-4 cursor-pointer hover:bg-zinc-800 select-none" onClick={() => toggleGroup(groupKey)}>
                            <h2 className="font-black text-zinc-100 text-base md:text-lg">{groupKey} <span className="text-xs text-zinc-400 ml-2">({groupRecords.length}명 제출)</span></h2>
                            <div className="text-zinc-500">{isGroupExpanded ? <IconChevronUp /> : <IconChevronDown />}</div>
                          </div>
                          
                          {isGroupExpanded && (
                            <div className="p-4 space-y-4 border-t border-zinc-700 bg-zinc-950/50 animate-in slide-in-from-top-2">
                              {groupRecords.map((record) => {
                                const isExpanded = expandedRecords[record.id] || filterChar.trim() !== '';
                                return (
                                  <div key={record.id} className="bg-zinc-800 p-4 rounded-xl border border-zinc-600 relative">
                                    {(record.authorId === user?.uid || isAdminMode) && (
                                      <div className="absolute top-3 right-3 flex gap-2">
                                        <button onClick={(e) => { e.stopPropagation(); handleEditClick(record); }} className="text-zinc-400 hover:text-yellow-500 p-1"><IconEdit /></button>
                                        <button onClick={(e) => { e.stopPropagation(); handleDelete(record.id); }} className="text-zinc-400 hover:text-red-500 p-1"><IconTrash /></button>
                                      </div>
                                    )}
                                    <div className="cursor-pointer flex items-center justify-between" onClick={() => toggleRecord(record.id)}>
                                      <h3 className="font-bold text-zinc-200 flex items-center"><span className="gold-gradient-text border border-yellow-700/50 px-2 py-0.5 rounded mr-2">{record.nickname||'익명'}</span> 님의 {activeTab==='attack'?'공격':'방어'} 기록</h3>
                                      <div className={`text-zinc-500 ${(record.authorId === user?.uid || isAdminMode) ? 'mr-14' : ''}`}>{isExpanded ? <IconChevronUp /> : <IconChevronDown />}</div>
                                    </div>
                                    
                                    {isExpanded && (
                                      <div className="mt-4 space-y-3 border-t border-zinc-700 pt-3">
                                        {activeTab === 'attack' ? (
                                          record.matches?.map((match, idx) => (
                                            <div key={idx} className={`flex bg-zinc-900 p-3 rounded-lg border border-zinc-700 items-center ${isMobileView ? 'flex-col gap-2' : 'flex-row gap-3'}`}>
                                              <span className={`text-[10px] font-bold px-2 py-1 rounded ${match.result==='승리'?'bg-blue-900/40 text-blue-400':'bg-red-900/40 text-red-400'} shrink-0 hidden sm:block`}>M {idx+1}</span>
                                              <div className={`flex w-full ${isMobileView?'flex-col gap-2':'flex-row items-center gap-3'}`}>
                                                <div className="flex-1 flex flex-col sm:flex-row items-center gap-2">
                                                  <span className="text-xs text-zinc-500 hidden sm:block">아군</span>
                                                  {renderHeroTags(match.myTeam)}
                                                </div>
                                                <span className={`font-black text-sm w-10 text-center ${match.result==='승리'?'text-blue-400':'text-red-500'}`}>{match.result}</span>
                                                <div className="flex-1 flex flex-col sm:flex-row items-center gap-2">
                                                  <span className="text-xs text-zinc-500 hidden sm:block">적군</span>
                                                  {renderHeroTags(match.enemyTeam)}
                                                </div>
                                              </div>
                                            </div>
                                          ))
                                        ) : (
                                          <div>
                                            <div className="mb-3 p-3 bg-blue-950/20 border border-blue-900 rounded-lg flex items-center gap-3 shadow-inner">
                                              <span className="text-blue-400 font-black text-xs shrink-0 px-2 flex items-center gap-1"><IconShield/> 내 방어덱</span>
                                              {renderHeroTags(record.myTeam)}
                                            </div>
                                            {record.defenseMatches?.map((match, idx) => (
                                              <div key={idx} className="flex flex-col sm:flex-row gap-3 bg-rose-950/20 p-2.5 rounded-lg border border-rose-900/50 items-center sm:ml-4 mb-2">
                                                <span className="text-rose-500 text-xs font-bold shrink-0 bg-rose-900/20 px-2 py-1 rounded">적군 {idx+1}타</span>
                                                <div className="flex-1 flex justify-center sm:justify-start">{renderHeroTags(match.enemyTeam)}</div>
                                                <span className={`font-black text-xs shrink-0 ${match.result==='방어 성공'?'text-blue-400':'text-red-500'}`}>{match.result}</span>
                                              </div>
                                            ))}
                                          </div>
                                        )}
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      );
                    })
                  }
                </section>
              </div>
            )}

            {activeTab === 'management' && isAdminMode && (
              <div className="gold-panel p-8 rounded-2xl space-y-10 animate-in fade-in">
                <div>
                  <h2 className="text-2xl font-black gold-gradient-text mb-4">데이터 통합 다운로드 센터</h2>
                  <p className="text-zinc-400 mb-6 text-sm font-medium">원하시는 데이터 유형을 선택하여 CSV(엑셀) 파일로 추출하세요.</p>
                  <div className="flex flex-col sm:flex-row gap-4">
                    <button onClick={handleExportStatsCSV} className="flex-1 px-6 py-5 gold-button font-black rounded-xl flex items-center justify-center gap-2 text-base shadow-lg"><IconBarChart /> 통계 데이터 다운로드</button>
                    <button onClick={handleExportAllCSV} className="flex-1 px-6 py-5 gold-button font-black rounded-xl flex items-center justify-center gap-2 text-base shadow-lg"><IconDownload /> 원본 로그 다운로드</button>
                  </div>
                </div>
                
                <div className="border-t border-yellow-900/30 pt-8">
                  <h2 className="text-2xl font-black text-red-500 mb-4 drop-shadow-md">위험 구역 (데이터 영구 삭제)</h2>
                  <p className="text-zinc-400 mb-6 text-sm font-medium">삭제된 데이터는 서버에서 영구히 지워지며 복구할 수 없습니다.</p>
                  <div className="flex flex-col sm:flex-row gap-4">
                    <button onClick={() => handleDeleteAllByType('attack')} className="flex-1 py-5 bg-red-950/40 text-red-400 border border-red-900 font-black rounded-xl hover:bg-red-800 hover:text-white transition-colors shadow-inner">공격 기록지 전체 삭제</button>
                    <button onClick={() => handleDeleteAllByType('defense')} className="flex-1 py-5 bg-rose-950/40 text-rose-400 border border-rose-900 font-black rounded-xl hover:bg-rose-800 hover:text-white transition-colors shadow-inner">방어 기록지 전체 삭제</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
