    const getChosung = (str) => {
      const chosung = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
      let result = "";
      for (let i = 0; i < str.length; i++) {
        const code = str.charCodeAt(i) - 44032;
        if (code > -1 && code < 11172) result += chosung[Math.floor(code / 588)];
        else result += str.charAt(i);
      }
      return result;
    };

    const fallbackFirebaseConfig = {

      { group: "다크나이츠", heroes: ["멜키르", "브란즈&브란셀", "플라튼", "콜트", "팔라누스", "실베스타"] },
      { group: "사황/구사황", heroes: ["에이스", "여포", "손오공", "린", "태오", "카르마", "카일", "연희"] },
      { group: "구세븐나이츠", heroes: ["겔리두스", "밀리아", "파이", "로지", "쥬리", "알프", "라디우스"] },

      { group: "루미너스 혁명단", heroes: ["엘리시아", "키리엘", "라이언"] },
      { group: "숨은 강자들", heroes: ["미호", "로로", "아멜리아", "잉그리드", "클레미스", "카구라", "바토리", "아비갈", "앤티", "뮬란", "미스트", "아탈란테", "항우"] },
      { group: "천상의 수호자", heroes: ["트루드", "프레이야", "라드그리드", "스쿨드", "펜리르", "레긴레이프", "기르티"] },
      { group: "심연의 사도 등", heroes: ["쥬다스", "디아나", "안티고네", "잭", "앙그라", "데스론"] },
      { group: "마법학회 등", heroes: ["타라", "노아", "세자르", "오목", "바엘", "리나", "아리스", "스피나", "길라한", "엘리니아", "비아", "세인", "니아", "지크", "루리", "에스파다"] },
      { group: "일반 모험가", heroes: ["에반", "카린", "스니퍼", "쥬피", "유리", "아리엘", "실비아", "벨리카", "챈슬러", "룩", "녹스", "아라곤", "앨리스", "클로에", "헤브니아", "헬레니아", "로아", "하영", "카론", "루시", "유이", "라니아", "사라", "베인", "레오", "클레오", "메이", "조커", "세라", "발리스타", "블랙로즈", "제인", "레이", "샤오", "노호", "리", "빅토리아", "진", "데이지", "백룡", "링링", "밍밍", "소이", "풍연", "비담", "유신", "백각", "이정", "권호", "기파랑", "나타", "아수라", "칭타오", "무송", "관우", "제갈량", "초선", "조운", "파스칼"] },
      { group: "후속작 오리지널", heroes: ["렌", "코제트", "챙첸", "밍", "이안", "앙리", "케이드", "루키", "멜리사", "스캇", "피네", "엘카", "샬롯", "티티", "레일라", "스텔라", "세일럼", "렘", "루아", "세레나", "샤이", "트리스탄"] }
    ];

    // 공통 배지 UI 렌더링 함수
    const renderHeroTags = (teamArr) => {
      const heroes = Array.isArray(teamArr) ? teamArr.filter(h => h.trim() !== '') : [];
      if (heroes.length === 0) return <span className="text-zinc-600 font-medium">-</span>;
      return (
        <div className="flex flex-wrap gap-1.5 justify-start">
          {heroes.map((hero, idx) => (
            <span key={idx} className="px-3 py-1 bg-zinc-800 border border-zinc-700/60 rounded-full text-zinc-200 text-[13px] md:text-sm font-medium shadow-sm whitespace-nowrap">
              {hero}
            </span>
          ))}
        </div>
      );
    };

    const CustomModal = ({ isOpen, onClose, title, content, onConfirm, confirmText = "확인", hideCancel = false }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in duration-200">
          <div className="glass-panel p-6 md:p-8 rounded-3xl shadow-2xl max-w-sm w-full animate-in zoom-in-95 duration-200">
            <h3 className="text-lg md:text-xl font-bold text-zinc-100 mb-3">{title}</h3>
            <div className="text-sm md:text-base text-zinc-300 font-medium mb-8 whitespace-pre-line leading-relaxed">{content}</div>
            <div className="flex gap-3">
              {!hideCancel && <button onClick={onClose} className="flex-1 py-3 rounded-xl bg-zinc-800 text-zinc-300 font-semibold text-sm hover:bg-zinc-700 transition-colors">취소</button>}
              <button onClick={onConfirm} className="flex-1 py-3 rounded-xl bg-sky-600 text-white font-semibold text-sm hover:bg-sky-500 transition-colors">{confirmText}</button>
            </div>
          </div>
        </div>
      );
    };

    const SearchableSelect = ({ value, onChange, placeholder, groups }) => {
      const [isOpen, setIsOpen] = useState(false);
      const [searchTerm, setSearchTerm] = useState(value || '');
      const wrapperRef = useRef(null);

      useEffect(() => { setSearchTerm(value || ''); }, [value]);
      useEffect(() => {
        const handleClickOutside = (e) => { if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setIsOpen(false); };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const filteredGroups = groups.map(g => ({
        ...g, heroes: g.heroes.filter(h => h.toUpperCase().includes(searchTerm.toUpperCase()) || getChosung(h).includes(getChosung(searchTerm)))
      })).filter(g => g.heroes.length > 0);

      return (
        <div ref={wrapperRef} className="relative w-full h-12 md:h-14">
          <input type="text" value={searchTerm}
            onChange={(e) => { setSearchTerm(e.target.value); onChange(e.target.value); setIsOpen(true); }}
            onFocus={() => setIsOpen(true)} placeholder={placeholder}
            className="w-full h-full px-4 py-3 bg-zinc-900 border border-zinc-700/80 rounded-xl text-zinc-200 font-medium focus:ring-2 focus:ring-sky-500/50 outline-none transition-all placeholder-zinc-600 text-sm md:text-base shadow-sm"
          />
          {isOpen && (
            <div className="absolute z-50 top-full left-0 right-0 mt-1.5 max-h-60 overflow-y-auto glass-panel rounded-xl shadow-xl custom-scrollbar py-2">
              {filteredGroups.length === 0 ? <div className="p-4 text-sm text-zinc-500 font-medium text-center">검색 결과가 없습니다.</div> : 
                filteredGroups.map(g => (
                  <div key={g.group}>
                    <div className="px-4 py-2 text-xs font-semibold text-sky-400 bg-zinc-900/50 sticky top-0 backdrop-blur-md z-10">{g.group}</div>
                    {g.heroes.map(h => (
                      <div key={h} onClick={() => { onChange(h); setSearchTerm(h); setIsOpen(false); }}
                        className="px-5 py-2.5 text-sm font-medium text-zinc-300 hover:bg-sky-600/90 hover:text-white cursor-pointer transition-colors"
                      >{h}</div>
                    ))}
                  </div>
                ))
              }
            </div>
          )}
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [records, setRecords] = useState([]);
      const [filterChar, setFilterChar] = useState('');
      const [showStats, setShowStats] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [customHeroes, setCustomHeroes] = useState([]); 
      const [expandedRecords, setExpandedRecords] = useState({});
      const [expandedStats, setExpandedStats] = useState({}); 
      const [expandedGroups, setExpandedGroups] = useState({}); 
      const [activeTab, setActiveTab] = useState('records');
      const [isAdminMode, setIsAdminMode] = useState(false);
      const [isMobileView, setIsMobileView] = useState(false);
      const [showFloatingBtn, setShowFloatingBtn] = useState(true);
      const [alertModal, setAlertModal] = useState({ isOpen: false, title: '', content: '' });
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', content: '', action: null, confirmText: '확인' });
      const [unlockModalOpen, setUnlockModalOpen] = useState(false);
      const [unlockPwd, setUnlockPwd] = useState('');
      const [unlockError, setUnlockError] = useState(false);
      const unlockInputRef = useRef(null);

      const [nickname, setNickname] = useState('');
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [opponent, setOpponent] = useState('');
      const [matches, setMatches] = useState(Array.from({ length: 5 }, () => ({ type: '공격', myTeam: ['', '', ''], result: '승리', enemyTeam: ['', '', ''] })));

      useEffect(() => {
        const handleResize = () => setIsMobileView(window.innerWidth < 1024);
        handleResize(); window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        let lastScrollY = window.scrollY; let ticking = false;
        const handleScroll = () => {
          if (!ticking) {
            window.requestAnimationFrame(() => {
              const currentScrollY = window.scrollY;
              if (currentScrollY < 10) setShowFloatingBtn(true);
              else if (currentScrollY > lastScrollY + 10) setShowFloatingBtn(false);
              else if (currentScrollY < lastScrollY - 10) setShowFloatingBtn(true);
              lastScrollY = currentScrollY; ticking = false;
            }); ticking = true;
          }
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
          if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C', 'i', 'j', 'c'].includes(e.key)) { e.preventDefault(); return false; }
          if (e.ctrlKey && (e.key === 'U' || e.key === 'u') && !e.altKey) { e.preventDefault(); return false; }
          if (e.ctrlKey && e.altKey && (e.key === 'u' || e.key === 'U')) {
            e.preventDefault();
            if (!isAdminMode) { setUnlockModalOpen(true); setUnlockPwd(''); setUnlockError(false); setTimeout(() => { if (unlockInputRef.current) unlockInputRef.current.focus(); }, 100); }
          }
        };
        const handleContextMenu = (e) => { e.preventDefault(); return false; };
        document.addEventListener('keydown', handleKeyDown); document.addEventListener('contextmenu', handleContextMenu);
        return () => { document.removeEventListener('keydown', handleKeyDown); document.removeEventListener('contextmenu', handleContextMenu); };
      }, [isAdminMode]);

      const handleAdminUnlock = (e) => {
        e.preventDefault();
        if (unlockPwd === "4979457") { setIsAdminMode(true); setUnlockModalOpen(false); setActiveTab('management'); } 
        else { setUnlockError(true); setUnlockPwd(''); if (unlockInputRef.current) unlockInputRef.current.focus(); }
      };

      const showAlert = (title, content) => setAlertModal({ isOpen: true, title, content });
      const showConfirm = (title, content, action, confirmText = "확인") => setConfirmModal({ isOpen: true, title, content, action, confirmText });

      const HERO_GROUPS = useMemo(() => {
        if (customHeroes.length === 0) return PREDEFINED_HERO_GROUPS;
        return [...PREDEFINED_HERO_GROUPS, { group: "기타 (자동추가)", heroes: customHeroes }];
      }, [customHeroes]);

      useEffect(() => {
        if (!hasFirebaseConfig || !auth) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth);
          } catch (error) { console.error("Auth Fail:", error); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!hasFirebaseConfig || !user || !db) return;
        const dbRef = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);
        const unsubscribe = onSnapshot(dbRef, (snapshot) => {
            const fetchedRecords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            fetchedRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(fetchedRecords);
        }, (error) => console.error("Data Load Fail:", error));
        return () => unsubscribe();
      }, [user]);

      const dailySubmissionStats = useMemo(() => {
        const grouped = {};
        records.forEach(r => {
          const groupKey = `${r.date} / vs ${r.opponent || '알 수 없음'}`;
          if (!grouped[groupKey]) grouped[groupKey] = { date: r.date, names: new Set() };
          grouped[groupKey].names.add(r.nickname || '익명');
        });
        return Object.entries(grouped).map(([groupKey, data]) => {
            const names = Array.from(data.names).sort();
            const dateObj = new Date(data.date);
            const dayOfWeek = isNaN(dateObj) ? '' : ['일', '월', '화', '수', '목', '금', '토'][dateObj.getDay()];
            return { groupKey, date: data.date, dayOfWeek, count: names.length, names };
          }).sort((a, b) => b.groupKey.localeCompare(a.groupKey)).slice(0, 7);
      }, [records]);

      const fullDeckStats = useMemo(() => {
        const counts = {};
        records.forEach(record => {
          record.matches.forEach(match => {
            let myArr = Array.isArray(match.myTeam) ? match.myTeam : (match.myTeam ? match.myTeam.split(',') : []);
            if (myArr.filter(Boolean).length > 0) {
              const deckArr = myArr.map(h => h.trim()).filter(Boolean).sort();
              if (deckArr.length === 3) {
                const deckKey = deckArr.join(', ');
                if (!counts[deckKey]) counts[deckKey] = { deck: deckKey, count: 0, wins: 0 };
                counts[deckKey].count += 1;
                if (match.result === '승리') counts[deckKey].wins += 1;
              }
            }
          });
        });
        return Object.values(counts).map(s => ({ ...s, winRate: ((s.wins / s.count) * 100).toFixed(1) })).sort((a, b) => b.count - a.count);
      }, [records]);

      const deckStats = useMemo(() => fullDeckStats.slice(0, 5), [fullDeckStats]);

      const memberStats = useMemo(() => {
        const stats = {};
        records.forEach(record => {
          const name = record.nickname || '익명';
          if (!stats[name]) stats[name] = { name, recordsCount: 0, totalMatches: 0, wins: 0 };
          stats[name].recordsCount += 1;
          record.matches.forEach(match => {
            stats[name].totalMatches += 1;
            if (match.result === '승리') stats[name].wins += 1;
          });
        });
        return Object.values(stats).map(s => ({ ...s, winRate: s.totalMatches > 0 ? ((s.wins / s.totalMatches) * 100).toFixed(1) : 0 })).sort((a, b) => b.recordsCount - a.recordsCount);
      }, [records]);

      const handleTeamChange = (index, teamType, heroIndex, value) => {
        const newMatches = [...matches]; newMatches[index][teamType][heroIndex] = value; setMatches(newMatches);
      };
      const handleMatchChange = (index, field, value) => {
        const newMatches = [...matches]; newMatches[index][field] = value; setMatches(newMatches);
      };

      const handleQuickPasteLogic = (index, text) => {
        if (!text || text.trim() === '') return;
        let result = '승리';
        if (text.includes('패배') || text.includes('(패)') || text.includes('[패]') || text.includes(' 패 ')) result = '패배';
        
        let cleanText = text.replace(/공격|방어|승리|패배|\(승\)|\(패\)|\[승\]|\[패\]|:/gi, ' ').replace(/vs/gi, '/').replace(/[\[\]\(\),]/g, ' ').replace(/or/gi, ' ').trim();
        let myTeamStr = '', enemyTeamStr = '';

        if (cleanText.includes('/')) {
            let parts = cleanText.split('/');
            myTeamStr = parts[0]; enemyTeamStr = parts.slice(1).join(' ');
        } else {
            let tokens = cleanText.split(/[\s]+/).filter(Boolean);
            myTeamStr = tokens.slice(0, 3).join(' '); enemyTeamStr = tokens.slice(3, 6).join(' ');
        }

        const parseTeam = (str) => {
            let arr = str.split(/[\s]+/).filter(Boolean);
            return [arr[0] || '', arr[1] || '', arr[2] || ''];
        };
        const parsedMyTeam = parseTeam(myTeamStr); const parsedEnemyTeam = parseTeam(enemyTeamStr);
        const allPredefined = PREDEFINED_HERO_GROUPS.flatMap(g => g.heroes);
        const newDetectedHeroes = [...parsedMyTeam, ...parsedEnemyTeam].filter(h => h !== '' && !allPredefined.includes(h) && !customHeroes.includes(h));
        if (newDetectedHeroes.length > 0) setCustomHeroes(prev => [...prev, ...newDetectedHeroes]);

        const newMatches = [...matches];
        newMatches[index] = { type: '공격', myTeam: parsedMyTeam, result, enemyTeam: parsedEnemyTeam };
        setMatches(newMatches);
      };

      const resetForm = () => {
        setOpponent(''); setMatches(Array.from({ length: 5 }, () => ({ type: '공격', myTeam: ['', '', ''], result: '승리', enemyTeam: ['', '', ''] }))); setEditingId(null);
      };

      const handleSave = () => {
        if (!hasFirebaseConfig) return showAlert("설정 오류", "Firebase 설정이 누락되었습니다.");
        if (!user) return showAlert("인증 오류", "인증 정보가 없습니다.");
        if (!nickname || !date || !opponent) return showAlert("입력 오류", "닉네임, 날짜, 상대 길드명을 모두 입력해주세요.");

        const hasValidMatch = matches.some(m => m.myTeam.some(h => h.trim() !== '') || m.enemyTeam.some(h => h.trim() !== ''));
        if (!hasValidMatch) return showAlert("입력 오류", "최소 1개 이상의 전투 기록(영웅 선택)을 입력해주세요.");

        const formattedMatches = matches.filter(m => m.myTeam.some(h => h.trim() !== '') || m.enemyTeam.some(h => h.trim() !== ''));
        const allValidHeroes = PREDEFINED_HERO_GROUPS.flatMap(g => g.heroes);
        const usedHeroes = new Set();
        formattedMatches.forEach(m => { m.myTeam.forEach(h => { if(h.trim()) usedHeroes.add(h.trim()); }); m.enemyTeam.forEach(h => { if(h.trim()) usedHeroes.add(h.trim()); }); });

        const unknownHeroes = [...usedHeroes].filter(h => !allValidHeroes.includes(h));
        if (unknownHeroes.length > 0) {
          showConfirm("오타 확인", `목록에 없는 이름이 있습니다.\n[${unknownHeroes.join(', ')}]\n\n오타라면 '취소', 신규 영웅이라면 '강제 저장'을 누르세요.`, () => { executeSave(formattedMatches, unknownHeroes); setConfirmModal({ isOpen: false }); }, "강제 저장");
        } else { executeSave(formattedMatches, []); }
      };

      const executeSave = async (formattedMatches, newHeroes) => {
        try {
          if (editingId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, editingId), { nickname, date, opponent, matches: formattedMatches, updatedAt: Date.now() });
          else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME), { nickname, date, opponent, matches: formattedMatches, createdAt: Date.now(), authorId: user.uid });
          if (newHeroes.length > 0) {
            const addedHeroes = newHeroes.filter(h => !customHeroes.includes(h));
            if (addedHeroes.length > 0) setCustomHeroes(prev => [...prev, ...addedHeroes]);
          }
          resetForm(); showAlert("저장 완료", "성공적으로 저장되었습니다.");
        } catch (error) { console.error("Save Error:", error); showAlert("시스템 오류", "저장 중 오류가 발생했습니다."); }
      };

      const handleEditClick = (record) => {
        setEditingId(record.id); setNickname(record.nickname || ''); setDate(record.date || new Date().toISOString().split('T')[0]); setOpponent(record.opponent || '');
        const loadedMatches = record.matches.map(m => {
          let myTeamArr = Array.isArray(m.myTeam) ? m.myTeam : (m.myTeam ? m.myTeam.split(',').map(s => s.trim()) : ['', '', '']);
          let enemyTeamArr = Array.isArray(m.enemyTeam) ? m.enemyTeam : (m.enemyTeam ? m.enemyTeam.split(',').map(s => s.trim()) : ['', '', '']);
          const allPredefined = PREDEFINED_HERO_GROUPS.flatMap(g => g.heroes);
          const newDetectedHeroes = [...myTeamArr, ...enemyTeamArr].filter(h => h !== '' && !allPredefined.includes(h) && !customHeroes.includes(h));
          if (newDetectedHeroes.length > 0) setCustomHeroes(prev => [...prev, ...newDetectedHeroes]);
          return { type: '공격', myTeam: [...myTeamArr, '', '', ''].slice(0, 3), result: m.result || '승리', enemyTeam: [...enemyTeamArr, '', '', ''].slice(0, 3) };
        });
        while (loadedMatches.length < 5) loadedMatches.push({ type: '공격', myTeam: ['', '', ''], result: '승리', enemyTeam: ['', '', ''] });
        setMatches(loadedMatches); window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleDelete = (id) => {
        if (!hasFirebaseConfig) return;
        if (!user && !isAdminMode) return showAlert("권한 오류", "삭제 권한이 없습니다.");
        showConfirm("기록 삭제", "기록을 영구히 삭제합니다.", async () => {
          try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, id)); if (editingId === id) resetForm(); setConfirmModal({ isOpen: false }); } 
          catch (error) { showAlert("오류", "삭제 권한이 부족합니다."); }
        }, "삭제 진행");
      };

      const handleDeleteAll = () => {
        if (!isAdminMode) return;
        if (records.length === 0) return showAlert("알림", "삭제할 데이터가 없습니다.");
        showConfirm("전체 삭제", `총 ${records.length}개의 전적을 모두 삭제합니다. 진행할까요?`, async () => {
          try {
            let successCount = 0; let failCount = 0; setConfirmModal({ isOpen: false });
            for (const record of records) { try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, record.id)); successCount++; } catch (e) { failCount++; } }
            showAlert("결과", `성공: ${successCount}건 / 실패: ${failCount}건`);
          } catch (error) { showAlert("에러", "전체 삭제 실패"); }
        }, "전체 삭제 진행");
      };

      const handleExportRawCSV = () => {
        if (records.length === 0) return showAlert("알림", "데이터가 없습니다.");
        let csvContent = "\uFEFF날짜,작성자(닉네임),상대길드,매치번호,아군1,아군2,아군3,결과,적군1,적군2,적군3\n";
        records.forEach(record => {
          record.matches.forEach((match, index) => {
            const date = record.date || ""; const nickname = record.nickname || "익명"; const opponent = record.opponent || ""; const matchNum = index + 1;
            let myArr = Array.isArray(match.myTeam) ? match.myTeam : (match.myTeam ? match.myTeam.split(',') : ['', '', '']);
            let enArr = Array.isArray(match.enemyTeam) ? match.enemyTeam : (match.enemyTeam ? match.enemyTeam.split(',') : ['', '', '']);
            csvContent += `${date},${nickname},${opponent},${matchNum},${(myArr[0]||"").trim()},${(myArr[1]||"").trim()},${(myArr[2]||"").trim()},${match.result||""},${(enArr[0]||"").trim()},${(enArr[1]||"").trim()},${(enArr[2]||"").trim()}\n`;
          });
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `길드전_원본기록_${new Date().toISOString().split('T')[0]}.csv`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      const handleExportStatsCSV = () => {
        if (records.length === 0) return showAlert("알림", "데이터가 없습니다.");
        let csvContent = "\uFEFF--- 길드원 승률 통계 ---\n순위,닉네임,제출횟수,총전투,승리,승률(%)\n";
        memberStats.forEach((m, i) => { csvContent += `${i + 1},${m.name},${m.recordsCount},${m.totalMatches},${m.wins},${m.winRate}%\n`; });
        csvContent += "\n\n--- 사용된 3인 덱 통계 ---\n순위,덱 조합,사용횟수,승리,승률(%)\n";
        fullDeckStats.forEach((d, i) => { csvContent += `${i + 1},"${d.deck}",${d.count},${d.wins},${d.winRate}%\n`; });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `길드전_통계_${new Date().toISOString().split('T')[0]}.csv`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      const filteredRecords = records.map(record => {
        if (!filterChar.trim()) return record;
        const term = filterChar.toLowerCase().trim(); const termChosung = getChosung(term);
        if (record.nickname?.toLowerCase().includes(term) || getChosung(record.nickname || '').includes(termChosung)) return record;
        const filteredMatches = record.matches.filter(m => {
          let myStr = Array.isArray(m.myTeam) ? m.myTeam.join(',') : (m.myTeam || '');
          let enStr = Array.isArray(m.enemyTeam) ? m.enemyTeam.join(',') : (m.enemyTeam || '');
          return myStr.toLowerCase().includes(term) || enStr.toLowerCase().includes(term) || getChosung(myStr).includes(termChosung) || getChosung(enStr).includes(termChosung);
        });
        return { ...record, matches: filteredMatches };
      }).filter(record => record.matches && record.matches.length > 0);

      const groupedRecords = useMemo(() => {
        const groups = {};
        filteredRecords.forEach(record => {
          const groupKey = `${record.date} / vs ${record.opponent}`;
          if (!groups[groupKey]) groups[groupKey] = []; groups[groupKey].push(record);
        });
        return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
      }, [filteredRecords]);

      const toggleRecord = (id) => setExpandedRecords(prev => ({ ...prev, [id]: !prev[id] }));
      const toggleStat = (key) => setExpandedStats(prev => ({ ...prev, [key]: !prev[key] }));
      const toggleGroup = (key) => setExpandedGroups(prev => ({ ...prev, [key]: !prev[key] }));

      return (
        <div className="min-h-screen p-4 md:p-8 text-[15px] pb-32 relative">
          <CustomModal isOpen={alertModal.isOpen} onClose={() => setAlertModal({...alertModal, isOpen: false})} title={alertModal.title} content={alertModal.content} onConfirm={() => setAlertModal({...alertModal, isOpen: false})} hideCancel={true} />
          <CustomModal isOpen={confirmModal.isOpen} onClose={() => setConfirmModal({...confirmModal, isOpen: false})} title={confirmModal.title} content={confirmModal.content} onConfirm={confirmModal.action} confirmText={confirmModal.confirmText} />

          {unlockModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in fade-in duration-200">
              <div className="glass-panel p-8 md:p-12 rounded-3xl shadow-2xl max-w-sm w-full relative">
                <button onClick={() => setUnlockModalOpen(false)} className="absolute top-4 right-4 p-2 text-zinc-500 hover:text-zinc-300 transition-colors"><IconX /></button>
                <div className="w-14 h-14 bg-sky-900/30 text-sky-400 rounded-full flex items-center justify-center mx-auto mb-5 shadow-sm border border-sky-800/50"><IconLock /></div>
                <h2 className="text-xl font-bold text-zinc-50 mb-2 text-center">숨겨진 기능 해제</h2>
                <p className="text-zinc-400 mb-8 text-sm text-center">관리자 암호를 입력하세요.</p>
                <form onSubmit={handleAdminUnlock} className="space-y-4">
                  <input ref={unlockInputRef} type="password" value={unlockPwd} onChange={(e) => setUnlockPwd(e.target.value)} placeholder="비밀번호" className={`w-full px-5 py-4 border ${unlockError ? 'border-rose-500 bg-rose-950/20' : 'border-zinc-700 bg-zinc-900'} rounded-2xl focus:ring-2 focus:ring-sky-500 outline-none text-center text-zinc-100 tracking-[0.5em] text-lg font-bold transition-colors`} />
                  {unlockError && <p className="text-rose-400 text-xs text-center font-medium">비밀번호가 일치하지 않습니다.</p>}
                  <button type="submit" className="w-full bg-sky-600 hover:bg-sky-500 text-white text-base font-semibold py-4 rounded-2xl shadow-md transition-all mt-2">해제하기</button>
                </form>
              </div>
            </div>
          )}

          <button 
            onClick={() => setIsMobileView(!isMobileView)}
            className={`fixed top-4 right-4 md:top-6 md:right-6 z-50 flex items-center justify-center gap-2 px-4 py-2.5 md:px-5 md:py-3 glass-panel text-zinc-200 rounded-full font-semibold text-xs md:text-sm hover:bg-zinc-800/80 transition-all duration-300 shadow-lg transform ${showFloatingBtn ? 'translate-y-0 opacity-100' : '-translate-y-20 opacity-0 pointer-events-none'}`}
          >
            {isMobileView ? '🖥️ PC 뷰' : '📱 모바일 뷰'}
          </button>

          <div className="max-w-6xl mx-auto space-y-6 md:space-y-8 mt-12 md:mt-0">
            {!hasFirebaseConfig && <div className="bg-rose-500/10 text-rose-300 p-4 rounded-xl border border-rose-500/20 font-medium text-center text-sm md:text-base">⚠️ 데이터베이스 미연결: Firebase 설정이 누락되었습니다.</div>}

            <div className="glass-panel rounded-2xl md:rounded-3xl shadow-lg overflow-hidden">
              <div className="p-6 md:p-10 flex flex-col items-center md:items-start">
                <h1 className="text-2xl md:text-3xl font-bold text-zinc-50 tracking-tight">리더 길드 길드전 기록부</h1>
                <p className="text-zinc-400 mt-2 text-sm font-medium">실시간 동기화 및 덱 분석 시스템</p>
              </div>
              <div className="flex border-t border-zinc-800/50">
                <button onClick={() => setActiveTab('records')} className={`flex-1 py-4 md:py-5 text-center font-semibold text-sm md:text-base transition-colors ${activeTab === 'records' ? 'bg-sky-600/20 text-sky-400 border-b-2 border-sky-500' : 'text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-200'}`}>기록 추가 및 열람</button>
                {isAdminMode && <button onClick={() => setActiveTab('management')} className={`flex-1 py-4 md:py-5 text-center font-semibold text-sm md:text-base transition-colors ${activeTab === 'management' ? 'bg-sky-600/20 text-sky-400 border-b-2 border-sky-500' : 'text-zinc-400 hover:bg-zinc-800/50 hover:text-zinc-200'}`}>데이터 관리 (🔓)</button>}
              </div>
            </div>

            {activeTab === 'records' && (
              <div className="space-y-6 md:space-y-8 animate-in fade-in duration-300">
                <section className={`glass-panel p-5 md:p-8 rounded-2xl md:rounded-3xl shadow-lg transition-colors ${editingId ? 'border-sky-500/40 bg-sky-950/10' : ''}`}>
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-lg md:text-xl font-bold text-zinc-100 flex items-center gap-2">
                      {editingId ? <><span className="text-sky-400"><IconEdit /></span> 기존 기록 수정 중</> : '새 기록 추가'}
                    </h2>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5 mb-8">
                    <div>
                      <label className="block text-sm font-semibold text-zinc-400 mb-2">길드원 닉네임</label>
                      <input type="text" placeholder="내 닉네임 입력" value={nickname} onChange={(e) => setNickname(e.target.value)} className="w-full px-4 py-3.5 border border-zinc-700/80 rounded-xl bg-zinc-900 text-zinc-200 text-base font-medium focus:ring-2 focus:ring-sky-500/50 outline-none transition-all placeholder-zinc-600 shadow-sm"/>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-zinc-400 mb-2">날짜</label>
                      <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full px-4 py-3.5 border border-zinc-700/80 rounded-xl bg-zinc-900 text-zinc-200 text-base font-medium focus:ring-2 focus:ring-sky-500/50 outline-none transition-all shadow-sm"/>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-zinc-400 mb-2">상대 길드</label>
                      <input type="text" placeholder="예: 일루나" value={opponent} onChange={(e) => setOpponent(e.target.value)} className="w-full px-4 py-3.5 border border-zinc-700/80 rounded-xl bg-zinc-900 text-zinc-200 text-base font-medium focus:ring-2 focus:ring-sky-500/50 outline-none transition-all placeholder-zinc-600 shadow-sm"/>
                    </div>
                  </div>

                  <div className="space-y-4 pb-2">
                    <label className="block text-sm font-semibold text-zinc-400 mb-2">전투 결과 입력 (텍스트 붙여넣기 후 확인을 누르세요)</label>
                    {matches.map((match, index) => (
                      <div key={index} className="flex flex-col gap-3 md:gap-4 bg-zinc-900/50 p-4 md:p-5 rounded-2xl border border-zinc-800/60 hover:border-zinc-700 transition-colors w-full shadow-sm">
                        
                        <div className={`flex w-full border-b border-zinc-800/60 pb-3 md:pb-4 ${isMobileView ? 'flex-col gap-3' : 'flex-row items-center gap-3'}`}>
                          <div className="flex items-center justify-between w-full sm:w-auto">
                            <span className="font-bold text-zinc-500 text-lg md:text-xl w-8 text-center shrink-0">{index + 1}.</span>
                            <div className={`${isMobileView ? 'block' : 'hidden'} shrink-0`}>
                              <select value={match.result} onChange={(e) => handleMatchChange(index, 'result', e.target.value)} className={`px-4 py-2.5 border border-zinc-700/80 rounded-xl bg-zinc-800 font-semibold text-sm text-center shadow-sm focus:ring-2 focus:ring-sky-500/50 outline-none ${match.result === '승리' ? 'text-sky-400' : 'text-rose-400'}`}>
                                <option value="승리">승리</option><option value="패배">패배</option>
                              </select>
                            </div>
                          </div>
                          
                          <div className="flex-1 flex items-center gap-2 w-full mt-1 sm:mt-0">
                            <div className="relative flex-1 flex items-center">
                              <div className="absolute left-3.5 text-zinc-500 pointer-events-none"><IconClipboard /></div>
                              <input 
                                id={`quick-paste-${index}`}
                                type="text" 
                                placeholder="빠른 붙여넣기 (예: 손오공 루디 앨리스 승리 프레이야 밀리아 키리엘)"
                                className="w-full pl-10 pr-3 py-3 md:py-3.5 bg-zinc-900/80 border border-zinc-700/80 rounded-xl text-sm text-zinc-300 placeholder-zinc-600 focus:ring-2 focus:ring-sky-500/50 outline-none transition-all"
                                onPaste={(e) => {
                                  const text = e.clipboardData.getData('Text');
                                  handleQuickPasteLogic(index, text);
                                  e.preventDefault();
                                }}
                                onKeyDown={(e) => {
                                  if (e.key === 'Enter') {
                                    e.preventDefault();
                                    handleQuickPasteLogic(index, e.target.value);
                                    e.target.value = '';
                                  }
                                }}
                              />
                            </div>
                            <button
                              onClick={() => {
                                const inputEl = document.getElementById(`quick-paste-${index}`);
                                if (inputEl && inputEl.value.trim() !== '') {
                                  handleQuickPasteLogic(index, inputEl.value);
                                  inputEl.value = '';
                                }
                              }}
                              className="shrink-0 px-4 py-3 bg-zinc-800 text-zinc-200 font-semibold rounded-xl border border-zinc-700/50 shadow-sm hover:bg-zinc-700 transition-colors text-sm"
                            >
                              확인
                            </button>
                          </div>
                        </div>

                        <div className={`flex w-full ${isMobileView ? 'flex-col gap-3 items-stretch' : 'flex-row gap-4 items-center'}`}>
                          <div className={`flex w-full bg-sky-500/5 p-2.5 rounded-xl border border-sky-500/10 ${isMobileView ? 'flex-col gap-2' : 'flex-row gap-2.5 flex-1'}`}>
                            <div className={`px-2.5 py-1.5 bg-sky-500/10 text-sky-400 rounded-lg font-semibold text-xs md:text-sm shrink-0 flex items-center justify-center w-full ${isMobileView ? 'h-auto' : 'sm:w-auto h-12 md:h-14'}`}>아군 영웅</div>
                            <div className="grid grid-cols-3 gap-2 w-full">
                              {[0, 1, 2].map(heroIdx => (
                                <SearchableSelect key={`my-${heroIdx}`} value={match.myTeam[heroIdx]} onChange={(val) => handleTeamChange(index, 'myTeam', heroIdx, val)} placeholder={`선택 ${heroIdx + 1}`} groups={HERO_GROUPS} />
                              ))}
                            </div>
                          </div>

                          <div className={`${isMobileView ? 'hidden' : 'flex'} items-center shrink-0`}>
                            <select value={match.result} onChange={(e) => handleMatchChange(index, 'result', e.target.value)} className={`px-2.5 py-3 md:py-3.5 border border-zinc-700/80 rounded-xl bg-zinc-800 font-semibold text-sm md:text-base w-20 md:w-24 text-center shadow-sm focus:ring-2 focus:ring-sky-500/50 outline-none ${match.result === '승리' ? 'text-sky-400' : 'text-rose-400'} h-12 md:h-14`}>
                              <option value="승리">승리</option><option value="패배">패배</option>
                            </select>
                          </div>
                          
                          <span className={`${isMobileView ? 'hidden' : 'block'} text-zinc-700 font-medium text-xl shrink-0`}>/</span>

                          <div className={`flex w-full bg-rose-500/5 p-2.5 rounded-xl border border-rose-500/10 ${isMobileView ? 'flex-col gap-2 mt-1' : 'flex-row gap-2.5 flex-1'}`}>
                            <div className={`px-2.5 py-1.5 bg-rose-500/10 text-rose-400 rounded-lg font-semibold text-xs md:text-sm shrink-0 flex items-center justify-center w-full ${isMobileView ? 'h-auto' : 'sm:w-auto h-12 md:h-14'}`}>적군 영웅</div>
                            <div className="grid grid-cols-3 gap-2 w-full">
                              {[0, 1, 2].map(heroIdx => (
                                <SearchableSelect key={`enemy-${heroIdx}`} value={match.enemyTeam[heroIdx]} onChange={(val) => handleTeamChange(index, 'enemyTeam', heroIdx, val)} placeholder={`선택 ${heroIdx + 1}`} groups={HERO_GROUPS} />
                              ))}
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="flex gap-3 mt-6 relative z-0">
                    <button onClick={handleSave} className="flex-1 bg-sky-600 hover:bg-sky-500 text-white text-sm md:text-base font-semibold py-4 md:py-5 px-6 rounded-xl md:rounded-2xl shadow-md transition-all flex items-center justify-center gap-2">
                      <IconSave /> {editingId ? '수정된 내용 저장' : '새 기록 저장하기'}
                    </button>
                    {editingId && (
                      <button onClick={resetForm} className="bg-zinc-800 text-zinc-300 font-semibold text-sm md:text-base py-4 md:py-5 px-6 md:px-8 rounded-xl md:rounded-2xl hover:bg-zinc-700 transition-all flex items-center justify-center gap-2 border border-zinc-700">
                        <IconX /> 취소
                      </button>
                    )}
                  </div>
                </section>

                <section className="flex flex-col md:flex-row gap-3 md:gap-4">
                  <div className="relative flex-1">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-zinc-500"><IconSearch /></div>
                    <input type="text" placeholder="영웅 이름 또는 닉네임 (초성 검색 가능)" value={filterChar} onChange={(e) => setFilterChar(e.target.value)} className="w-full pl-12 pr-4 py-4 md:py-4 glass-panel rounded-xl md:rounded-2xl text-zinc-200 font-medium shadow-sm focus:ring-2 focus:ring-sky-500/50 outline-none text-sm md:text-base transition-all placeholder-zinc-500" />
                  </div>
                  <button onClick={() => setShowStats(!showStats)} className="flex items-center justify-center gap-2 px-6 py-4 md:py-4 glass-panel text-sky-400 rounded-xl md:rounded-2xl font-semibold text-sm md:text-base shadow-sm hover:bg-zinc-800/60 transition-all shrink-0">
                    <IconBarChart /> {showStats ? '통계 닫기' : '통계 열기'} {showStats ? <IconChevronUp /> : <IconChevronDown />}
                  </button>
                </section>

                {showStats && (
                  <section className="grid grid-cols-1 md:grid-cols-2 gap-4 animate-in slide-in-from-top-4 duration-300">
                    <div className="glass-panel p-5 md:p-6 rounded-2xl md:col-span-2 shadow-sm">
                      <h3 className="text-base md:text-lg font-bold text-zinc-100 mb-4 flex items-center gap-2">
                        <span className="p-1.5 bg-sky-500/10 text-sky-400 rounded-lg"><IconCalendar /></span> 제출 현황 (최근 7건)
                      </h3>
                      {dailySubmissionStats.length === 0 ? <p className="text-zinc-500 text-sm center py-4 font-medium">데이터가 없습니다.</p> : (
                        <div className="space-y-3">
                          {dailySubmissionStats.map(stat => {
                            const isExpanded = expandedStats[stat.groupKey];
                            return (
                              <div key={stat.groupKey} className="bg-zinc-900/50 rounded-xl border border-zinc-700/50 overflow-hidden">
                                <div className="flex items-center justify-between p-4 cursor-pointer hover:bg-zinc-800/50 transition-colors select-none" onClick={() => toggleStat(stat.groupKey)}>
                                  <div className="flex items-center gap-3">
                                    <span className="font-bold text-zinc-200 text-sm md:text-base">{stat.groupKey} <span className="text-zinc-500 text-xs ml-1 font-medium">({stat.dayOfWeek})</span></span>
                                    <span className="text-xs px-2.5 py-1 bg-sky-500/10 text-sky-400 font-semibold rounded-lg border border-sky-500/20">{stat.count}명 참여</span>
                                  </div>
                                  <div className="text-zinc-400 hover:text-zinc-200 transition-colors p-1">{isExpanded ? <IconChevronUp /> : <IconChevronDown />}</div>
                                </div>
                                {isExpanded && (
                                  <div className="p-4 border-t border-zinc-700/50 bg-zinc-950/30 animate-in slide-in-from-top-2 duration-200">
                                    <div className="flex flex-wrap gap-2">
                                      {stat.names.map(name => <span key={name} className="text-xs font-semibold bg-zinc-800 text-zinc-300 px-3 py-1.5 rounded-lg border border-zinc-700 shadow-sm">{name}</span>)}
                                    </div>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>

                    <div className="glass-panel p-5 md:p-6 rounded-2xl shadow-sm">
                      <h3 className="text-base md:text-lg font-bold text-zinc-100 mb-4 flex items-center gap-2"><span className="p-1.5 bg-rose-500/10 text-rose-400 rounded-lg"><IconBarChart /></span> 많이 사용된 덱 (Top 5)</h3>
                      {deckStats.length === 0 ? <p className="text-zinc-500 text-sm text-center py-6 font-medium">데이터가 없습니다.</p> : (
                        <ul className="space-y-3">
                          {deckStats.map((stat, idx) => (
                            <li key={idx} className="flex flex-col gap-2 p-4 bg-zinc-900/50 rounded-xl border border-zinc-700/50">
                              <div className="flex justify-between items-center">
                                <span className="font-semibold text-zinc-200 text-sm">{stat.deck}</span>
                                <span className="text-xs px-2.5 py-1 bg-zinc-800 text-zinc-300 font-medium rounded-lg border border-zinc-700">{stat.count}회 픽</span>
                              </div>
                              <div className="flex justify-between items-center text-xs">
                                <span className="text-zinc-500 font-medium">승률</span>
                                <span className={`font-bold ${parseFloat(stat.winRate) >= 50 ? 'text-sky-400' : 'text-rose-400'}`}>{stat.winRate}% <span className="font-medium text-zinc-500 ml-1">({stat.wins}승)</span></span>
                              </div>
                            </li>
                          ))}
                        </ul>
                      )}
                    </div>
                    
                    <div className="glass-panel p-5 md:p-6 rounded-2xl shadow-sm">
                      <h3 className="text-base md:text-lg font-bold text-zinc-100 mb-4 flex items-center gap-2"><span className="p-1.5 bg-emerald-500/10 text-emerald-400 rounded-lg"><IconUsers /></span> 누적 승률 통계</h3>
                      <div className="overflow-y-auto max-h-[300px] pr-2 custom-scrollbar">
                        {memberStats.length === 0 ? <p className="text-zinc-500 text-sm text-center py-6 font-medium">데이터가 없습니다.</p> : (
                          <ul className="space-y-3">
                            {memberStats.map((member, idx) => (
                              <li key={idx} className="flex justify-between items-center p-3.5 bg-zinc-900/50 rounded-xl border border-zinc-700/50">
                                <div>
                                  <p className="font-semibold text-zinc-200 text-sm">{member.name}</p>
                                  <p className="text-[11px] text-zinc-500 mt-1 font-medium">제출 {member.recordsCount}회 / 총 <span className="text-zinc-400">{member.totalMatches}전 {member.wins}승</span></p>
                                </div>
                                <div className="text-right">
                                  <p className="text-[10px] text-zinc-600 mb-0.5 font-medium">승률</p>
                                  <p className={`text-base font-bold ${parseFloat(member.winRate) >= 50 ? 'text-sky-400' : 'text-rose-400'}`}>{member.winRate}%</p>
                                </div>
                              </li>
                            ))}
                          </ul>
                        )}
                      </div>
                    </div>
                  </section>
                )}

                <section className="space-y-5">
                  {groupedRecords.length === 0 ? (
                    <div className="bg-zinc-900 border border-zinc-700 p-10 text-center rounded-2xl text-zinc-500 font-bold text-sm">
                      {filterChar ? '검색된 기록이 없습니다.' : '저장된 길드전 기록이 없습니다.'}
                    </div>
                  ) : (
                    groupedRecords.map(([groupKey, groupRecords]) => {
                      const isGroupExpanded = expandedGroups[groupKey] || filterChar.trim() !== '';

                      return (
                        <div key={groupKey} className="animate-in fade-in duration-300 bg-zinc-900 border border-zinc-700 rounded-2xl shadow-sm overflow-hidden">
                          <div className="flex items-center justify-between p-4 md:p-5 cursor-pointer hover:bg-zinc-800 transition-colors select-none" onClick={() => toggleGroup(groupKey)}>
                            <div className="flex items-center gap-3">
                              <div className="p-2 bg-blue-900/40 text-blue-400 rounded-lg border border-blue-800 hidden sm:block"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></div>
                              <div><h2 className="text-base md:text-lg font-black text-zinc-100 tracking-tight">{groupKey}</h2></div>
                              <span className="text-[11px] md:text-xs px-2.5 py-1 bg-zinc-800 text-zinc-200 font-bold rounded-lg border border-zinc-600">{groupRecords.length}명 제출</span>
                            </div>
                            <div className="text-zinc-400 p-1 transition-transform duration-200">{isGroupExpanded ? <IconChevronUp /> : <IconChevronDown />}</div>
                          </div>
                          
                          {isGroupExpanded && (
                            <div className="p-4 md:p-5 pt-1 space-y-6 border-t border-zinc-700 bg-zinc-900 animate-in slide-in-from-top-2 duration-200">
                              {groupRecords.map((record) => {
                                const isExpanded = expandedRecords[record.id] || filterChar.trim() !== '';
                                return (
                                  <div key={record.id} className="bg-zinc-800 p-4 md:p-6 rounded-2xl border border-zinc-600 relative group shadow-md">
                                    {(record.authorId === user?.uid || isAdminMode) && (
                                      <div className="absolute top-3 right-3 flex gap-1 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity bg-zinc-900 p-1 rounded-lg border border-zinc-600 z-10">
                                        <button onClick={(e) => { e.stopPropagation(); handleEditClick(record); }} className="text-zinc-400 hover:text-blue-400 p-1.5 hover:bg-zinc-800 rounded-md transition-colors" title="수정"><IconEdit /></button>
                                        <button onClick={(e) => { e.stopPropagation(); handleDelete(record.id); }} className="text-zinc-400 hover:text-red-500 p-1.5 hover:bg-zinc-800 rounded-md transition-colors" title="삭제"><IconTrash /></button>
                                      </div>
                                    )}
                                    <div className="flex items-center justify-between cursor-pointer select-none mb-2" onClick={() => toggleRecord(record.id)}>
                                      <h3 className="font-bold text-zinc-100 flex items-center gap-2">
                                        <span className="bg-zinc-700 border border-zinc-500 text-zinc-100 px-3 py-1 rounded-lg text-sm font-black shadow-sm">{record.nickname || '익명'}</span>
                                        <span className="text-zinc-400 font-bold text-xs md:text-sm">님의 기록</span>
                                      </h3>
                                      <div className={`text-zinc-400 hover:text-zinc-200 transition-colors p-1 ${(record.authorId === user?.uid || isAdminMode) ? 'mr-14 md:mr-0' : ''}`}>
                                        {isExpanded ? <IconChevronUp /> : <IconChevronDown />}
                                      </div>
                                    </div>
                                    
                                    {isExpanded && (
                                      <div className="mt-4 pt-4 border-t border-zinc-700 animate-in slide-in-from-top-2 duration-300">
                                        <ul className="space-y-4 w-full">
                                          {record.matches.map((match, idx) => (
                                            <li key={idx} className={`flex bg-zinc-900 p-3 md:p-4 rounded-xl border border-zinc-700 w-full relative overflow-hidden ${isMobileView ? 'flex-col gap-3' : 'flex-row gap-4 items-center'}`}>
                                              <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${match.result === '승리' ? 'bg-blue-500' : 'bg-red-500'}`}></div>
                                              
                                              <div className={`flex items-center justify-between w-full pl-2 mb-1 border-b border-zinc-800 pb-2 ${isMobileView ? '' : 'hidden'}`}>
                                                <span className="font-black text-zinc-500 text-[11px] tracking-widest">MATCH {idx + 1}</span>
                                                <span className={`font-black text-sm ${match.result === '승리' ? 'text-blue-400' : 'text-red-400'}`}>{match.result}</span>
                                              </div>

                                              <div className={`flex w-full gap-2 md:gap-3 pl-2 lg:pl-1 ${isMobileView ? 'flex-col items-stretch' : 'flex-row items-center'}`}>
                                                <div className={`${isMobileView ? 'hidden' : 'flex'} w-8 shrink-0 justify-center items-center`}><span className="font-black text-zinc-600 text-sm">{idx + 1}.</span></div>
                                                
                                                <div className={`flex w-full bg-blue-950/50 p-2 md:p-2.5 rounded-lg border border-blue-800 ${isMobileView ? 'flex-col items-stretch gap-2' : 'flex-row items-center gap-3 flex-1'}`}>
                                                  <div className={`px-2 py-1 bg-blue-900 text-blue-200 rounded-md text-[11px] font-black shrink-0 border border-blue-700 text-center ${isMobileView ? 'w-12' : 'w-auto'}`}>아군</div>
                                                  <div className="flex-1 flex items-center justify-start text-left">
                                                    {renderHeroTags(Array.isArray(match.myTeam) ? match.myTeam : match.myTeam?.split(','))}
                                                  </div>
                                                </div>

                                                <div className={`${isMobileView ? 'hidden' : 'flex'} font-black text-sm w-12 items-center justify-center shrink-0 ${match.result === '승리' ? 'text-blue-400' : 'text-red-400'}`}>{match.result}</div>
                                                
                                                <div className={`flex w-full bg-red-950/50 p-2 md:p-2.5 rounded-lg border border-red-800 ${isMobileView ? 'flex-col items-stretch gap-2 mt-1' : 'flex-row items-center gap-3 flex-1'}`}>
                                                  <div className={`px-2 py-1 bg-red-900 text-red-200 rounded-md text-[11px] font-black shrink-0 border border-red-700 text-center ${isMobileView ? 'w-12' : 'w-auto'}`}>적군</div>
                                                  <div className="flex-1 flex items-center justify-start text-left">
                                                    {renderHeroTags(Array.isArray(match.enemyTeam) ? match.enemyTeam : match.enemyTeam?.split(','))}
                                                  </div>
                                                </div>
                                              </div>
                                            </li>
                                          ))}
                                        </ul>
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      );
                    })
                  )}
                </section>
              </div>
            )}

            {activeTab === 'management' && isAdminMode && (
              <div className="animate-in fade-in duration-300">
                <div className="bg-zinc-900 border border-zinc-700 p-6 md:p-10 rounded-3xl shadow-xl">
                  <div className="mb-6 md:mb-8 border-b border-zinc-700 pb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div>
                      <h2 className="text-xl md:text-2xl font-black text-zinc-100">데이터 관리 대시보드</h2>
                      <p className="text-zinc-400 mt-1 font-bold text-sm">관리자 권한이 확인되었습니다.</p>
                    </div>
                    <div className="flex flex-col gap-2 w-full md:w-auto">
                      <button onClick={handleExportStatsCSV} className="flex items-center justify-center gap-2 px-5 py-3 bg-blue-900/40 text-blue-400 hover:bg-blue-900/60 border border-blue-800 font-bold text-sm rounded-xl transition-all"><IconBarChart /> 통계 결과 다운로드 (CSV)</button>
                      <button onClick={handleExportRawCSV} className="flex items-center justify-center gap-2 px-5 py-3 bg-zinc-800 text-zinc-200 hover:bg-zinc-700 hover:text-white border border-zinc-600 font-bold text-sm rounded-xl transition-all"><IconDownload /> 원본 데이터 다운로드 (CSV)</button>
                    </div>
                  </div>
                  <div className="bg-red-950/40 p-5 md:p-8 rounded-2xl border border-red-800 flex flex-col md:flex-row items-center justify-between gap-5 shadow-inner">
                    <div>
                      <h3 className="text-base md:text-lg font-black text-red-400 mb-1.5 flex items-center gap-2"><IconTrash /> 전적 전체 삭제</h3>
                      <p className="text-red-400/80 text-xs md:text-sm font-bold">현재 저장된 <strong className="text-red-400 font-black">{records.length}개</strong>의 모든 기록을 삭제합니다.</p>
                    </div>
                    <button onClick={handleDeleteAll} className="w-full md:w-auto px-8 py-3 bg-red-700 hover:bg-red-600 text-white text-sm font-black rounded-xl shadow-md transition-all shrink-0">모든 데이터 삭제</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
