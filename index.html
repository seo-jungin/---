          showAlert("시스템 오류", "공략 제출 중 오류가 발생했습니다.");
        }
      };

      const handleApproveGuide = async (id) => {
        try {
          await updateDoc(doc(fb.db, 'artifacts', APP_ID, 'public', 'data', GUIDE_COLLECTION, id), { status: 'approved', updatedAt: Date.now() });
        } catch (error) { showAlert("오류", "승인 중 오류 발생"); }
      };
      
      const handleRejectGuide = async (id) => {
        if(confirm("이 제안을 삭제하시겠습니까?")) {
          try { await deleteDoc(doc(fb.db, 'artifacts', APP_ID, 'public', 'data', GUIDE_COLLECTION, id)); } 
          catch (error) { showAlert("오류", "삭제 중 오류 발생"); }
        }
      };

      const handleAttackTeamChange = (index, teamType, heroIndex, value) => {
        const newMatches = [...attackMatches]; newMatches[index][teamType][heroIndex] = value; setAttackMatches(newMatches);
      };
      const handleAttackResultChange = (index, value) => {
        const newMatches = [...attackMatches]; newMatches[index].result = value; setAttackMatches(newMatches);
      };
      
      const fillAttackTeamQuick = (index, teamType, deckStr) => {
        if (!deckStr) return;
        const heroes = deckStr.split(',').map(h => h.trim());
        const newMatches = [...attackMatches];
        newMatches[index][teamType] = [heroes[0] || '', heroes[1] || '', heroes[2] || ''];
        setAttackMatches(newMatches);
      };
      const fillDefenseTeamQuick = (deckStr) => {
        if (!deckStr) return;
        const heroes = deckStr.split(',').map(h => h.trim());
        setDefenseMyTeam([heroes[0] || '', heroes[1] || '', heroes[2] || '']);
      };

      const handleAttackQuickPaste = (index, text) => {
        if (!text || text.trim() === '') return;
        let result = '승리';
        if (text.includes('패배') || text.includes('(패)') || text.includes('[패]') || text.includes(' 패 ')) result = '패배';
        
        let cleanText = text.replace(/공격|방어|승리|패배|\(승\)|\(패\)|\[승\]|\[패\]|:/gi, ' ').replace(/vs/gi, '/').replace(/[\[\]\(\),]/g, ' ').replace(/or/gi, ' ').trim();
        let myTeamStr = '', enemyTeamStr = '';

        if (cleanText.includes('/')) {
            let parts = cleanText.split('/');
            myTeamStr = parts[0]; enemyTeamStr = parts.slice(1).join(' ');
        } else {
            let tokens = cleanText.split(/[\s]+/).filter(Boolean);
            myTeamStr = tokens.slice(0, 3).join(' '); enemyTeamStr = tokens.slice(3, 6).join(' ');
        }

        const parseTeam = (str) => {
            let arr = str.split(/[\s]+/).filter(Boolean);
            return [arr[0] || '', arr[1] || '', arr[2] || ''];
        };
        const parsedMyTeam = parseTeam(myTeamStr); const parsedEnemyTeam = parseTeam(enemyTeamStr);
        const allPredefined = PREDEFINED_HERO_GROUPS.flatMap(g => g.heroes);
        const newDetectedHeroes = [...parsedMyTeam, ...parsedEnemyTeam].filter(h => h !== '' && !allPredefined.includes(h) && !customHeroes.includes(h));
        if (newDetectedHeroes.length > 0) setCustomHeroes(prev => [...prev, ...newDetectedHeroes]);

        const newMatches = [...attackMatches];
        newMatches[index] = { myTeam: parsedMyTeam, result, enemyTeam: parsedEnemyTeam };
        setAttackMatches(newMatches);
      };

      const handleDefenseMyTeamChange = (heroIndex, value) => {
        const newTeam = [...defenseMyTeam]; newTeam[heroIndex] = value; setDefenseMyTeam(newTeam);
      };
      const handleDefenseEnemyChange = (index, heroIndex, value) => {
        const newMatches = [...defenseMatches]; newMatches[index].enemyTeam[heroIndex] = value; setDefenseMatches(newMatches);
      };
      const handleDefenseResultChange = (index, value) => {
        const newMatches = [...defenseMatches]; newMatches[index].result = value; setDefenseMatches(newMatches);
      };
      const addDefenseMatch = () => {
        if (defenseMatches.length < 15) setDefenseMatches([...defenseMatches, { enemyTeam: ['', '', ''], result: '방어 성공' }]);
        else showAlert("추가 불가", "방어 기록은 한 번에 최대 15개까지만 입력 가능합니다.");
      };

      const handleDefenseGlobalPaste = (text) => {
        if (!text || text.trim() === '') return;
        
        const lines = text.split(/\n|\||\//).map(l => l.trim()).filter(Boolean);
        const allPredefined = PREDEFINED_HERO_GROUPS.flatMap(g => g.heroes);
        
        let newMyTeam = [...defenseMyTeam];
        let newDefMatches = [];
        let foundNewHeroes = [];

        lines.forEach((line, lineIdx) => {
            let result = '방어 성공';
            if (line.includes('실패') || line.includes('패배') || line.includes('방실') || line.includes('(패)') || line.includes(' 패 ')) result = '방어 실패';

            let cleanLine = line.replace(/성공|실패|승리|패배|방어|공격|방성|방실|\(승\)|\(패\)|\[.*?\]|:/g, ' ').replace(/[^\w\s가-힣ㄱ-ㅎㅏ-ㅣ]/g, ' ').trim();
            let tokens = cleanLine.split(/[\s]+/).filter(Boolean);
            let extractedHeroes = tokens.slice(0, 3);

            extractedHeroes.forEach(h => {
                if (h && !allPredefined.includes(h) && !customHeroes.includes(h)) foundNewHeroes.push(h);
            });

            if (extractedHeroes.length > 0) {
                if (lineIdx === 0 && !newMyTeam.some(h => h.trim())) {
                    newMyTeam = [extractedHeroes[0]||'', extractedHeroes[1]||'', extractedHeroes[2]||''];
                } else {
                    newDefMatches.push({
                        enemyTeam: [extractedHeroes[0]||'', extractedHeroes[1]||'', extractedHeroes[2]||''],
                        result: result
                    });
                }
            }
        });

        if (foundNewHeroes.length > 0) setCustomHeroes(prev => [...new Set([...prev, ...foundNewHeroes])]);
        if (newMyTeam.some(h => h.trim())) setDefenseMyTeam(newMyTeam);
        
        if (newDefMatches.length > 0) {
            if (defenseMatches.length === 1 && !defenseMatches[0].enemyTeam.some(h => h.trim())) {
                setDefenseMatches(newDefMatches.slice(0, 15));
            } else {
                setDefenseMatches([...defenseMatches, ...newDefMatches].slice(0, 15));
            }
        }
      };
      
      const handleBulkParse = async () => {
        if (!rawRecordInputState.trim()) return showAlert("알림", "파싱할 텍스트를 입력하세요.");
        const lines = rawRecordInputState.split('\n');
        const newRecords = [];
        const allPredefined = PREDEFINED_HERO_GROUPS.flatMap(g => g.heroes);
        let unknownCount = 0;
        
        lines.forEach(line => {
          let cleanLine = line.replace(/[\[\]\<\>:\-]/g, ' ').trim();
          let tokens = cleanLine.split(/\s+/);
          let atkIdx = tokens.findIndex(t => t === '공격' || t === '공');
          let defIdx = tokens.findIndex(t => t === '방어' || t === '방');
          if(atkIdx !== -1 && defIdx !== -1) {
            let atkTokens, defTokens;
            if(atkIdx < defIdx) {
              atkTokens = tokens.slice(atkIdx + 1, defIdx);
              defTokens = tokens.slice(defIdx + 1);
            } else {
              defTokens = tokens.slice(defIdx + 1, atkIdx);
              atkTokens = tokens.slice(atkIdx + 1);
            }
            
            const extractResult = (arr) => {
              if(arr.length < 2) return null;
              let res = arr.pop(); 
              let isWin = false, isLose = false;
              if(res.includes('승') && !res.includes('패') && !res.includes('무')) isWin = true;
              else if(res.includes('패')) isLose = true;
              if(!isWin && !isLose) return null;
              
              const deck = arr.map(h => {
                 let clean = h.trim();
                 if (clean && !allPredefined.includes(clean)) unknownCount++;
                 return clean;
              });
              
              return { deck, result: isWin ? '승리' : '패배' };
            };
            
            let atkData = extractResult(atkTokens);
            let defData = extractResult(defTokens);
            
            if(atkData && defData) {
              newRecords.push({
                type: '공격',
                myTeam: atkData.deck.join(', '),
                enemyTeam: defData.deck.join(', '),
                result: atkData.result
              });
            }
          }
        });
        
        if (newRecords.length > 0) {
           try {
              await addDoc(collection(fb.db, 'artifacts', APP_ID, 'public', 'data', COLLECTION_NAME), {
                nickname: '관리자(일괄추가)',
                date: new Date().toISOString().split('T')[0],
                opponent: '일괄입력',
                recordType: 'attack',
                matches: newRecords,
                createdAt: Date.now(),
                authorId: user?.uid || 'admin'
              });
              showAlert("성공", `${newRecords.length}개의 전적이 등록되었습니다.\n(미등록 영웅 포함: ${unknownCount}건)`);
              setRawRecordInputState('');
           } catch(e) {
              showAlert("오류", "데이터베이스 저장 중 오류가 발생했습니다.");
           }
        } else {
           showAlert("알림", "인식된 전적이 없습니다. 양식을 확인하세요.");
        }
      };

      const resetForm = () => {
        if (editingId) {
          setNickname(''); setDate(new Date().toISOString().split('T')[0]); setOpponent('');
        } else {
          if (!keepNickname) setNickname('');
          if (!keepDate) setDate(new Date().toISOString().split('T')[0]);
          if (!keepOpponent) setOpponent('');
        }
        setEditingId(null); setEditingAuthorId(null);
        setAttackMatches(Array.from({ length: 5 }, () => ({ myTeam: ['', '', ''], result: '승리', enemyTeam: ['', '', ''] })));
        setDefenseMyTeam(['', '', '']);
        setDefenseMatches([{ enemyTeam: ['', '', ''], result: '방어 성공' }]);
      };

      const handleSave = async () => {
        if (!fb.isValid) return showAlert("설정 오류", "데이터베이스에 연결되지 않았습니다.");
        if (!user) return showAlert("인증 오류", "인증 정보가 없습니다.");
        if (!nickname || !date || !opponent) return showAlert("입력 오류", "상단 기본 정보(닉네임, 날짜, 상대)를 모두 입력해주세요.");

        let dataToSave = { 
          nickname, date, opponent, recordType: subTab, 
          authorId: editingId ? (editingAuthorId || user.uid) : user.uid 
        };
        
        let allInputHeroes = [];

        if (subTab === 'attack') {
          const valid = attackMatches.filter(m => m.myTeam.some(h => h.trim()) || m.enemyTeam.some(h => h.trim()));
          if (valid.length === 0) return showAlert("입력 오류", "최소 1개의 공격 기록을 입력하세요.");
          dataToSave.matches = valid;
          valid.forEach(m => { allInputHeroes.push(...m.myTeam, ...m.enemyTeam); });
        } else {
          if (!defenseMyTeam.some(h => h.trim())) return showAlert("입력 오류", "아군 방어 영웅을 입력하세요.");
          const valid = defenseMatches.filter(m => m.enemyTeam.some(h => h.trim()));
          if (valid.length === 0) return showAlert("입력 오류", "최소 1개의 적군 공격 기록을 입력하세요.");
          dataToSave.myTeam = defenseMyTeam;
          dataToSave.defenseMatches = valid;
          allInputHeroes.push(...defenseMyTeam);
          valid.forEach(m => allInputHeroes.push(...m.enemyTeam));
        }

        const allValidHeroes = PREDEFINED_HERO_GROUPS.flatMap(g => g.heroes);
        const usedHeroes = new Set(allInputHeroes.map(h => h && typeof h === 'string' ? h.trim() : '').filter(Boolean));
        const unknownHeroes = [...usedHeroes].filter(h => !allValidHeroes.includes(h));

        if (unknownHeroes.length > 0) {
          showConfirm("오타 확인", `목록에 없는 이름이 있습니다.\n[${unknownHeroes.join(', ')}]\n\n오타라면 '취소', 신규 영웅이라면 '강제 저장'을 누르세요.`, () => { executeSave(dataToSave, unknownHeroes); setConfirmModal({ isOpen: false }); }, "강제 저장");
        } else { executeSave(dataToSave, []); }
      };

      const executeSave = async (data, newHeroes) => {
        try {
          if (editingId) {
            data.updatedAt = Date.now();
            await updateDoc(doc(fb.db, 'artifacts', APP_ID, 'public', 'data', COLLECTION_NAME, editingId), data);
          } else {
            data.createdAt = Date.now();
            await addDoc(collection(fb.db, 'artifacts', APP_ID, 'public', 'data', COLLECTION_NAME), data);
          }
          if (newHeroes.length > 0) {
            const added = newHeroes.filter(h => !customHeroes.includes(h));
            if (added.length > 0) setCustomHeroes(prev => [...prev, ...added]);
          }
          resetForm(); showAlert("저장 완료", "성공적으로 저장되었습니다.");
        } catch (error) { console.error("Save Error:", error); showAlert("시스템 오류", "저장 중 오류가 발생했습니다."); }
      };

      const handleEditClick = (record) => {
        setEditingId(record.id); 
        setEditingAuthorId(record.authorId || null); 
        setNickname(record.nickname || ''); setDate(record.date || new Date().toISOString().split('T')[0]); setOpponent(record.opponent || '');
        
        if (subTab === 'attack') {
          const loaded = record.matches?.map(m => ({
            myTeam: getSafeArray(m.myTeam).length > 0 ? getSafeArray(m.myTeam) : ['', '', ''],
            result: m.result || '승리',
            enemyTeam: getSafeArray(m.enemyTeam).length > 0 ? getSafeArray(m.enemyTeam) : ['', '', '']
          })) || [];
          while(loaded.length < 5) loaded.push({ myTeam: ['', '', ''], result: '승리', enemyTeam: ['', '', ''] });
          setAttackMatches(loaded.slice(0,5));
        } else {
          setDefenseMyTeam(getSafeArray(record.myTeam).length > 0 ? getSafeArray(record.myTeam) : ['', '', '']);
          const loadedDef = record.defenseMatches?.map(m => ({
            enemyTeam: getSafeArray(m.enemyTeam).length > 0 ? getSafeArray(m.enemyTeam) : ['', '', ''],
            result: m.result || '방어 성공'
          })) || [{ enemyTeam: ['', '', ''], result: '방어 성공' }];
          setDefenseMatches(loadedDef);
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleDelete = (id) => {
        if (!fb.isValid) return;
        showConfirm("기록 삭제", "기록을 영구히 삭제합니다.", async () => {
          try { await deleteDoc(doc(fb.db, 'artifacts', APP_ID, 'public', 'data', COLLECTION_NAME, id)); if (editingId === id) resetForm(); setConfirmModal({ isOpen: false }); } 
          catch (error) { showAlert("오류", "삭제 권한이 부족합니다."); }
        }, "삭제 진행");
      };

      const handleDeleteAllByType = (type) => {
        if (!isAdminMode) return;
        const typeRecords = records.filter(r => (r.recordType || 'attack') === type);
        if (typeRecords.length === 0) return showAlert("알림", "삭제할 데이터가 없습니다.");
        const typeName = type === 'attack' ? '공격 기록' : '방어 기록';
        showConfirm(`${typeName} 전체 삭제`, `총 ${typeRecords.length}개의 ${typeName}을 모두 삭제합니다. 진행할까요?`, async () => {
          try {
            let sCount = 0; setConfirmModal({ isOpen: false });
            for (const r of typeRecords) { await deleteDoc(doc(fb.db, 'artifacts', APP_ID, 'public', 'data', COLLECTION_NAME, r.id)); sCount++; }
            showAlert("결과", `성공: ${sCount}건 삭제됨`);
          } catch (error) { showAlert("에러", "일괄 삭제 중 권한 에러 발생"); }
        }, "일괄 삭제 진행");
      };

      const handleExportAllCSV = () => {
        if (records.length === 0) return showAlert("알림", "데이터가 없습니다.");
        let csv = "\uFEFF=== [길드전 승리(공격) 기록] ===\n날짜,닉네임,상대길드,매치,아군1,아군2,아군3,결과,적군1,적군2,적군3\n";
        records.filter(r => (r.recordType || 'attack') === 'attack').forEach(r => {
          r.matches?.forEach((m, i) => {
            const my = getSafeArray(m.myTeam); const en = getSafeArray(m.enemyTeam);
            csv += `${r.date},${r.nickname},${r.opponent},${(my[0]||'').trim()},${(my[1]||'').trim()},${(my[2]||'').trim()},${i+1},${(en[0]||'').trim()},${(en[1]||'').trim()},${(en[2]||'').trim()}\n`;
          });
        });
        csv += "\n=== [길드전 방어 기록] ===\n날짜,닉네임,상대길드,내방어덱1,내방어덱2,내방어덱3,매치,적군공격1,적군공격2,적군공격3,결과(방어)\n";
        records.filter(r => r.recordType === 'defense').forEach(r => {
          const my = getSafeArray(r.myTeam);
          r.defenseMatches?.forEach((m, i) => {
            const en = getSafeArray(m.enemyTeam);
            csv += `${r.date},${r.nickname},${r.opponent},${(my[0]||'').trim()},${(my[1]||'').trim()},${(my[2]||'').trim()},${i+1},${(en[0]||'').trim()},${(en[1]||'').trim()},${(en[2]||'').trim()},${m.result}\n`;
          });
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `길드전_전체기록_${new Date().toISOString().split('T')[0]}.csv`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      const handleExportStatsCSV = () => {
        handleExportAllCSV(); 
      };

      const groupedRecords = useMemo(() => {
        const groups = {};
        let search = filterChar.toLowerCase().trim();
        let choSearch = getChosung(search);
        
        currentRecords.forEach(r => {
          let isMatch = false;
          if (search === '') isMatch = true;
          else if (r.nickname?.toLowerCase().includes(search) || getChosung(r.nickname||'').includes(choSearch)) isMatch = true;
          else {
            if (subTab === 'attack') {
              r.matches?.forEach(m => {
                const str = getSafeArray(m.myTeam).join(',') + getSafeArray(m.enemyTeam).join(',');
                if (str.toLowerCase().includes(search) || getChosung(str).includes(choSearch)) isMatch = true;
              });
            } else {
              const myStr = getSafeArray(r.myTeam).join(',');
              if (myStr.toLowerCase().includes(search) || getChosung(myStr).includes(choSearch)) isMatch = true;
              r.defenseMatches?.forEach(m => {
                const enStr = getSafeArray(m.enemyTeam).join(',');
                if (enStr.toLowerCase().includes(search) || getChosung(enStr).includes(choSearch)) isMatch = true;
              });
            }
          }
          if (!isMatch) return;

          const groupKey = `${r.date} / vs ${r.opponent || '알 수 없음'}`;
          if (!groups[groupKey]) groups[groupKey] = []; groups[groupKey].push(r);
        });
        return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
      }, [currentRecords, filterChar, subTab]);

      const toggleRecord = (id) => setExpandedRecords(prev => ({ ...prev, [id]: !prev[id] }));
      const toggleGroup = (key) => setExpandedGroups(prev => ({ ...prev, [key]: !prev[key] }));

      if (!isLoggedIn) {
        return (
          <div style={{position: 'fixed', inset: 0, zIndex: 9000, display: 'flex', justifyContent: 'center', alignItems: 'center', overflow: 'hidden'}}>
            <div className="login-bg-anim"></div>
            <div className="login-card">
              <h2 className="login-title-text">[ 리더 길드 ]</h2>
              <input type="text" value={loginId} onChange={e=>setLoginId(e.target.value)} className="login-input" placeholder="ID" />
              <input type="password" value={loginPw} onChange={e=>setLoginPw(e.target.value)} className="login-input" placeholder="PASSWORD" onKeyDown={e=>{if(e.key==='Enter') handleLogin()}} />
              <button onClick={handleLogin} className="gold-button w-full mt-4 py-4 rounded-xl font-black text-lg">LOGIN</button>
              {loginError && <p style={{color:'var(--danger)', fontSize:'12px', marginTop:'20px', fontWeight:'bold'}}>ACCESS DENIED (정보 불일치)</p>}
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-4 md:p-8 text-[15px] pb-32 relative">
          <CustomModal isOpen={alertModal.isOpen} onClose={() => setAlertModal({...alertModal, isOpen: false})} title={alertModal.title} content={alertModal.content} onConfirm={() => setAlertModal({...alertModal, isOpen: false})} hideCancel={true} />
          <CustomModal isOpen={confirmModal.isOpen} onClose={() => setConfirmModal({...confirmModal, isOpen: false})} title={confirmModal.title} content={confirmModal.content} onConfirm={confirmModal.action} confirmText={confirmModal.confirmText} />

          {guideModal.isOpen && (
              <div className="fixed inset-0 z-[400] flex items-center justify-center bg-black/80 p-4 animate-in fade-in duration-200">
                <div className="gold-panel p-6 md:p-8 rounded-2xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto custom-scrollbar">
                  <h3 className="text-xl font-black gold-gradient-text mb-2 flex items-center gap-2"><IconEdit/> {guideModal.type === 'defense' ? '방어 덱 운영법 제안하기' : '새로운 공략 제안하기'}</h3>
                  <p className="text-xs text-zinc-400 mb-6">작성해주신 공략은 관리자 검토 후 보관소에 공식 등록됩니다.</p>
                  
                  <div className="space-y-4">
                    <div className="flex gap-2 text-xs font-bold text-zinc-300">
                      <span className="w-16 shrink-0 text-zinc-500">대상 방어덱:</span>
                      <span>{getSafeArray(guideModal.defTeam).join(', ')}</span>
                    </div>
                    
                    {guideModal.type === 'counter' && (
                      <div className="flex gap-2 text-xs font-bold text-zinc-300 items-center">
                        <span className="w-16 shrink-0 text-zinc-500">카운터 덱:</span>
                        <div className="flex gap-2 flex-1 relative z-[300]">
                          {[0,1,2].map(i => (
                            <SearchableSelect key={i} zIndex={300} value={guideModal.atkTeam[i]} onChange={(v) => {
                               const newAtk = [...guideModal.atkTeam]; newAtk[i] = v; setGuideModal({...guideModal, atkTeam: newAtk});
                            }} placeholder={`영웅 ${i+1}`} groups={HERO_GROUPS} className="h-10 text-xs" />
                          ))}
                        </div>
                      </div>
                    )}
                    
                    <div className="pt-4 border-t border-zinc-800 space-y-3">
                      {guideModal.type === 'counter' ? (
                        <>
                          <div>
                            <label className="block text-xs font-bold text-zinc-400 mb-1">스킬 운영 (필수)</label>
                            <input type="text" value={guideModal.skill} onChange={e => setGuideModal({...guideModal, skill: e.target.value})} placeholder="예: 크리스 아래 → 크리스 위" className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-sm text-zinc-100 outline-none focus:ring-1 focus:ring-yellow-600"/>
                          </div>
                          <div className="flex gap-3">
                            <div className="flex-1">
                              <label className="block text-xs font-bold text-zinc-400 mb-1">턴 (필수)</label>
                              <input type="text" value={guideModal.turn} onChange={e => setGuideModal({...guideModal, turn: e.target.value})} placeholder="예: 선공 or 후공" className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-sm text-zinc-100 outline-none focus:ring-1 focus:ring-yellow-600"/>
                            </div>
                            <div className="flex-1">
                              <label className="block text-xs font-bold text-zinc-400 mb-1">진형 (필수)</label>
                              <input type="text" value={guideModal.formation} onChange={e => setGuideModal({...guideModal, formation: e.target.value})} placeholder="예: 공격진형" className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-sm text-zinc-100 outline-none focus:ring-1 focus:ring-yellow-600"/>
                            </div>
                          </div>
                          <div>
                            <label className="block text-xs font-bold text-zinc-400 mb-1">장비 세팅 1</label>
                            <input type="text" value={guideModal.equip1} onChange={e => setGuideModal({...guideModal, equip1: e.target.value})} placeholder="예: 크리스: 주술사 / 반지: 즉사" className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-sm text-zinc-100 outline-none focus:ring-1 focus:ring-yellow-600"/>
                          </div>
                          <div>
                            <label className="block text-xs font-bold text-zinc-400 mb-1">장비 세팅 2</label>
                            <input type="text" value={guideModal.equip2} onChange={e => setGuideModal({...guideModal, equip2: e.target.value})} className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-sm text-zinc-100 outline-none focus:ring-1 focus:ring-yellow-600"/>
                          </div>
                          <div>
                            <label className="block text-xs font-bold text-zinc-400 mb-1">장비 세팅 3</label>
                            <input type="text" value={guideModal.equip3} onChange={e => setGuideModal({...guideModal, equip3: e.target.value})} className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-sm text-zinc-100 outline-none focus:ring-1 focus:ring-yellow-600"/>
                          </div>
                        </>
                      ) : (
                        <>
                          <div>
                            <label className="block text-xs font-bold text-zinc-400 mb-1">추천 펫</label>
                            <input type="text" value={guideModal.skill} onChange={e => setGuideModal({...guideModal, skill: e.target.value})} placeholder="예: 루디, 카람" className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-sm text-zinc-100 outline-none focus:ring-1 focus:ring-yellow-600"/>
                          </div>
                          <div>
                            <label className="block text-xs font-bold text-zinc-400 mb-1">핵심 장비 1</label>
                            <input type="text" value={guideModal.equip1} onChange={e => setGuideModal({...guideModal, equip1: e.target.value})} placeholder="예: 크리스: 주술사 / 반지: 즉사" className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-sm text-zinc-100 outline-none focus:ring-1 focus:ring-yellow-600"/>
                          </div>
                          <div>
                            <label className="block text-xs font-bold text-zinc-400 mb-1">핵심 장비 2</label>
                            <input type="text" value={guideModal.equip2} onChange={e => setGuideModal({...guideModal, equip2: e.target.value})} className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-sm text-zinc-100 outline-none focus:ring-1 focus:ring-yellow-600"/>
                          </div>
                          <div>
                            <label className="block text-xs font-bold text-zinc-400 mb-1">핵심 장비 3</label>
                            <input type="text" value={guideModal.equip3} onChange={e => setGuideModal({...guideModal, equip3: e.target.value})} className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-sm text-zinc-100 outline-none focus:ring-1 focus:ring-yellow-600"/>
                          </div>
                        </>
                      )}
                      <div>
                        <label className="block text-xs font-bold text-zinc-400 mb-1">{guideModal.type === 'defense' ? '운영 팁' : '추가 팁 (Tip)'}</label>
                        <textarea value={guideModal.tip} onChange={e => setGuideModal({...guideModal, tip: e.target.value})} rows="3" placeholder="추가적인 운영법이나 주의사항을 적어주세요." className="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-sm text-zinc-100 outline-none focus:ring-1 focus:ring-yellow-600 custom-scrollbar"></textarea>
                      </div>
                    </div>
                  </div>

                  <div className="flex gap-3 mt-6">
                    <button onClick={() => setGuideModal({...guideModal, isOpen: false})} className="flex-1 py-3 rounded-xl bg-zinc-800 border border-zinc-700 text-zinc-300 font-bold text-sm hover:bg-zinc-700 transition-colors">취소</button>
                    <button onClick={handleGuideSubmit} className="flex-1 py-3 rounded-xl gold-button font-bold text-sm">제출하기</button>
                  </div>
                </div>
              </div>
          )}

          {unlockModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 p-4 animate-in fade-in duration-200">
              <div className="gold-panel p-8 md:p-12 rounded-3xl shadow-2xl max-w-sm w-full relative">
                <button onClick={() => setUnlockModalOpen(false)} className="absolute top-4 right-4 p-2 text-zinc-500 hover:text-zinc-300 transition-colors"><IconX /></button>
                <div className="w-14 h-14 bg-yellow-900/30 text-yellow-500 rounded-full flex items-center justify-center mx-auto mb-5 shadow-sm border border-yellow-700/50"><IconLock /></div>
                <h2 className="text-xl font-bold gold-gradient-text mb-2 text-center">숨겨진 기능 해제</h2>
                <p className="text-zinc-400 mb-8 text-sm text-center">관리자 암호를 입력하세요.</p>
                <form onSubmit={handleAdminUnlock} className="space-y-4">
                  <input ref={unlockInputRef} type="password" value={unlockPwd} onChange={(e) => setUnlockPwd(e.target.value)} placeholder="비밀번호" className={`w-full px-5 py-4 border ${unlockError ? 'border-red-500 bg-red-950/20' : 'border-yellow-700/50 bg-zinc-900'} rounded-2xl focus:ring-2 focus:ring-yellow-600 outline-none text-center text-zinc-100 tracking-[0.5em] text-lg font-bold transition-colors shadow-inner`} />
                  {unlockError && <p className="text-red-400 text-xs text-center font-medium">비밀번호가 일치하지 않습니다.</p>}
                  <button type="submit" className="w-full gold-button font-black py-4 rounded-2xl shadow-md transition-all mt-2">해제하기</button>
                </form>
              </div>
            </div>
          )}

          <button onClick={() => setIsMobileView(!isMobileView)} className={`fixed top-4 right-4 z-50 flex items-center gap-2 px-4 py-2.5 gold-button rounded-full font-bold text-xs md:text-sm transform ${showFloatingBtn?'translate-y-0 opacity-100':'-translate-y-20 opacity-0'} transition-all duration-300 border border-zinc-600`}>
            {isMobileView ? '🖥️ PC 모드' : '📱 모바일 모드'}
          </button>

          <div className="max-w-6xl mx-auto space-y-6 md:space-y-8 mt-10 md:mt-0">
            <div className="bg-zinc-900 border border-zinc-700 rounded-2xl shadow-2xl overflow-hidden">
              <div className="p-6 md:p-8 flex flex-col md:flex-row items-center justify-between bg-gradient-to-b from-zinc-800 to-zinc-900">
                <div>
                  <h1 className="text-3xl md:text-4xl font-black gold-gradient-text cursor-pointer select-none drop-shadow-md" onClick={handleTitleClick} title="타이틀 5번 연속 클릭 시 관리자 모드 열림">
                    리더 길드전 전략실
                  </h1>
                </div>
              </div>
              <div className="flex border-t border-zinc-700 bg-zinc-900 flex-wrap">
                <button onClick={() => handleTabChange('records', 'attack')} className={`flex-1 py-4 font-black text-sm md:text-base transition-all flex items-center justify-center gap-2 ${mainTab === 'records' ? 'gold-bg-active' : 'text-zinc-500 hover:bg-zinc-800/50 hover:text-zinc-300'}`}>
                  <span className={mainTab === 'records' ? 'gold-gradient-text drop-shadow-sm' : ''}>길드전 기록</span>
                </button>
                <button onClick={() => handleTabChange('strategy', 'counter')} className={`flex-1 py-4 font-black text-sm md:text-base transition-all flex items-center justify-center gap-2 ${mainTab === 'strategy' ? 'gold-bg-active' : 'text-zinc-500 hover:bg-zinc-800/50 hover:text-zinc-300'}`}>
                  <span className={mainTab === 'strategy' ? 'gold-gradient-text drop-shadow-sm' : ''}>길드전 공략실</span>
                </button>
                {isAdminMode && (
                  <button onClick={() => handleTabChange('management', null)} className={`flex-1 py-4 font-black text-sm md:text-base transition-all flex items-center justify-center gap-2 ${mainTab === 'management' ? 'gold-bg-active' : 'text-zinc-500 hover:bg-zinc-800/50 hover:text-zinc-300'}`}>
                    <span className={mainTab === 'management' ? 'gold-gradient-text drop-shadow-sm' : ''}>데이터 관리</span>
                  </button>
                )}
              </div>
            </div>

            {mainTab === 'records' && (
               <div className="flex gap-2 flex-wrap">
                 <button onClick={() => {setSubTab('attack'); resetForm();}} className={`px-6 py-2.5 rounded-full font-bold text-sm transition-colors border ${subTab === 'attack' ? 'bg-zinc-800 text-zinc-100 border-zinc-500' : 'bg-transparent text-zinc-500 border-transparent hover:text-zinc-300'}`}>공격 기록지</button>
                 <button onClick={() => {setSubTab('defense'); resetForm();}} className={`px-6 py-2.5 rounded-full font-bold text-sm transition-colors border ${subTab === 'defense' ? 'bg-zinc-800 text-zinc-100 border-zinc-500' : 'bg-transparent text-zinc-500 border-transparent hover:text-zinc-300'}`}>방어 기록지</button>
               </div>
            )}

            {mainTab === 'strategy' && (
               <div className="flex gap-2 flex-wrap">
                 <button onClick={() => setSubTab('counter')} className={`px-5 py-2.5 rounded-full font-bold text-sm transition-colors border ${subTab === 'counter' ? 'bg-zinc-800 text-zinc-100 border-zinc-500' : 'bg-transparent text-zinc-500 border-transparent hover:text-zinc-300'}`}>카운터 보관소</button>
                 <button onClick={() => setSubTab('recommend')} className={`px-5 py-2.5 rounded-full font-bold text-sm transition-colors border ${subTab === 'recommend' ? 'bg-zinc-800 text-zinc-100 border-zinc-500' : 'bg-transparent text-zinc-500 border-transparent hover:text-zinc-300'}`}>방어팀 추천 덱</button>
                 <button onClick={() => setSubTab('basic')} className={`px-5 py-2.5 rounded-full font-bold text-sm transition-colors border ${subTab === 'basic' ? 'bg-zinc-800 text-zinc-100 border-zinc-500' : 'bg-transparent text-zinc-500 border-transparent hover:text-zinc-300'}`}>기본덱조합</button>
                 <button onClick={() => setSubTab('dashboard')} className={`px-5 py-2.5 rounded-full font-bold text-sm transition-colors border ${subTab === 'dashboard' ? 'bg-zinc-800 text-zinc-100 border-zinc-500' : 'bg-transparent text-zinc-500 border-transparent hover:text-zinc-300'}`}>전체전적</button>
               </div>
            )}

            {mainTab === 'records' && (
              <div className="space-y-6 animate-in fade-in duration-300">
                <section className={`bg-zinc-900 border border-zinc-700 p-4 md:p-8 rounded-2xl shadow-lg ${editingId ? 'border-yellow-600 bg-yellow-950/10' : ''}`}>
                  <h2 className="text-lg md:text-xl font-black text-zinc-100 mb-6 flex items-center gap-2">
                    {editingId ? <><span className="gold-gradient-text"><IconEdit /></span> 기록 수정 중 ({subTab==='attack'?'공격':'방어'})</> : (subTab==='attack'?'⚔️ 길드전 공격 기록 추가':'🛡️ 길드전 방어 기록 추가')}
                  </h2>
                  
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div>
                      <div className="flex justify-between items-center mb-1.5">
                        <label className="block text-sm font-bold text-zinc-400">길드원 닉네임</label>
                        <label className="flex items-center gap-1.5 text-xs text-yellow-600/80 cursor-pointer hover:text-yellow-500 font-bold">
                          <input type="checkbox" checked={keepNickname} onChange={(e) => setKeepNickname(e.target.checked)} className="keep-checkbox" />
                          입력 유지
                        </label>
                      </div>
                      <input type="text" value={nickname} onChange={(e) => setNickname(e.target.value)} className="w-full px-4 py-3 bg-zinc-800 border border-zinc-600 rounded-xl text-zinc-100 font-bold outline-none focus:ring-2 focus:ring-yellow-600"/>
                    </div>
                    <div>
                      <div className="flex justify-between items-center mb-1.5">
                        <label className="block text-sm font-bold text-zinc-400">날짜</label>
                        <label className="flex items-center gap-1.5 text-xs text-yellow-600/80 cursor-pointer hover:text-yellow-500 font-bold">
                          <input type="checkbox" checked={keepDate} onChange={(e) => setKeepDate(e.target.checked)} className="keep-checkbox" />
                          입력 유지
                        </label>
                      </div>
                      <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full px-4 py-3 bg-zinc-800 border border-zinc-600 rounded-xl text-zinc-100 font-bold outline-none focus:ring-2 focus:ring-yellow-600"/>
                    </div>
                    <div>
                      <div className="flex justify-between items-center mb-1.5">
                        <label className="block text-sm font-bold text-zinc-400">상대 길드</label>
                        <label className="flex items-center gap-1.5 text-xs text-yellow-600/80 cursor-pointer hover:text-yellow-500 font-bold">
                          <input type="checkbox" checked={keepOpponent} onChange={(e) => setKeepOpponent(e.target.checked)} className="keep-checkbox" />
                          입력 유지
                        </label>
                      </div>
                      <input type="text" value={opponent} onChange={(e) => setOpponent(e.target.value)} className="w-full px-4 py-3 bg-zinc-800 border border-zinc-600 rounded-xl text-zinc-100 font-bold outline-none focus:ring-2 focus:ring-yellow-600"/>
                    </div>
                  </div>

                  {subTab === 'attack' ? (
                    <div className="space-y-4">
                      {attackMatches.map((match, index) => (
                        <div key={index} className="flex flex-col gap-3 bg-zinc-800 p-3 md:p-4 rounded-xl border border-zinc-600">
                          
                          <div className="flex flex-col xl:flex-row items-start xl:items-center justify-between w-full border-b border-zinc-700 pb-3 gap-3">
                            <div className="flex items-center gap-2 w-full xl:w-auto flex-1">
                              <span className="font-black text-zinc-500 w-5 text-center shrink-0">{index+1}.</span>
                              <div className="relative flex-1 flex items-center">
                                <div className="absolute left-2.5 text-zinc-500"><IconClipboard /></div>
                                <input id={`atk-paste-${index}`} type="text" placeholder="빠른 붙여넣기 (예: 루디 크리스 델론즈 승 밀리아 카일 로지)" 
                                  className="w-full pl-9 pr-2 py-2 bg-zinc-900 border border-zinc-600 rounded-lg text-xs sm:text-sm text-zinc-200 outline-none focus:ring-2 focus:ring-yellow-600"
                                  onKeyDown={(e)=>{if(e.key==='Enter'){e.preventDefault();handleAttackQuickPaste(index, e.target.value);e.target.value='';}}}
                                />
                              </div>
                              <button onClick={()=>{const el=document.getElementById(`atk-paste-${index}`); if(el&&el.value){handleAttackQuickPaste(index, el.value);el.value='';}}} className="px-3 py-2 gold-button font-bold rounded-lg text-xs sm:text-sm shrink-0">확인</button>
                            </div>
                            
                            <div className="flex flex-col sm:flex-row items-center gap-2 w-full xl:w-auto shrink-0">
                               <select onChange={(e) => {fillAttackTeamQuick(index, 'myTeam', e.target.value); e.target.value='';}} className="w-full sm:w-auto bg-zinc-900 border border-yellow-600/50 text-yellow-500 font-bold rounded-lg px-2 py-2 outline-none text-xs shadow-sm focus:ring-1 focus:ring-yellow-500">
                                 <option value="" className="text-zinc-400">⚡ 아군 TOP 10 빠른 입력</option>
                                 {topDecks.topAtk.map((d, i) => <option key={i} value={d} className="text-yellow-500">{d}</option>)}
                               </select>
                               <select onChange={(e) => {fillAttackTeamQuick(index, 'enemyTeam', e.target.value); e.target.value='';}} className="w-full sm:w-auto bg-zinc-900 border border-yellow-600/50 text-yellow-500 font-bold rounded-lg px-2 py-2 outline-none text-xs shadow-sm focus:ring-1 focus:ring-yellow-500">
                                 <option value="" className="text-zinc-400">⚡ 적군 TOP 10 빠른 입력</option>
                                 {topDecks.topDef.map((d, i) => <option key={i} value={d} className="text-yellow-500">{d}</option>)}
                               </select>
                            </div>
                          </div>

                          <div className={`flex w-full ${isMobileView ? 'flex-col gap-3' : 'flex-row items-center gap-4'}`}>
                            <div className={`flex flex-1 gap-2 p-2 bg-blue-950/40 border border-blue-800 rounded-lg ${isMobileView?'flex-col':'flex-row'}`}>
                              <div className="px-2 py-1.5 bg-blue-900 text-blue-200 text-xs font-black rounded flex items-center justify-center shrink-0">아군 공격</div>
                              <div className="grid grid-cols-3 gap-1 sm:gap-2 flex-1 w-full">
                                {[0,1,2].map(i => <SearchableSelect key={i} value={match.myTeam[i]} onChange={(v)=>handleAttackTeamChange(index, 'myTeam', i, v)} placeholder="영웅" groups={HERO_GROUPS} className="h-10" />)}
                              </div>
                            </div>
                            <select value={match.result} onChange={(e) => handleAttackResultChange(index, e.target.value)} className={`h-10 px-2 bg-zinc-900 border border-zinc-600 rounded-lg font-black text-sm shrink-0 ${match.result==='승리'?'text-blue-400':'text-red-400'}`}>
                              <option value="승리">승리</option><option value="패배">패배</option>
                            </select>
                            <div className={`flex flex-1 gap-2 p-2 bg-red-950/40 border border-red-800 rounded-lg ${isMobileView?'flex-col':'flex-row'}`}>
                              <div className="px-2 py-1.5 bg-red-900 text-red-200 text-xs font-black rounded flex items-center justify-center shrink-0">적군 방어</div>
                              <div className="grid grid-cols-3 gap-1 sm:gap-2 flex-1 w-full">
                                {[0,1,2].map(i => <SearchableSelect key={i} value={match.enemyTeam[i]} onChange={(v)=>handleAttackTeamChange(index, 'enemyTeam', i, v)} placeholder="영웅" groups={HERO_GROUPS} className="h-10" />)}
                              </div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="space-y-6">
                      <div className="bg-zinc-800 p-3 md:p-4 rounded-xl border border-zinc-600 mb-2">
                        <label className="block text-sm font-bold text-zinc-400 mb-2 flex items-center gap-2"><IconClipboard/> 텍스트로 한 번에 입력 (다중 파싱 지원)</label>
                        <div className="flex flex-col sm:flex-row gap-2 w-full">
                          <textarea id="def-global-paste" rows="3" placeholder="예시: [내 방어덱] 루디 크리스 델론즈 / [1타] 밀리아 카일 로지 (방어 성공) / [2타] 프레이야 트루드 연희 (방어 실패) 등 여러 줄을 붙여넣으세요." 
                            className="flex-1 w-full p-3 bg-zinc-900 border border-zinc-600 rounded-lg text-sm text-zinc-200 outline-none focus:ring-2 focus:ring-yellow-600 custom-scrollbar"></textarea>
                          <button onClick={()=>{const el=document.getElementById('def-global-paste'); if(el&&el.value){handleDefenseGlobalPaste(el.value);el.value='';}}} className="px-4 py-3 gold-button font-black rounded-lg shrink-0 w-full sm:w-auto">자동 완성</button>
                        </div>
                      </div>

                      <div className="bg-blue-950/30 p-3 md:p-4 border border-blue-800 rounded-xl relative">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 gap-2 border-b border-blue-900/50 pb-3">
                          <label className="text-sm font-black text-blue-300 flex items-center gap-2"><IconShield/> [고정] 아군 방어 영웅</label>
                          <select onChange={(e) => {fillDefenseTeamQuick(e.target.value); e.target.value='';}} className="bg-zinc-900 border border-yellow-600/50 text-yellow-500 font-bold rounded-lg px-2 py-1.5 outline-none text-xs w-full sm:w-auto shadow-sm">
                            <option value="" className="text-zinc-400">⚡ 아군 방어덱 TOP 10 빠른 입력</option>
                            {topDecks.topDef.map((d, i) => <option key={i} value={d} className="text-yellow-500">{d}</option>)}
                          </select>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 sm:gap-3 w-full">
                          {[0,1,2].map(i => <SearchableSelect key={i} value={defenseMyTeam[i]} onChange={(v)=>handleDefenseMyTeamChange(i, v)} placeholder="아군 방어 영웅" groups={HERO_GROUPS} className="h-10 sm:h-12" />)}
                        </div>
                      </div>
                      <div className="space-y-3">
                        <label className="block text-sm font-black text-rose-300 mb-1 flex justify-between items-center">
                          <span>적군 공격 기록 (최대 15회 추가 가능)</span>
                          <span className="text-xs text-zinc-500 bg-zinc-800 px-2 py-1 rounded">현재 {defenseMatches.length} / 15</span>
                        </label>
                        <div className="max-h-[400px] overflow-y-auto custom-scrollbar space-y-3 pr-2 w-full">
                          {defenseMatches.map((match, index) => (
                            <div key={index} className="flex flex-col gap-3 bg-rose-950/20 p-3 md:p-4 rounded-xl border border-rose-900/50 w-full">
                              
                              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 border-b border-rose-900/30 pb-2 mb-1 w-full">
                                <span className="font-bold text-rose-500 text-sm shrink-0">적군 {index + 1}타</span>
                                <select onChange={(e) => {
                                    if(!e.target.value) return;
                                    const heroes = e.target.value.split(',').map(h=>h.trim());
                                    handleDefenseEnemyChange(index, 0, heroes[0]||'');
                                    handleDefenseEnemyChange(index, 1, heroes[1]||'');
                                    handleDefenseEnemyChange(index, 2, heroes[2]||'');
                                    e.target.value = ''; 
                                  }} 
                                  className="bg-zinc-900 border border-yellow-600/50 text-yellow-500 font-bold rounded-lg px-2 py-1.5 outline-none text-xs w-full sm:w-auto shadow-sm"
                                >
                                  <option value="" className="text-zinc-400">⚡ 적군 공격덱 TOP 10 빠른 입력</option>
                                  {topDecks.topAtk.map((d, i) => <option key={i} value={d} className="text-yellow-500">{d}</option>)}
                                </select>
                              </div>

                              <div className="flex flex-col sm:flex-row items-center gap-3 w-full">
                                <div className="grid grid-cols-3 gap-1 sm:gap-2 flex-1 w-full">
                                  {[0,1,2].map(i => <SearchableSelect key={i} value={match.enemyTeam[i]} onChange={(v)=>handleDefenseEnemyChange(index, i, v)} placeholder="적군 영웅" groups={HERO_GROUPS} className="h-10" />)}
                                </div>
                                <div className="flex w-full sm:w-auto gap-2">
                                  <select value={match.result} onChange={(e) => handleDefenseResultChange(index, e.target.value)} className={`h-10 px-3 bg-zinc-900 border border-zinc-600 rounded-lg font-black text-sm flex-1 sm:w-28 ${match.result==='방어 성공'?'text-blue-400':'text-red-400'}`}>
                                    <option value="방어 성공">방어 성공</option><option value="방어 실패">방어 실패</option>
                                  </select>
                                  {index === defenseMatches.length - 1 && index < 14 && (
                                    <button onClick={addDefenseMatch} className="h-10 px-4 gold-button rounded-lg font-bold flex items-center justify-center gap-1 shrink-0"><IconPlus/> 추가</button>
                                  )}
                                </div>
                              </div>

                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}

                  <div className="flex gap-3 mt-6">
                    <button onClick={handleSave} className="flex-1 gold-button font-black py-4 rounded-xl transition-all flex items-center justify-center gap-2"><IconSave /> 저장하기</button>
                    {editingId && <button onClick={resetForm} className="bg-zinc-800 text-zinc-400 font-bold py-4 px-6 rounded-xl hover:bg-zinc-700 hover:text-zinc-200 border border-zinc-700 transition-colors"><IconX /> 취소</button>}
                  </div>
                </section>

                <section className="flex flex-col sm:flex-row gap-3 mt-8">
                  <input type="text" placeholder="영웅/닉네임 검색..." value={filterChar} onChange={(e) => setFilterChar(e.target.value)} className="flex-1 px-4 py-4 bg-zinc-900 border border-zinc-700 rounded-xl text-zinc-100 font-bold outline-none focus:ring-2 focus:ring-yellow-600" />
                  <button onClick={() => setShowStats(!showStats)} className="px-6 py-4 gold-button rounded-xl font-black flex items-center justify-center gap-2 shrink-0 w-full sm:w-auto"><IconBarChart /> {showStats?'통계 닫기':'통계 열기'}</button>
                </section>

                {showStats && (
                  <section className="grid grid-cols-1 md:grid-cols-2 gap-4 animate-in slide-in-from-top-4">
                    <div className="bg-zinc-900 border border-zinc-700 p-5 rounded-2xl shadow-sm">
                      <h3 className="text-base font-black gold-gradient-text mb-4 flex items-center gap-2"><IconBarChart/> {subTab==='attack'?'많이 사용된 공격 덱':'가장 방어율이 높은 방어 덱'} (Top 5)</h3>
                      <ul className="space-y-3">
                        {statsData.deckStats.length === 0 ? <li className="text-zinc-500 text-sm text-center py-4">데이터 없음</li> : statsData.deckStats.map((stat, idx) => (
                          <li key={idx} className="flex justify-between items-center p-3 bg-zinc-800 rounded-xl border border-zinc-600">
                            <span className="font-bold text-zinc-200 text-sm truncate max-w-[150px] sm:max-w-none">{stat.deck}</span>
                            <div className="text-right shrink-0">
                              <p className="text-xs text-zinc-400 mb-1">{stat.count}{subTab==='attack'?'회 기록':'회 피격'}</p>
                              <p className={`font-black text-sm ${parseFloat(stat.winRate)>=50?'text-blue-400':'text-red-400'}`}>{stat.winRate}% <span className="text-[10px] text-zinc-500 ml-1">({stat.wins}{subTab==='attack'?'승':'회 성공'})</span></p>
                            </div>
                          </li>
                        ))}
                      </ul>
                    </div>
                    <div className="bg-zinc-900 border border-zinc-700 p-5 rounded-2xl shadow-sm">
                      <h3 className="text-base font-black gold-gradient-text mb-4 flex items-center gap-2"><IconUsers/> 길드원 {subTab==='attack'?'공격 승률':'방어 성공률'}</h3>
                      <div className="max-h-[300px] overflow-y-auto pr-2 custom-scrollbar space-y-3">
                        {statsData.memberStats.length === 0 ? <div className="text-zinc-500 text-sm text-center py-4">데이터 없음</div> : statsData.memberStats.map((member, idx) => (
                          <li key={idx} className="flex justify-between items-center p-3 bg-zinc-800 rounded-xl border border-zinc-600">
                            <div>
                              <p className="font-bold text-zinc-200 truncate">{member.name}</p>
                              <p className="text-xs text-zinc-400">제출 {member.recordsCount}회 / {subTab==='attack'?`총 ${member.totalMatches}전 ${member.wins}승`:`총 피격 ${member.totalMatches}회 / ${member.wins}회 성공`}</p>
                            </div>
                            <p className={`font-black text-lg ${parseFloat(member.winRate)>=50?'text-blue-400':'text-red-400'}`}>{member.winRate}%</p>
                          </li>
                        ))}
                      </div>
                    </div>
                  </section>
                )}

                <section className="space-y-5">
                  {groupedRecords.length === 0 ? <div className="bg-zinc-900 border border-zinc-700 p-10 text-center rounded-2xl text-zinc-500 font-bold">기록이 없습니다.</div> : 
                    groupedRecords.map(([groupKey, groupRecords]) => {
                      const isGroupExpanded = expandedGroups[groupKey] || filterChar.trim() !== '';
                      return (
                        <div key={groupKey} className="bg-zinc-900 border border-zinc-700 rounded-2xl overflow-hidden shadow-sm">
                          <div className="flex justify-between items-center p-4 cursor-pointer hover:bg-zinc-800 select-none" onClick={() => toggleGroup(groupKey)}>
                            <h2 className="font-black text-zinc-100 text-sm md:text-lg break-words pr-2">{groupKey} <span className="text-xs text-zinc-400 ml-2">({groupRecords.length}명 제출)</span></h2>
                            <div className="text-zinc-500 shrink-0">{isGroupExpanded ? <IconChevronUp /> : <IconChevronDown />}</div>
                          </div>
                          
                          {isGroupExpanded && (
                            <div className="p-3 md:p-4 space-y-4 border-t border-zinc-700 bg-zinc-950/50 animate-in slide-in-from-top-2">
                              {groupRecords.map((record) => {
                                const isExpanded = expandedRecords[record.id] || filterChar.trim() !== '';
                                return (
                                  <div key={record.id} className="bg-zinc-800 p-3 md:p-4 rounded-xl border border-zinc-600 relative w-full">
                                    {(record.authorId === user?.uid || isAdminMode) && (
                                      <div className="absolute top-3 right-3 flex gap-1 sm:gap-2">
                                        <button onClick={(e) => { e.stopPropagation(); handleEditClick(record); }} className="text-zinc-400 hover:text-yellow-500 p-1"><IconEdit /></button>
                                        <button onClick={(e) => { e.stopPropagation(); handleDelete(record.id); }} className="text-zinc-400 hover:text-red-500 p-1"><IconTrash /></button>
                                      </div>
                                    )}
                                    <div className="cursor-pointer flex items-center justify-between pr-14 sm:pr-20 w-full" onClick={() => toggleRecord(record.id)}>
                                      <h3 className="font-bold text-zinc-200 flex items-center flex-wrap gap-1 text-sm sm:text-base"><span className="gold-gradient-text border border-yellow-700/50 px-2 py-0.5 rounded truncate max-w-[120px]">{record.nickname||'익명'}</span> 님의 {subTab==='attack'?'공격':'방어'} 기록</h3>
                                      <div className="text-zinc-500 shrink-0">{isExpanded ? <IconChevronUp /> : <IconChevronDown />}</div>
                                    </div>
                                    
                                    {isExpanded && (
                                      <div className="mt-4 space-y-3 border-t border-zinc-700 pt-3 w-full">
                                        {subTab === 'attack' ? (
                                          record.matches?.map((match, idx) => (
                                            <div key={idx} className={`flex bg-zinc-900 p-2 sm:p-3 rounded-lg border border-zinc-700 items-center ${isMobileView ? 'flex-col gap-2' : 'flex-row gap-3'} w-full`}>
                                              <span className={`text-[10px] font-bold px-2 py-1 rounded ${match.result==='승리'?'bg-blue-900/40 text-blue-400':'bg-red-900/40 text-red-400'} shrink-0 hidden sm:block`}>M {idx+1}</span>
                                              <div className={`flex w-full ${isMobileView?'flex-col gap-2':'flex-row items-center gap-3'}`}>
                                                <div className="flex-1 flex flex-col sm:flex-row items-start sm:items-center gap-1 sm:gap-2 w-full">
                                                  <span className="text-[10px] sm:text-xs text-zinc-500 w-8 sm:w-auto">아군</span>
                                                  {renderHeroTags(match.myTeam)}
                                                </div>
                                                <span className={`font-black text-xs sm:text-sm w-full sm:w-10 text-left sm:text-center ${match.result==='승리'?'text-blue-400':'text-red-500'} ${isMobileView?'border-y border-zinc-800 py-1':''}`}>{match.result}</span>
                                                <div className="flex-1 flex flex-col sm:flex-row items-start sm:items-center gap-1 sm:gap-2 w-full">
                                                  <span className="text-[10px] sm:text-xs text-zinc-500 w-8 sm:w-auto">적군</span>
                                                  {renderHeroTags(match.enemyTeam)}
                                                </div>
                                              </div>
                                            </div>
                                          ))
                                        ) : (
                                          <div className="w-full">
                                            <div className="mb-3 p-2 sm:p-3 bg-blue-950/20 border border-blue-900 rounded-lg flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:gap-3 shadow-inner w-full">
                                              <span className="text-blue-400 font-black text-xs shrink-0 px-2 flex items-center gap-1"><IconShield/> 내 방어덱</span>
                                              {renderHeroTags(record.myTeam)}
                                            </div>
                                            {record.defenseMatches?.map((match, idx) => (
                                              <div key={idx} className="flex flex-col sm:flex-row gap-2 sm:gap-3 bg-rose-950/20 p-2 sm:p-2.5 rounded-lg border border-rose-900/50 items-start sm:items-center sm:ml-4 mb-2 w-full">
                                                <span className="text-rose-500 text-[10px] sm:text-xs font-bold shrink-0 bg-rose-900/20 px-2 py-1 rounded">적군 {idx+1}타</span>
                                                <div className="flex-1 flex justify-start w-full">{renderHeroTags(match.enemyTeam)}</div>
                                                <span className={`font-black text-[10px] sm:text-xs shrink-0 ${match.result==='방어 성공'?'text-blue-400':'text-red-500'}`}>{match.result}</span>
                                              </div>
                                            ))}
                                          </div>
                                        )}
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      );
                    })
                  }
                </section>
              </div>
            )}

            {mainTab === 'strategy' && subTab === 'counter' && (
              <div className="flex flex-col lg:flex-row gap-6 items-start animate-in fade-in duration-300">
                <div className="w-full lg:w-[320px] bg-zinc-900 border border-zinc-700 rounded-2xl shadow-lg p-6 shrink-0 sticky top-6">
                  <div className="mb-5 pb-4 border-b border-zinc-800">
                    <h2 className="text-lg font-black gold-gradient-text flex items-center gap-2 mb-1"><IconSearch/> 적군 조합 분석</h2>
                    <p className="text-xs text-zinc-400 font-medium">상대 팀의 구성을 선택하여 파훼법을 확인하세요.</p>
                  </div>
                  
                  <div className="space-y-4">
                    {[0, 1, 2].map((idx) => (
                      <div key={`filter-${idx}`}>
                        <label className="block text-xs font-bold text-zinc-500 mb-1.5 ml-1">상대 영웅 {idx + 1}</label>
                        <SearchableSelect 
                          value={counterEnemyFilter[idx]} 
                          onChange={(v) => {
                            const newFilter = [...counterEnemyFilter];
                            newFilter[idx] = v;
                            setCounterEnemyFilter(newFilter);
                          }} 
                          placeholder={`상대 ${idx + 1} 선택`} 
                          groups={HERO_GROUPS} 
                          className="h-11"
                        />
                      </div>
                    ))}
                  </div>

                  <div className="mt-6 p-4 bg-yellow-900/10 border border-yellow-700/30 rounded-xl">
                    <div className="flex items-start gap-2">
                      <span className="text-yellow-600 mt-0.5"><IconInfo /></span>
                      <p className="text-xs text-yellow-600/80 font-bold leading-relaxed">
                        검색한 방어덱을 상단으로 띄워줍니다.
                      </p>
                    </div>
                  </div>
                  
                  {counterEnemyFilter.filter(Boolean).length > 0 && (

                          </div>

                          <div className="flex gap-4 mb-4 items-center mt-2">
                            <span className="text-xs font-bold text-zinc-500 w-16">방어 덱:</span>
                            {renderHeroTags(guide.defenseTeam)}
                          </div>
                          
                          {guide.guideType !== 'defense' && (
                            <div className="flex gap-4 mb-4 items-center">
                              <span className="text-xs font-bold text-zinc-500 w-16">카운터:</span>
                              {renderHeroTags(guide.attackerTeam)}
                            </div>
                          )}
                          
                          <div className="bg-zinc-900 p-4 rounded-lg border border-zinc-700 text-sm text-zinc-300 space-y-2 mb-4">
                            {guide.guideType === 'defense' ? (
                              <>
                                <p><span className="text-blue-400 font-bold mr-2">추천 펫:</span> {guide.skill}</p>
                                <p><span className="text-blue-400 font-bold mr-2">핵심장비:</span> {[guide.equip1, guide.equip2, guide.equip3].filter(Boolean).join(' | ')}</p>
                              </>
                            ) : (
                              <>
                                <p><span className="text-zinc-500 font-bold mr-2">스킬:</span> {guide.skill}</p>
                                <p><span className="text-zinc-500 font-bold mr-2">턴/진형:</span> {guide.turn} / {guide.formation}</p>
                                <p><span className="text-zinc-500 font-bold mr-2">장비:</span> {[guide.equip1, guide.equip2, guide.equip3].filter(Boolean).join(' | ')}</p>
                              </>
                            )}
                            <p><span className="text-yellow-600 font-bold mr-2">팁:</span> {guide.tip}</p>
                          </div>
                          
                          <div className="flex gap-3">
                            <button onClick={() => handleApproveGuide(guide.id)} className="flex-1 py-3 gold-button rounded-xl font-bold text-sm">✅ 제안 승인 및 반영</button>
                            <button onClick={() => handleRejectGuide(guide.id)} className="flex-1 py-3 bg-red-950/40 text-red-400 border border-red-900 rounded-xl font-bold text-sm hover:bg-red-800 hover:text-white transition">❌ 제안 거절 (삭제)</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div className="border-t border-yellow-900/30 pt-8">
                  <h2 className="text-2xl font-black gold-gradient-text mb-4">데이터 통합 다운로드 센터</h2>
                  <div className="flex flex-col sm:flex-row gap-4">
                    <button onClick={handleExportStatsCSV} className="flex-1 px-6 py-5 gold-button font-black rounded-xl flex items-center justify-center gap-2 text-base shadow-lg"><IconBarChart /> 통계 데이터 다운로드</button>
                    <button onClick={handleExportAllCSV} className="flex-1 px-6 py-5 gold-button font-black rounded-xl flex items-center justify-center gap-2 text-base shadow-lg"><IconDownload /> 원본 로그 다운로드</button>
                  </div>
                </div>
                
                <div className="border-t border-yellow-900/30 pt-8">
                  <h2 className="text-2xl font-black text-red-500 mb-4 drop-shadow-md">위험 구역 (데이터 영구 삭제)</h2>
                  <p className="text-zinc-400 mb-6 text-sm font-medium">삭제된 데이터는 서버에서 영구히 지워지며 복구할 수 없습니다.</p>
                  <div className="flex flex-col sm:flex-row gap-4">
                    <button onClick={() => handleDeleteAllByType('attack')} className="flex-1 py-5 bg-red-950/40 text-red-400 border border-red-900 font-black rounded-xl hover:bg-red-800 hover:text-white transition-colors shadow-inner">공격 기록지 전체 삭제</button>
                    <button onClick={() => handleDeleteAllByType('defense')} className="flex-1 py-5 bg-rose-950/40 text-rose-400 border border-rose-900 font-black rounded-xl hover:bg-rose-800 hover:text-white transition-colors shadow-inner">방어 기록지 전체 삭제</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
