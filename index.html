    function getChosung(str) {
      if (!str) return "";
      const chosung = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
      let result = "";
      for (let i = 0; i < str.length; i++) {
        const code = str.charCodeAt(i) - 44032;
        if (code > -1 && code < 11172) result += chosung[Math.floor(code / 588)];
        else result += str.charAt(i);
      }
      return result;
    }

    function getSafeArray(arr) {
      if (Array.isArray(arr)) return arr;
      if (typeof arr === 'string') return arr.split(',').map(s => s.trim());
      return [];
    }

    function renderHeroTags(teamArr) {
      const heroes = getSafeArray(teamArr).filter(h => h && typeof h === 'string' && h.trim() !== '');

      return (
        <div className="flex flex-wrap gap-1 justify-start">

          ))}
        </div>
      );
    }

    function SearchableSelect({ value, onChange, placeholder, groups, className = "", zIndex = 60 }) {
      const [isOpen, setIsOpen] = useState(false);
      const [searchTerm, setSearchTerm] = useState(value || '');
      const wrapperRef = useRef(null);

      useEffect(() => { setSearchTerm(value || ''); }, [value]);
      useEffect(() => {
        const handleClickOutside = (e) => { if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setIsOpen(false); };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const filteredGroups = groups.map(g => ({
        ...g, heroes: g.heroes.filter(h => h && typeof h === 'string' && (h.toUpperCase().includes((searchTerm||'').toUpperCase()) || getChosung(h).includes(getChosung(searchTerm||''))))
      })).filter(g => g.heroes.length > 0);

      return (
        <div ref={wrapperRef} className={`relative w-full ${className}`}>
          <input type="text" value={searchTerm}
            onChange={(e) => { 
              setSearchTerm(e.target.value); 
              onChange(e.target.value); 
              setIsOpen(true); 
            }}
            onFocus={() => setIsOpen(true)} 
            onBlur={() => setTimeout(() => setIsOpen(false), 200)}
            placeholder={placeholder}
            className="w-full h-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-xl text-zinc-100 font-bold focus:ring-2 focus:ring-yellow-600 outline-none transition-all placeholder-zinc-600 text-xs md:text-sm shadow-sm"

      const [titleClickCount, setTitleClickCount] = useState(0);
      const clickTimeoutRef = useRef(null);
      const unlockInputRef = useRef(null);

      const [counterEnemyFilter, setCounterEnemyFilter] = useState(['', '', '']);
      const [guideModal, setGuideModal] = useState({ isOpen: false, type: 'counter', defTeam: [], atkTeam: ['', '', ''], skill: '', turn: '', formation: '', equip1: '', equip2: '', equip3: '', tip: '' });
      
      const [expandedCounters, setExpandedCounters] = useState({});
      const [expandedDefGuides, setExpandedDefGuides] = useState({});
      
      // 관리자용 텍스트 다중 파싱 State
      const [rawRecordInputState, setRawRecordInputState] = useState('');

      const rawMatchesForStats = useMemo(() => {
        const matches = [];
        records.filter(r => (r.recordType || 'attack') === 'attack').forEach(r => {
          r.matches?.forEach(m => {
            const myTeam = getSafeArray(m.myTeam).map(h => h.trim()).filter(Boolean).sort();
            const enemyTeam = getSafeArray(m.enemyTeam).map(h => h.trim()).filter(Boolean).sort();
            if (myTeam.length > 0 && enemyTeam.length > 0) {
              matches.push({ a: myTeam.join(' '), d: enemyTeam.join(' '), w: m.result === '승리' ? 1 : 0, l: m.result === '패배' ? 1 : 0, date: r.date });
            }
          });
        });
        return matches.sort((a, b) => new Date(a.date) - new Date(b.date));
      }, [records]);

      const counterAnalysisData = useMemo(() => {
        const activeEnemies = counterEnemyFilter.filter(h => h.trim() !== '');
        if (activeEnemies.length === 0) return null;

        const resultsMap = new Map();

        STATIC_GUIDE_DB.forEach(guide => {
          const isMatch = activeEnemies.every(filterHero => guide.defense.includes(filterHero));
          if (isMatch) {
            const defKey = [...guide.defense].sort().join(',');
            guide.counters?.forEach(counter => {
              const atkKey = [...counter.attacker].sort().join(',');
              const key = `${defKey}|${atkKey}`;
              resultsMap.set(key, {
                defenseTeam: guide.defense, attackerTeam: counter.attacker,
                skill: counter.skill, turn: counter.turn, formation: counter.formation,
                equips: [counter.equip1, counter.equip2, counter.equip3].filter(Boolean),
                tip: counter.tip, dynamicCount: 0, dynamicWins: 0, hasGuide: true, isCustom: false
              });
            });
          }
        });

        customGuides.filter(g => g.status === 'approved' && (g.guideType === 'counter' || !g.guideType)).forEach(guide => {
          const isMatch = activeEnemies.every(filterHero => getSafeArray(guide.defenseTeam).includes(filterHero));
          if (isMatch) {
            const defKey = getSafeArray(guide.defenseTeam).sort().join(',');
            const atkKey = getSafeArray(guide.attackerTeam).sort().join(',');
            const key = `${defKey}|${atkKey}`;
            resultsMap.set(key, {
              defenseTeam: guide.defenseTeam, attackerTeam: guide.attackerTeam,
              skill: guide.skill, turn: guide.turn, formation: guide.formation,
              equips: [guide.equip1, guide.equip2, guide.equip3].filter(Boolean),
              tip: guide.tip, dynamicCount: 0, dynamicWins: 0, hasGuide: true, isCustom: true
            });
          }
        });

        records.filter(r => (r.recordType || 'attack') === 'attack').forEach(record => {
          record.matches?.forEach(match => {
            const enemyTeam = getSafeArray(match.enemyTeam).map(h => h.trim()).filter(Boolean);
            const myTeam = getSafeArray(match.myTeam).map(h => h.trim()).filter(Boolean);

            if (enemyTeam.length > 0 && myTeam.length > 0) {
              const isMatch = activeEnemies.every(filterHero => enemyTeam.includes(filterHero));
              if (isMatch) {
                const defKey = [...enemyTeam].sort().join(',');
                const atkKey = [...myTeam].sort().join(',');
                const key = `${defKey}|${atkKey}`;

                if (!resultsMap.has(key)) {
                  resultsMap.set(key, {
                    defenseTeam: enemyTeam, attackerTeam: myTeam,
                    skill: null, turn: null, formation: null, equips: [], tip: null,
                    dynamicCount: 0, dynamicWins: 0, hasGuide: false, isCustom: false
                  });
                }

                const entry = resultsMap.get(key);
                entry.dynamicCount++;
                if (match.result === '승리') entry.dynamicWins++;
              }
            }
          });
        });

        const results = Array.from(resultsMap.values())
          .filter(d => d.dynamicCount >= 5 || d.hasGuide) 
          .map(d => ({ ...d, winRate: d.dynamicCount > 0 ? ((d.dynamicWins / d.dynamicCount) * 100).toFixed(1) : 0 }))
          .sort((a, b) => {
            if (b.winRate !== a.winRate) return parseFloat(b.winRate) - parseFloat(a.winRate);
            if (b.dynamicCount !== a.dynamicCount) return b.dynamicCount - a.dynamicCount;
            return (b.hasGuide === a.hasGuide) ? 0 : b.hasGuide ? 1 : -1;
          });

        return { results };
      }, [records, customGuides, counterEnemyFilter]);

      const recommendDefenseData = useMemo(() => {
        const defCounts = {};
        records.filter(r => r.recordType === 'defense').forEach(record => {
          const defTeamArr = getSafeArray(record.myTeam);
          const validDefHeroes = defTeamArr.map(h => h && typeof h === 'string' ? h.trim() : '').filter(Boolean).sort();
          if (validDefHeroes.length === 3) {
            const defDeckKey = validDefHeroes.join(', ');
            if (!defCounts[defDeckKey]) defCounts[defDeckKey] = { deck: defDeckKey, count: 0, wins: 0, heroes: validDefHeroes };
            record.defenseMatches?.forEach(match => {
              defCounts[defDeckKey].count++;
              if (match.result === '방어 성공') defCounts[defDeckKey].wins++;
            });
          }
        });

        const defResults = Object.values(defCounts)
          .map(d => ({ ...d, winRate: d.count > 0 ? ((d.wins / d.count) * 100).toFixed(1) : 0 }))
          .filter(d => d.count >= 3)
          .sort((a, b) => {
            if (b.winRate !== a.winRate) return parseFloat(b.winRate) - parseFloat(a.winRate);
            return b.count - a.count;
          }).slice(0, 10);
          
        return defResults.map(def => {
           const matchGuides = customGuides.filter(g => g.status === 'approved' && g.guideType === 'defense' && g.defenseTeam.slice().sort().join(',') === def.heroes.join(','));
           return { ...def, guides: matchGuides };
        });
      }, [records, customGuides]);

      const HERO_GROUPS = useMemo(() => {
        if (customHeroes.length === 0) return PREDEFINED_HERO_GROUPS;
        return [...PREDEFINED_HERO_GROUPS, { group: "기타 (자동추가)", heroes: customHeroes }];
      }, [customHeroes]);

      useEffect(() => { setExpandedCounters({}); }, [counterEnemyFilter]);
      const toggleCounter = (idx) => { setExpandedCounters(prev => ({ ...prev, [idx]: !prev[idx] })); };
      const toggleDefGuide = (idx) => { setExpandedDefGuides(prev => ({ ...prev, [idx]: !prev[idx] })); };

      useEffect(() => {
        const handleResize = () => setIsMobileView(window.innerWidth < 1024);
        handleResize(); window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        let lastScrollY = window.scrollY; let ticking = false;
        const handleScroll = () => {
          if (!ticking) {
            window.requestAnimationFrame(() => {
              const currentScrollY = window.scrollY;
              if (currentScrollY < 10) setShowFloatingBtn(true);
              else if (currentScrollY > lastScrollY + 10) setShowFloatingBtn(false);
              else if (currentScrollY < lastScrollY - 10) setShowFloatingBtn(true);
              lastScrollY = currentScrollY; ticking = false;
            }); ticking = true;
          }
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.ctrlKey && e.altKey && (e.code === 'KeyU' || e.key === 'u' || e.key === 'U' || e.key === 'ㅕ')) {
            e.preventDefault();
            if (!isAdminMode) { 
              setUnlockModalOpen(true); setUnlockPwd(''); setUnlockError(false); 
              setTimeout(() => { if (unlockInputRef.current) unlockInputRef.current.focus(); }, 100);
            }
          }
        };
        document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
      }, [isAdminMode]);

      const handleTitleClick = () => {
        setTitleClickCount(prev => {
          const newCount = prev + 1;
          if (newCount >= 5) {
            if (!isAdminMode) { 
              setUnlockModalOpen(true); setUnlockPwd(''); setUnlockError(false); 
              setTimeout(() => { if (unlockInputRef.current) unlockInputRef.current.focus(); }, 100);
            }
            return 0;
          }
          return newCount;
        });
        if (clickTimeoutRef.current) clearTimeout(clickTimeoutRef.current);
        clickTimeoutRef.current = setTimeout(() => { setTitleClickCount(0); }, 1500);
      };

      const handleAdminUnlock = (e) => {
        e.preventDefault();
        if (unlockPwd === "9457") { setIsAdminMode(true); setIsLoggedIn(true); setUnlockModalOpen(false); setMainTab('management'); } 
        else { setUnlockError(true); setUnlockPwd(''); if (unlockInputRef.current) unlockInputRef.current.focus(); }
      };

      const showAlert = (title, content) => setAlertModal({ isOpen: true, title, content });
      const showConfirm = (title, content, action, confirmText = "확인") => setConfirmModal({ isOpen: true, title, content, action, confirmText });

      useEffect(() => {
        if (!fb.isValid || !fb.auth) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(fb.auth, __initial_auth_token);
            else await signInAnonymously(fb.auth);
          } catch (error) { console.error("Auth Fail:", error); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(fb.auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!fb.isValid || !user || !fb.db || !isLoggedIn) return;
        
        const recordsRef = collection(fb.db, 'artifacts', APP_ID, 'public', 'data', COLLECTION_NAME);
        const unsubRecords = onSnapshot(recordsRef, (snapshot) => {
            const fetchedRecords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            fetchedRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            setRecords(fetchedRecords);
        });

        const guidesRef = collection(fb.db, 'artifacts', APP_ID, 'public', 'data', GUIDE_COLLECTION);
        const unsubGuides = onSnapshot(guidesRef, (snapshot) => {
            const fetchedGuides = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setCustomGuides(fetchedGuides);
        });

        return () => { unsubRecords(); unsubGuides(); };
      }, [user, isLoggedIn]);

      const handleLogin = () => {
        if (loginId === '관리자' && loginPw === '9457') {
          setIsAdminMode(true); setIsLoggedIn(true); setLoginError(false);
        } else if (loginId === '길드' && loginPw === '3188') {
          setIsAdminMode(false); setIsLoggedIn(true); setLoginError(false);
        } else {
          setLoginError(true);
        }
      };

      const handleTabChange = (main, sub) => {
        setMainTab(main);
        if (sub) setSubTab(sub);
      };

      const handleGuideSubmit = async () => {
        if (!user) return showAlert("인증 오류", "인증 정보가 없습니다.");
        if (guideModal.type === 'counter' && (!guideModal.skill || !guideModal.turn || !guideModal.formation)) {
          return showAlert("입력 오류", "스킬운영, 턴, 진형은 필수 입력 항목입니다.");
        }
        try {
          await addDoc(collection(fb.db, 'artifacts', APP_ID, 'public', 'data', GUIDE_COLLECTION), {
            guideType: guideModal.type,
            defenseTeam: guideModal.defTeam,
            attackerTeam: guideModal.atkTeam || [],
            skill: guideModal.skill || '',
            turn: guideModal.turn || '',
            formation: guideModal.formation || '',
            equip1: guideModal.equip1 || '',
            equip2: guideModal.equip2 || '',
            equip3: guideModal.equip3 || '',
            tip: guideModal.tip || '',
            status: 'pending',
            createdAt: Date.now(),
            authorId: user.uid
          });
          setGuideModal({ isOpen: false, type: 'counter', defTeam: [], atkTeam: ['', '', ''], skill: '', turn: '', formation: '', equip1: '', equip2: '', equip3: '', tip: '' });
          showAlert("제출 완료", "공략 제안이 성공적으로 전송되었습니다.\n관리자의 검토 후 반영됩니다.");
        } catch (error) {
          console.error(error);
          showAlert("시스템 오류", "공략 제출 중 오류가 발생했습니다.");
        }
      };

      const handleApproveGuide = async (id) => {
        try {
          await updateDoc(doc(fb.db, 'artifacts', APP_ID, 'public', 'data', GUIDE_COLLECTION, id), { status: 'approved', updatedAt: Date.now() });
        } catch (error) { showAlert("오류", "승인 중 오류 발생"); }
      };
      
      const handleRejectGuide = async (id) => {
        if(confirm("이 제안을 삭제하시겠습니까?")) {
          try { await deleteDoc(doc(fb.db, 'artifacts', APP_ID, 'public', 'data', GUIDE_COLLECTION, id)); } 
          catch (error) { showAlert("오류", "삭제 중 오류 발생"); }
        }
      };

      const handleBulkParse = async () => {
        if (!rawRecordInputState.trim()) return showAlert("알림", "파싱할 텍스트를 입력하세요.");
        const lines = rawRecordInputState.split('\n');
        const newRecords = [];
        const allPredefined = PREDEFINED_HERO_GROUPS.flatMap(g => g.heroes);
        let unknownCount = 0;
        
        lines.forEach(line => {
          let cleanLine = line.replace(/[\[\]\<\>:\-]/g, ' ').trim();
          let tokens = cleanLine.split(/\s+/);
          let atkIdx = tokens.findIndex(t => t === '공격' || t === '공');
          let defIdx = tokens.findIndex(t => t === '방어' || t === '방');
          if(atkIdx !== -1 && defIdx !== -1) {
            let atkTokens, defTokens;
            if(atkIdx < defIdx) {
              atkTokens = tokens.slice(atkIdx + 1, defIdx);
              defTokens = tokens.slice(defIdx + 1);
            } else {
              defTokens = tokens.slice(defIdx + 1, atkIdx);
              atkTokens = tokens.slice(atkIdx + 1);
            }
            
            const extractResult = (arr) => {
              if(arr.length < 2) return null;
              let res = arr.pop(); 
              let isWin = false, isLose = false;
              if(res.includes('승') && !res.includes('패') && !res.includes('무')) isWin = true;
              else if(res.includes('패')) isLose = true;
              if(!isWin && !isLose) return null;
              
              const deck = arr.map(h => {
                 let clean = h.trim();
                 if (clean && !allPredefined.includes(clean)) unknownCount++;
                 return clean;
              });
              
              return { deck, result: isWin ? '승리' : '패배' };
            };
            
            let atkData = extractResult(atkTokens);
            let defData = extractResult(defTokens);
            
            if(atkData && defData) {
              newRecords.push({
                type: '공격',
                myTeam: atkData.deck.join(', '),
                enemyTeam: defData.deck.join(', '),
                result: atkData.result
              });
            }
          }
        });
        
        if (newRecords.length > 0) {
           try {
              await addDoc(collection(fb.db, 'artifacts', APP_ID, 'public', 'data', COLLECTION_NAME), {
                nickname: '관리자(일괄추가)',
                date: new Date().toISOString().split('T')[0],
                opponent: '일괄입력',
                recordType: 'attack',
                matches: newRecords,
                createdAt: Date.now(),
                authorId: user?.uid || 'admin'
              });
              showAlert("성공", `${newRecords.length}개의 전적이 등록되었습니다.\n(미등록 영웅 포함: ${unknownCount}건)`);
              setRawRecordInputState('');
           } catch(e) {
              showAlert("오류", "데이터베이스 저장 중 오류가 발생했습니다.");
           }
        } else {
           showAlert("알림", "인식된 전적이 없습니다. 양식을 확인하세요.");
        }
      };

      const handleDeleteAllByType = (type) => {
        if (!isAdminMode) return;
        const typeRecords = records.filter(r => (r.recordType || 'attack') === type);
        if (typeRecords.length === 0) return showAlert("알림", "삭제할 데이터가 없습니다.");
        const typeName = type === 'attack' ? '공격 기록' : '방어 기록';
        showConfirm(`${typeName} 전체 삭제`, `총 ${typeRecords.length}개의 ${typeName}을 모두 삭제합니다. 진행할까요?`, async () => {
          try {
            let sCount = 0; setConfirmModal({ isOpen: false });
            for (const r of typeRecords) { await deleteDoc(doc(fb.db, 'artifacts', APP_ID, 'public', 'data', COLLECTION_NAME, r.id)); sCount++; }
            showAlert("결과", `성공: ${sCount}건 삭제됨`);
          } catch (error) { showAlert("에러", "일괄 삭제 중 권한 에러 발생"); }
        }, "일괄 삭제 진행");
      };

      const handleExportAllCSV = () => {
        if (records.length === 0) return showAlert("알림", "데이터가 없습니다.");
        let csv = "\uFEFF=== [길드전 승리(공격) 기록] ===\n날짜,닉네임,상대길드,매치,아군1,아군2,아군3,결과,적군1,적군2,적군3\n";
        records.filter(r => (r.recordType || 'attack') === 'attack').forEach(r => {
          r.matches?.forEach((m, i) => {
            const my = getSafeArray(m.myTeam); const en = getSafeArray(m.enemyTeam);
            csv += `${r.date},${r.nickname},${r.opponent},${(my[0]||'').trim()},${(my[1]||'').trim()},${(my[2]||'').trim()},${i+1},${(en[0]||'').trim()},${(en[1]||'').trim()},${(en[2]||'').trim()}\n`;
          });
        });
        csv += "\n=== [길드전 방어 기록] ===\n날짜,닉네임,상대길드,내방어덱1,내방어덱2,내방어덱3,매치,적군공격1,적군공격2,적군공격3,결과(방어)\n";
        records.filter(r => r.recordType === 'defense').forEach(r => {
          const my = getSafeArray(r.myTeam);
          r.defenseMatches?.forEach((m, i) => {
            const en = getSafeArray(m.enemyTeam);
            csv += `${r.date},${r.nickname},${r.opponent},${(my[0]||'').trim()},${(my[1]||'').trim()},${(my[2]||'').trim()},${i+1},${(en[0]||'').trim()},${(en[1]||'').trim()},${(en[2]||'').trim()},${m.result}\n`;
          });
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `길드전_전체기록_${new Date().toISOString().split('T')[0]}.csv`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      if (!isLoggedIn) {
        return (
          <div style={{position: 'fixed', inset: 0, zIndex: 9000, display: 'flex', justifyContent: 'center', alignItems: 'center', overflow: 'hidden'}}>
            <div className="login-bg-anim"></div>
            <div className="login-card">
              <h2 className="login-title-text">[ Pirates ]</h2>
              <input type="text" value={loginId} onChange={e=>setLoginId(e.target.value)} className="login-input" placeholder="ID" />
              <input type="password" value={loginPw} onChange={e=>setLoginPw(e.target.value)} className="login-input" placeholder="PASSWORD" onKeyDown={e=>{if(e.key==='Enter') handleLogin()}} />
              <button onClick={handleLogin} className="gold-button w-full mt-4 py-4 rounded-xl font-black text-lg">LOGIN</button>
              {loginError && <p style={{color:'var(--danger)', fontSize:'12px', marginTop:'20px', fontWeight:'bold'}}>ACCESS DENIED (정보 불일치)</p>}
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-4 md:p-8 text-[15px] pb-32 relative">
          <CustomModal isOpen={alertModal.isOpen} onClose={() => setAlertModal({...alertModal, isOpen: false})} title={alertModal.title} content={alertModal.content} onConfirm={() => setAlertModal({...alertModal, isOpen: false})} hideCancel={true} />
          <CustomModal isOpen={confirmModal.isOpen} onClose={() => setConfirmModal({...confirmModal, isOpen: false})} title={confirmModal.title} content={confirmModal.content} onConfirm={confirmModal.action} confirmText={confirmModal.confirmText} />

          {guideModal.isOpen && (
              <div className="fixed inset-0 z-[400] flex items-center justify-center bg-black/80 p-4 animate-in fade-in duration-200">
                <div className="gold-panel p-6 md:p-8 rounded-2xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto custom-scrollbar">
                  <h3 className="text-xl font-black gold-gradient-text mb-2 flex items-center gap-2"><IconEdit/> {guideModal.type === 'defense' ? '방어 덱 운영법 제안하기' : '새로운 공략 제안하기'}</h3>
                  <p className="text-xs text-zinc-400 mb-6">작성해주신 공략은 관리자 검토 후 보관소에 공식 등록됩니다.</p>
                  
                  <div className="space-y-4">
                    <div className="flex gap-2 text-xs font-bold text-zinc-300">
                      <span className="w-16 shrink-0 text-zinc-500">대상 방어덱:</span>
                      <span>{guideModal.defTeam.filter(Boolean).length > 0 ? getSafeArray(guideModal.defTeam).join(', ') : '선택 안됨'}</span>
                    </div>
                    
                    {guideModal.type === 'counter' && (
                      <div className="flex gap-2 text-xs font-bold text-zinc-300 items-center">
                        <span className="w-16 shrink-0 text-zinc-500">카운터 덱:</span>
                        <div className="flex gap-2 flex-1 relative z-[300]">
                          {[0,1,2].map(i => (
                            <SearchableSelect key={i} zIndex={300} value={guideModal.atkTeam[i]} onChange={(v) => {
                               const newAtk = [...guideModal.atkTeam]; newAtk[i] = v; setGuideModal({...guideModal, atkTeam: newAtk});
                            }} placeholder={`영웅 ${i+1}`} groups={HERO_GROUPS} className="h-10 text-xs" />
                          ))}
                        </div>
                      </div>
                    )}
                    
                    <div className="pt-4 border-t border-zinc-800 space-y-3">
                      {guideModal.type === 'counter' ? (
                        <>
                          <div>
                            <label className="block text-xs font-bold text-zinc-400 mb-1">스킬 운영 (필수)</label>

                    {recommendDefenseData.map((data, idx) => (
                      <div key={idx} className="bg-zinc-800 border border-zinc-600 rounded-xl flex flex-col relative overflow-hidden group w-full">
                        {idx === 0 && <div className="absolute top-0 right-0 bg-yellow-600 text-black text-[10px] font-black px-3 py-1 rounded-bl-lg z-10">BEST 메타</div>}
                        
                        <div 
                          className="p-4 sm:p-5 flex flex-col sm:flex-row items-start sm:items-center justify-between cursor-pointer hover:bg-zinc-700/30 transition-colors select-none gap-3 sm:gap-0 w-full"
                          onClick={() => toggleDefGuide(idx)}
                        >
                          <div className="flex items-start sm:items-center gap-3 sm:gap-4 relative z-10 w-full">
                            <span className={`text-2xl font-black ${idx === 0 ? 'gold-gradient-text' : 'text-zinc-600'} shrink-0 pt-1 sm:pt-0`}>{idx + 1}</span>
                            <div className="flex-1 min-w-0">
                              <div className="mb-2 flex items-center gap-2 flex-wrap">
                                {renderHeroTags(data.heroes)}
                                {data.guides && data.guides.length > 0 && <span className="bg-blue-600/20 text-blue-400 text-[10px] font-black px-2 py-0.5 rounded mt-1 sm:mt-0">공식 운영법</span>}
                                {(!data.guides || data.guides.length === 0) && (
                                  <button 
                                    onClick={(e) => {
                                      e.stopPropagation();
                                      setGuideModal({
                                        isOpen: true, type: 'defense', defTeam: data.heroes, atkTeam: [],
                                        skill: '', turn: '', formation: '', equip1: '', equip2: '', equip3: '', tip: ''
                                      });
                                    }} 
                                    className="text-[10px] font-bold bg-zinc-800 text-zinc-400 border border-zinc-700 px-2 py-0.5 rounded hover:text-yellow-500 hover:border-yellow-700/50 transition mt-1 sm:mt-0 shrink-0"
                                  >
                                    📝 운영법 제안
                                  </button>
                                )}
                              </div>
                              <span className="text-[10px] sm:text-xs text-zinc-400 font-medium block">총 {data.count}회 피격 중 {data.wins}회 방어 성공</span>
                            </div>
                          </div>
                          
                          <div className="text-left sm:text-right relative z-10 pl-0 sm:pl-4 border-l-0 sm:border-l border-zinc-700 flex items-center justify-between w-full sm:w-auto mt-2 sm:mt-0 pt-3 sm:pt-0 border-t sm:border-t-0 border-zinc-700/50">
                            <div>
                              <span className="block text-[10px] font-bold text-zinc-500 mb-0.5">방어율</span>
                              <span className={`text-lg sm:text-xl font-black ${parseFloat(data.winRate) >= 50 ? 'text-blue-400' : 'text-red-400'}`}>{data.winRate}%</span>
                            </div>
                            <div className="text-zinc-500 ml-4 sm:ml-0 shrink-0">
                              {data.guides && data.guides.length > 0 ? (expandedDefGuides[idx] ? <IconChevronUp /> : <IconChevronDown />) : <span className="w-5"></span>}
                            </div>
                          </div>
                        </div>

                        {expandedDefGuides[idx] && data.guides && data.guides.length > 0 && (
                          <div className="p-4 sm:p-5 bg-zinc-900/50 border-t border-zinc-700 animate-in slide-in-from-top-2 relative group/guide w-full">
                            <button 
                              onClick={(e) => {
                                e.stopPropagation();
                                const g = data.guides[0];
                                setGuideModal({
                                  isOpen: true, type: 'defense', defTeam: data.heroes, atkTeam: [],
                                  skill: g.skill||'', turn: '', formation: '', equip1: g.equip1||'', equip2: g.equip2||'', equip3: g.equip3||'', tip: g.tip||''
                                });
                              }} 
                              className="absolute top-4 right-4 text-[10px] font-bold bg-zinc-800 text-zinc-400 border border-zinc-700 px-2 py-1 rounded hover:text-yellow-500 hover:border-yellow-700/50 transition opacity-0 group-hover/guide:opacity-100"
                            >
                              운영법 수정 제안
                            </button>
                            <div className="space-y-4">
                              {data.guides.map((g, gIdx) => (
                                <div key={gIdx} className="w-full">
                                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                    <div className="flex flex-col gap-1 w-full">
                                      <span className="text-[11px] font-bold text-zinc-500 uppercase tracking-wider">추천 펫</span>
                                      <span className="text-sm font-medium text-zinc-200 bg-zinc-800/50 p-2.5 rounded-lg border border-zinc-700/50">{g.skill || '-'}</span>
                                    </div>
                                    <div className="flex flex-col gap-1 w-full">
                                      <span className="text-[11px] font-bold text-zinc-500 uppercase tracking-wider">핵심 장비 및 세팅</span>
                                      <ul className="text-[13px] font-medium text-zinc-300 bg-zinc-800/50 p-3 rounded-lg border border-zinc-700/50 space-y-1.5 overflow-hidden">
                                        {[g.equip1, g.equip2, g.equip3].filter(Boolean).length > 0 ? [g.equip1, g.equip2, g.equip3].filter(Boolean).map((eq, i) => <li key={i} className="leading-snug flex items-start break-words"><span className="text-blue-500 mr-1.5 mt-0.5 shrink-0">•</span><span className="min-w-0">{eq}</span></li>) : <li>세팅 정보 없음</li>}
                                      </ul>
                                    </div>
                                  </div>
                                  {g.tip && (
                                    <div className="flex items-start gap-2.5 bg-zinc-800/50 p-3.5 rounded-lg border border-zinc-700/50 w-full">
                                      <span className="text-zinc-400 mt-0.5 shrink-0"><IconInfo /></span>
                                      <p className="text-xs sm:text-sm text-zinc-300 font-medium leading-relaxed whitespace-pre-line break-words min-w-0">{g.tip}</p>
                                    </div>
                                  )}
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {mainTab === 'management' && isAdminMode && (
              <div className="gold-panel p-8 rounded-2xl space-y-10 animate-in fade-in">
                
                <div className="border-t border-yellow-900/30 pt-8">
                  <h2 className="text-2xl font-black gold-gradient-text mb-4">데이터 일괄 추가 (다중 파싱)</h2>
                  <p className="text-zinc-400 mb-4 text-sm font-medium">과거 전적 텍스트를 붙여넣어 한 번에 등록합니다. (양식: 공격 [덱] 승 방어 [덱])</p>
                  <textarea 
                    value={rawRecordInputState} 
                    onChange={e => setRawRecordInputState(e.target.value)} 
                    className="w-full h-32 p-4 bg-zinc-900 border border-zinc-700 rounded-xl text-zinc-100 text-sm focus:ring-2 focus:ring-yellow-600 outline-none mb-4 custom-scrollbar" 
                    placeholder="공격 루디 크리스 델론즈 승 방어 밀리아 카일 로지&#10;공격 플라튼 콜트 아킬라 패 방어 프레이야 펜리르 라드그리드"
                  ></textarea>
                  <button onClick={handleBulkParse} className="w-full py-4 gold-button font-black rounded-xl">일괄 파싱 및 등록</button>
                </div>
                
                <div>
                  <h2 className="text-2xl font-black gold-gradient-text mb-4 flex items-center gap-2">📝 공략 제안 검토 대기열 <span className="bg-red-600 text-white text-xs px-2 py-1 rounded-full">{customGuides.filter(g=>g.status==='pending').length}</span></h2>
                  <p className="text-zinc-400 mb-6 text-sm font-medium">유저들이 제안한 공략입니다. 승인 시 카운터 보관소에 즉시 반영됩니다.</p>
                  
                  {customGuides.filter(g=>g.status==='pending').length === 0 ? (
                    <div className="bg-zinc-900 border border-zinc-700 p-8 text-center rounded-xl text-zinc-500 font-bold text-sm">대기 중인 제안이 없습니다.</div>
                  ) : (
                    <div className="space-y-4">
                      {customGuides.filter(g=>g.status==='pending').sort((a,b)=>b.createdAt-a.createdAt).map(guide => (
                        <div key={guide.id} className="bg-zinc-800 border border-yellow-700/50 p-5 rounded-xl shadow-lg relative">
                          <div className="absolute top-4 right-4">
                            <span className={`text-[10px] font-black px-2 py-1 rounded ${guide.guideType === 'defense' ? 'bg-blue-900/40 text-blue-400 border border-blue-800' : 'bg-red-900/40 text-red-400 border border-red-800'}`}>
                              {guide.guideType === 'defense' ? '🛡️ 방어 운영법' : '⚔️ 카운터 공략'}
                            </span>
                          </div>

                          <div className="flex gap-4 mb-4 items-center mt-2">
                            <span className="text-xs font-bold text-zinc-500 w-16">방어 덱:</span>
                            {renderHeroTags(guide.defenseTeam)}
                          </div>
                          
                          {guide.guideType !== 'defense' && (
                            <div className="flex gap-4 mb-4 items-center">
                              <span className="text-xs font-bold text-zinc-500 w-16">카운터:</span>
                              {renderHeroTags(guide.attackerTeam)}
                            </div>
                          )}
                          
                          <div className="bg-zinc-900 p-4 rounded-lg border border-zinc-700 text-sm text-zinc-300 space-y-2 mb-4">
                            {guide.guideType === 'defense' ? (
                              <>
                                <p><span className="text-blue-400 font-bold mr-2">추천 펫:</span> {guide.skill}</p>
                                <p><span className="text-blue-400 font-bold mr-2">핵심장비:</span> {[guide.equip1, guide.equip2, guide.equip3].filter(Boolean).join(' | ')}</p>
                              </>
                            ) : (
                              <>
                                <p><span className="text-zinc-500 font-bold mr-2">스킬:</span> {guide.skill}</p>
                                <p><span className="text-zinc-500 font-bold mr-2">턴/진형:</span> {guide.turn} / {guide.formation}</p>
                                <p><span className="text-zinc-500 font-bold mr-2">장비:</span> {[guide.equip1, guide.equip2, guide.equip3].filter(Boolean).join(' | ')}</p>
                              </>
                            )}
                            <p><span className="text-yellow-600 font-bold mr-2">팁:</span> {guide.tip}</p>
                          </div>
                          
                          <div className="flex gap-3">
                            <button onClick={() => handleApproveGuide(guide.id)} className="flex-1 py-3 gold-button rounded-xl font-bold text-sm">✅ 제안 승인 및 반영</button>
                            <button onClick={() => handleRejectGuide(guide.id)} className="flex-1 py-3 bg-red-950/40 text-red-400 border border-red-900 rounded-xl font-bold text-sm hover:bg-red-800 hover:text-white transition">❌ 제안 거절 (삭제)</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div className="border-t border-yellow-900/30 pt-8">
                  <h2 className="text-2xl font-black gold-gradient-text mb-4">데이터 통합 다운로드 센터</h2>
                  <div className="flex flex-col sm:flex-row gap-4">
                    <button onClick={handleExportAllCSV} className="flex-1 px-6 py-5 gold-button font-black rounded-xl flex items-center justify-center gap-2 text-base shadow-lg"><IconDownload /> 원본 로그 다운로드 (전적/방어)</button>
                  </div>
                </div>
                
                <div className="border-t border-yellow-900/30 pt-8">
                  <h2 className="text-2xl font-black text-red-500 mb-4 drop-shadow-md">위험 구역 (데이터 영구 삭제)</h2>
                  <p className="text-zinc-400 mb-6 text-sm font-medium">삭제된 데이터는 서버에서 영구히 지워지며 복구할 수 없습니다.</p>
                  <div className="flex flex-col sm:flex-row gap-4">
                    <button onClick={() => handleDeleteAllByType('attack')} className="flex-1 py-5 bg-red-950/40 text-red-400 border border-red-900 font-black rounded-xl hover:bg-red-800 hover:text-white transition-colors shadow-inner">공격 기록지 전체 삭제</button>
                    <button onClick={() => handleDeleteAllByType('defense')} className="flex-1 py-5 bg-rose-950/40 text-rose-400 border border-rose-900 font-black rounded-xl hover:bg-rose-800 hover:text-white transition-colors shadow-inner">방어 기록지 전체 삭제</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
